<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中文写作 · 范式训练场 — Simon 学习中心</title>
<style>
:root{
  --bg:#F4F5F2; --card:#FFFFFF; --ink:#1C1D1F; --sub:#6E6E73;
  --hair:#DADCD6; --soft:#FAFAF8; --track:#E7E8E3;
  --blue:#0071E3; --ok:#1D8A43; --okbg:#E4F9EA; --bad:#D93025; --badbg:#FDEBEA;
  --amber:#C56A00; --ambbg:#FFF4E3;
  --qi:#5B7A6A; --cheng:#0071E3; --zhuan:#2C5F7C; --he:#B3402A;
  --qibg:#EDF2EF; --chengbg:#E8F2FF; --zhuanbg:#E9F0F4; --hebg:#F9ECE8;
  --serif:"Noto Serif SC","Songti SC","STSong","SimSun",serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased}
.wrap{max-width:820px;margin:0 auto;padding:0 20px}
button{font:inherit}
.top{border-bottom:1px solid var(--hair);background:rgba(244,245,242,.88);backdrop-filter:saturate(180%) blur(20px);position:sticky;top:0;z-index:40}
.top-in{display:flex;align-items:center;justify-content:space-between;padding:11px 0;gap:10px}
.back{font-size:15px;color:var(--blue);text-decoration:none;white-space:nowrap}
.back::before{content:"‹ "}
.brand{font-size:12.5px;color:var(--sub);text-align:right}
.topbtns{display:flex;gap:8px;align-items:center}
.btn{font-size:14px;font-weight:500;border:0;border-radius:99px;padding:8px 18px;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-blue{background:var(--blue);color:#fff}
.btn-ink{background:var(--ink);color:#fff}
.btn-ghost{background:var(--track);color:var(--ink)}
.btn-zhu{background:var(--he);color:#fff}
.btn-mini{font-size:13px;padding:6px 14px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.hero{padding:38px 0 10px}
.eyebrow{font-size:12px;font-weight:600;color:var(--sub);letter-spacing:.14em;margin-bottom:8px}
.hero h1{font-family:var(--serif);font-size:clamp(28px,5.6vw,40px);font-weight:700;letter-spacing:.02em}
.hero .sub{margin-top:8px;font-size:15.5px;color:var(--sub);max-width:60ch}
.dash{background:var(--card);border-radius:20px;padding:20px 22px;margin:20px 0 14px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 8px 28px rgba(0,0,0,.05);display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.ringbox{position:relative;width:92px;height:92px;flex:none}
.ringbox svg{transform:rotate(-90deg)}
.ringlab{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ringlab b{font-size:20px;font-weight:700;letter-spacing:-.02em}
.ringlab span{font-size:10.5px;color:var(--sub)}
.dnums{display:flex;gap:22px;flex-wrap:wrap;flex:1;min-width:220px}
.dn b{font-size:20px;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.dn span{display:block;font-size:12px;color:var(--sub);margin-top:1px}
.dbtns{display:flex;gap:8px;flex-wrap:wrap}
.note{background:var(--ambbg);border-radius:16px;padding:13px 18px;margin:0 0 14px;font-size:13.5px;line-height:1.8}
.note b{color:var(--amber)}
.rvbar{background:var(--ambbg);border-radius:16px;padding:13px 18px;margin:0 0 14px;font-size:13.5px;display:none}
.rvbar b{color:var(--amber)}
.rv-chip{display:inline-block;background:#fff;border:1px solid #EAD9BF;border-radius:99px;padding:3px 12px;margin:5px 6px 0 0;font-size:13px;cursor:pointer}
.stage{margin:26px 0 6px;display:flex;align-items:center;gap:12px}
.seal{font-family:var(--serif);font-size:20px;font-weight:700;color:#fff;width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none;box-shadow:inset 0 0 0 2px rgba(255,255,255,.35)}
.stage h2{font-family:var(--serif);font-size:19px;font-weight:700}
.stage .ssub{font-size:12.5px;color:var(--sub)}
.map{position:relative;margin:10px 0 4px;padding-left:19px}
.map::before{content:"";position:absolute;left:38px;top:8px;bottom:8px;width:2px;background:var(--hair);border-radius:2px}
.lvrow{position:relative;display:flex;align-items:center;gap:14px;padding:7px 0;cursor:pointer;border-radius:14px}
.lvrow:hover .lvcard{border-color:#C9CCC4}
.lvdot{width:40px;height:40px;border-radius:50%;background:var(--card);border:2px solid var(--hair);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex:none;z-index:1;color:var(--sub);font-variant-numeric:tabular-nums}
.lvrow.done .lvdot{border-color:transparent;color:#fff}
.lvrow.cur .lvdot{border-color:var(--ink);color:var(--ink);box-shadow:0 0 0 4px rgba(28,29,31,.08)}
.lvrow.lock{cursor:not-allowed}
.lvrow.lock .lvdot{background:var(--track);color:#B4B6B0}
.lvcard{flex:1;background:var(--card);border:1px solid transparent;border-radius:16px;padding:10px 16px;box-shadow:0 1px 2px rgba(0,0,0,.03);display:flex;align-items:center;gap:12px;min-width:0}
.lvrow.lock .lvcard{background:transparent;box-shadow:none;border:1px dashed var(--hair)}
.lvt{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lvs{font-size:12.5px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lvmeta{margin-left:auto;flex:none;display:flex;gap:6px;align-items:center}
.tagw{font-size:11px;font-weight:600;border-radius:99px;padding:2px 9px;background:var(--hebg);color:var(--he)}
.lvpct{font-size:12px;color:var(--sub);font-variant-numeric:tabular-nums}
.lv-head{padding:32px 0 6px}
.crumb{font-size:13.5px;color:var(--blue);cursor:pointer;display:inline-block;margin-bottom:10px}
.crumb::before{content:"‹ "}
.lv-eyebrow{font-size:12px;font-weight:700;letter-spacing:.12em;margin-bottom:6px}
.lv-head h1{font-family:var(--serif);font-size:clamp(24px,4.6vw,32px);font-weight:700}
.lv-goal{margin-top:8px;font-size:14.5px;color:var(--sub)}
.blk{background:var(--card);border-radius:20px;padding:24px 26px;margin:16px 0;box-shadow:0 1px 2px rgba(0,0,0,.04),0 8px 28px rgba(0,0,0,.05)}
.blk h3{font-size:16.5px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.kicker{font-size:11px;font-weight:700;letter-spacing:.1em;border-radius:99px;padding:2.5px 10px;flex:none}
.k-learn{background:var(--chengbg);color:var(--cheng)}
.k-play{background:var(--qibg);color:var(--qi)}
.k-quiz{background:var(--zhuanbg);color:var(--zhuan)}
.k-write{background:var(--hebg);color:var(--he)}
.blk p{font-size:15px;margin:9px 0}
.blk .tip{font-size:13px;color:var(--sub);background:var(--soft);border-radius:12px;padding:9px 14px;margin:10px 0}
.spk{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--blue);background:var(--chengbg);border:0;border-radius:99px;padding:4px 12px;cursor:pointer;vertical-align:middle;margin:0 2px}
.spk:hover{opacity:.8}
body.novoice .spk{display:none}
.pairrow{display:flex;gap:10px;align-items:stretch;margin:8px 0;flex-wrap:wrap}
.pr{flex:1;min-width:200px;border-radius:12px;padding:9px 14px;font-size:14.5px}
.pr b{display:block;font-size:11px;letter-spacing:.08em;margin-bottom:3px}
.pr-oral{background:var(--badbg)}
.pr-oral b{color:var(--bad)}
.pr-formal{background:var(--okbg)}
.pr-formal b{color:var(--ok)}
.q{border:1px solid var(--hair);border-radius:16px;padding:16px 18px;margin:13px 0;background:var(--soft)}
.q-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:9px}
.q-num{font-size:13px;font-weight:700;background:var(--ink);color:#fff;border-radius:8px;padding:2px 9px}
.st{font-size:11.5px;font-weight:600;border-radius:99px;padding:2.5px 10px;margin-left:auto}
.st0{background:var(--track);color:var(--sub)}
.st1{background:var(--ambbg);color:var(--amber)}
.st2{background:var(--okbg);color:var(--ok)}
.stem{font-size:15.5px;line-height:1.75}
.stem .blank{display:inline-block;min-width:64px;border-bottom:2px solid var(--ink);text-align:center;font-weight:700;color:var(--he)}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
@media(max-width:620px){.opts{grid-template-columns:1fr}}
.opt{text-align:left;font-size:14.5px;border:1.5px solid var(--hair);background:#fff;border-radius:13px;padding:10px 14px;cursor:pointer;transition:border-color .15s,background .15s}
.opt:hover{border-color:#B9BCB4}
.opt.sel-ok{border-color:var(--ok);background:var(--okbg)}
.opt.sel-bad{border-color:var(--bad);background:var(--badbg)}
.opt.dim{opacity:.5;pointer-events:none}
.verdict{font-size:14px;font-weight:600;margin-top:10px;display:none}
.verdict.v-ok{color:var(--ok);display:block}
.verdict.v-bad{color:var(--bad);display:block}
.exp{display:none;font-size:13.5px;line-height:1.8;background:#fff;border:1px solid var(--hair);border-radius:12px;padding:11px 14px;margin-top:10px}
.exp.show{display:block}
.exp b{color:var(--he)}
.qbtns{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.mastery{font-size:12.5px;color:var(--sub)}
.slotbox{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.slot{border:1.6px dashed var(--hair);border-radius:12px;min-height:46px;padding:8px 12px;font-size:14.5px;display:flex;align-items:center;gap:9px;background:#fff;cursor:pointer}
.slot .sn{font-size:12px;font-weight:700;color:var(--sub);flex:none;width:20px}
.slot.filled{border-style:solid;cursor:pointer}
.slot.s-ok{border-color:var(--ok);background:var(--okbg)}
.slot.s-bad{border-color:var(--bad);background:var(--badbg)}
.pool{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 4px}
.chipbtn{border:1.5px solid var(--hair);background:#fff;border-radius:12px;padding:8px 13px;font-size:14px;cursor:pointer;text-align:left;transition:transform .12s}
.chipbtn:hover{border-color:#B9BCB4}
.chipbtn.used{opacity:.28;pointer-events:none}
.rrow{border:1px solid var(--hair);border-radius:13px;background:#fff;padding:10px 14px;margin:9px 0}
.rrow .rtxt{font-size:14.5px;line-height:1.75}
.rpick{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap}
.rpill{font-size:12.5px;font-weight:600;border:1.5px solid var(--hair);background:var(--soft);border-radius:99px;padding:4px 13px;cursor:pointer}
.rpill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.rrow.r-ok{border-color:var(--ok);background:var(--okbg)}
.rrow.r-bad{border-color:var(--bad);background:var(--badbg)}
.radarbox{border:1px solid var(--hair);border-radius:14px;background:#fff;padding:16px 18px;font-size:15.5px;line-height:2.15;margin:12px 0}
.tok{cursor:pointer;border-radius:6px;padding:1px 2px;transition:background .12s}
.tok:hover{background:var(--track)}
.tok.sel{background:#FFE9A8;box-shadow:inset 0 0 0 1.5px #E3B341}
.tok.hit{background:var(--okbg);box-shadow:inset 0 0 0 1.5px var(--ok)}
.tok.miss{background:var(--badbg);box-shadow:inset 0 0 0 1.5px var(--bad)}
.tok.fa{background:var(--ambbg);box-shadow:inset 0 0 0 1.5px var(--amber)}
.abgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
@media(max-width:640px){.abgrid{grid-template-columns:1fr}}
.abcard{border:1.6px solid var(--hair);border-radius:14px;background:#fff;padding:14px 16px;font-size:14.5px;line-height:1.85;cursor:pointer;transition:border-color .15s}
.abcard:hover{border-color:#B9BCB4}
.abcard .ablab{font-size:12px;font-weight:800;color:var(--sub);letter-spacing:.1em;margin-bottom:6px}
.abcard.sel-ok{border-color:var(--ok);background:var(--okbg)}
.abcard.sel-bad{border-color:var(--bad);background:var(--badbg)}
.flipgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px;margin:12px 0}
.fc{perspective:900px;height:168px;cursor:pointer}
.fci{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.fc.flip .fci{transform:rotateY(180deg)}
.fcf,.fcb{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;padding:12px 13px;display:flex;flex-direction:column}
.fcf{background:#fff;border:1px solid var(--hair);align-items:center;justify-content:center}
.fcf .fname{font-family:var(--serif);font-size:21px;font-weight:700}
.fcf .fhint{font-size:11px;color:var(--sub);margin-top:6px}
.fcb{background:var(--ink);color:#fff;transform:rotateY(180deg);font-size:12px;line-height:1.65;overflow:auto}
.fcb b{color:#F5C24B}
@media(prefers-reduced-motion:reduce){.fci{transition:none}}
.xwrap{border:1px solid var(--hair);border-radius:16px;background:#fff;padding:20px 22px;margin:12px 0}
.xbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.xtitle{font-family:var(--serif);font-size:17px;font-weight:700}
.xp{font-size:15px;line-height:2.0;margin:12px 0;position:relative;border-left:3px solid transparent;padding-left:12px;transition:border-color .3s}
.xroletag{display:none;font-size:11px;font-weight:700;letter-spacing:.08em;border-radius:99px;padding:2px 10px;margin-bottom:5px}
.xon .xroletag{display:inline-block}
.xon .xp.role-intro{border-color:var(--qi)}
.xon .xp.role-body{border-color:var(--cheng)}
.xon .xp.role-turn{border-color:var(--zhuan)}
.xon .xp.role-end{border-color:var(--he)}
.xnote{display:none;font-size:12.5px;color:var(--sub);background:var(--soft);border-radius:10px;padding:7px 12px;margin:6px 0 2px}
.xon .xnote{display:block}
.xu{border-bottom:2px dotted transparent}
.xon .xu{border-bottom-color:var(--he);cursor:help}
.quote{font-family:var(--serif);background:var(--soft);border-left:3px solid var(--ink);border-radius:0 12px 12px 0;padding:13px 17px;font-size:15px;line-height:2.0;margin:12px 0}
.quote .src{display:block;font-size:12px;color:var(--sub);margin-top:7px;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
.wtool{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:10px 0}
.timer{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;background:var(--ink);color:#fff;border-radius:10px;padding:4px 12px;display:none}
.timer.show{display:inline-block}
.timer.over{background:var(--bad)}
.ess{width:100%;min-height:260px;border:1.5px solid var(--hair);border-radius:14px;padding:14px 16px;font:inherit;font-size:15.5px;line-height:1.9;resize:vertical;background:#fff}
.ess:focus{outline:none;border-color:var(--blue)}
.wc{font-size:12.5px;color:var(--sub);margin-top:6px;font-variant-numeric:tabular-nums}
.ckrow{display:flex;gap:9px;align-items:flex-start;margin:7px 0;font-size:14px}
.ckrow input{margin-top:4px;width:16px;height:16px;accent-color:var(--ok);flex:none}
.model{display:none;margin-top:14px}
.model.show{display:block}
.codexbtn{position:fixed;right:18px;bottom:18px;z-index:50;background:var(--he);color:#fff;border:0;border-radius:99px;padding:11px 19px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(179,64,42,.35);display:flex;gap:7px;align-items:center}
.codexbtn .cnt{background:rgba(255,255,255,.25);border-radius:99px;padding:1px 9px;font-size:12.5px;font-variant-numeric:tabular-nums}
.codexbtn.pulse{animation:cpulse 1.6s ease-in-out 3}
@keyframes cpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@media(prefers-reduced-motion:reduce){.codexbtn.pulse{animation:none}}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(440px,94vw);background:var(--bg);z-index:60;box-shadow:-14px 0 44px rgba(0,0,0,.18);transform:translateX(105%);transition:transform .3s cubic-bezier(.2,.7,.2,1);display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
@media(prefers-reduced-motion:reduce){.drawer{transition:none}}
.dhead{padding:16px 18px 10px;border-bottom:1px solid var(--hair);display:flex;align-items:center;gap:10px}
.dhead h2{font-family:var(--serif);font-size:19px;flex:1}
.dclose{border:0;background:var(--track);border-radius:99px;width:32px;height:32px;font-size:16px;cursor:pointer}
.dtabs{display:flex;gap:6px;padding:10px 16px;flex-wrap:wrap;border-bottom:1px solid var(--hair)}
.dtab{font-size:12.5px;font-weight:600;border:1px solid var(--hair);background:var(--card);border-radius:99px;padding:5px 12px;cursor:pointer}
.dtab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.dbody{flex:1;overflow:auto;padding:14px 16px 30px}
.ccard{background:var(--card);border:1px solid var(--hair);border-radius:15px;padding:13px 15px;margin:0 0 11px;position:relative}
.ccard.locked{opacity:.5}
.ccard .cseal{position:absolute;top:11px;right:12px;font-family:var(--serif);font-size:11px;font-weight:700;color:#fff;background:var(--he);border-radius:5px;padding:2px 6px}
.ccard h4{font-family:var(--serif);font-size:16px;margin-bottom:4px;padding-right:44px}
.ccard .csub{font-size:12px;color:var(--sub);margin-bottom:6px}
.ccard .cbody{font-size:13px;line-height:1.8}
.ccard .cbody b{color:var(--he)}
.ccard details{margin-top:6px}
.ccard summary{font-size:12.5px;color:var(--blue);cursor:pointer}
.locknote{font-size:12px;color:var(--sub)}
.dim-scrim{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:55;opacity:0;pointer-events:none;transition:opacity .25s}
.dim-scrim.on{opacity:1;pointer-events:auto}
.fb{font-size:14px;font-weight:600;margin-top:10px}
.fb.ok{color:var(--ok)}
.fb.bad{color:var(--bad)}
.divider{height:1px;background:var(--hair);margin:16px 0}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;font-size:14px;border-radius:99px;padding:10px 22px;z-index:80;transition:transform .3s;max-width:88vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.view{display:none}
.view.on{display:block}
.foot{border-top:1px solid var(--hair);margin-top:44px;padding:22px 0 34px;font-size:12px;color:var(--sub);line-height:1.9}
.pillrow{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.pill{font-size:12.5px;background:var(--track);border-radius:99px;padding:4px 13px;color:var(--sub)}
kbd.hl{font-family:inherit;background:var(--hebg);color:var(--he);border-radius:6px;padding:1px 7px;font-weight:700}
</style>
</head>
<body>
<div class="top"><div class="wrap top-in">
  <a class="back" href="../index.html">学习门户</a>
  <div class="topbtns">
    <button class="btn btn-ghost btn-mini" id="btnReview">复习队列 <span id="rvN">0</span></button>
    <button class="btn btn-ghost btn-mini" id="btnExport">导出学习报告</button>
  </div>
</div></div>

<main class="wrap">
  <section class="view on" id="v-home"></section>
  <section class="view" id="v-level"></section>
  <section class="view" id="v-review"></section>
</main>

<button class="codexbtn" id="codexBtn">📜 图鉴 <span class="cnt" id="codexCnt">0/0</span></button>
<div class="dim-scrim" id="scrim"></div>
<aside class="drawer" id="drawer">
  <div class="dhead"><h2>写作工具图鉴</h2><button class="dclose" id="dclose">✕</button></div>
  <div class="dtabs" id="dtabs"></div>
  <div class="dbody" id="dbody"></div>
</aside>

<footer class="foot"><div class="wrap">中文写作 · 范式训练场 v1 · 起承转合 20 关 · Simon 学习门户 2026 夏<br>目标锚定：IGCSE 0509 中文第一语言（近期）· IBDP 中文A（远期）· 范式与自撰材料由 Claude 依据公开考纲与考官报告编写，最终评分口径以学校与考试局为准。</div></footer>
<div class="toast" id="toast"></div>
<script>
'use strict';
/* ================= 工具 ================= */
function $(s,r){return (r||document).querySelector(s)}
function $$(s,r){return Array.prototype.slice.call((r||document).querySelectorAll(s))}
function el(t,c,h){var e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e}
function toast(m){var t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('show')},2400)}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function today(){var d=new Date(),p=function(x){return (x<10?'0':'')+x};return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function zlen(s){return String(s||'').replace(/[\s\u3000]/g,'').replace(/[，。！？；：、""''（）《》【】—…·,.!?;:()\-]/g,'').length}

/* ================= TTS：中文语音 ================= */
var VOICE=null,HAS_VOICE=false;
function pickVoice(){
  try{
    var vs=window.speechSynthesis.getVoices().filter(function(v){return /^zh|^cmn/i.test(v.lang)&&!/HK|TW|Cantonese|粤/i.test(v.lang+' '+v.name)});
    if(!vs.length){vs=window.speechSynthesis.getVoices().filter(function(v){return /^zh|^cmn/i.test(v.lang)})}
    if(!vs.length){HAS_VOICE=false;document.body.classList.add('novoice');return}
    VOICE=vs.find(function(v){return /Xiaoxiao|Yunxi|Xiaoyi|Natural|Online/i.test(v.name)})
      ||vs.find(function(v){return /Microsoft/i.test(v.name)})
      ||vs.find(function(v){return /Google/i.test(v.name)})
      ||vs[0];
    HAS_VOICE=true;document.body.classList.remove('novoice');
  }catch(e){HAS_VOICE=false;document.body.classList.add('novoice')}
}
function speak(text,rate){
  if(!HAS_VOICE||!text)return;
  try{
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(String(text).replace(/<[^>]+>/g,''));
    u.lang='zh-CN';u.rate=rate||0.95;if(VOICE)u.voice=VOICE;
    window.speechSynthesis.speak(u);
  }catch(e){}
}
function speakSeq(items){
  if(!HAS_VOICE||!items.length)return;
  try{
    window.speechSynthesis.cancel();
    items.forEach(function(t){
      var u=new SpeechSynthesisUtterance(String(t).replace(/<[^>]+>/g,''));
      u.lang='zh-CN';u.rate=0.95;if(VOICE)u.voice=VOICE;
      window.speechSynthesis.speak(u);
    });
  }catch(e){}
}
if('speechSynthesis' in window){pickVoice();window.speechSynthesis.onvoiceschanged=pickVoice}
else{document.body.classList.add('novoice')}

document.addEventListener('click',function(ev){
  var t=ev.target.closest('[data-say]');if(t){speak(t.getAttribute('data-say'));return}
  var ab=ev.target.closest('[data-ab]');if(ab){var p=ab.getAttribute('data-ab').split('|');speakSeq(['A。'+p[0],'B。'+p[1]]);return}
});

/* ================= 题目引擎：选择/判断/填空 ================= */
var QMAP={};
function regQ(q){QMAP[q.id]=q}
function qState(id){if(!S.q[id])S.q[id]={streak:0,mastered:false,tries:0,wrong:0,vi:0};return S.q[id]}
function qStatusHTML(st){
  if(st.mastered)return '<span class="st st2">已掌握 ✓</span>';
  if(st.tries>0)return '<span class="st st1">连对 '+st.streak+'/2</span>';
  return '<span class="st st0">未作答</span>';
}
function choiceHTML(q,no){
  var st=qState(q.id);
  return '<div class="q" data-q="'+q.id+'"><div class="q-head"><span class="q-num">'+no+'</span><span style="font-size:12px;color:var(--sub)">'+q.brief+'</span>'+qStatusHTML(st)+'</div><div class="qbody"></div></div>';
}
function mountChoice(qid){
  var q=QMAP[qid],box=$('[data-q="'+qid+'"]');if(!q||!box)return;
  var st=qState(qid);
  var v=q.v[st.vi%q.v.length];
  var body=$('.qbody',box);
  var opts=v.opts.map(function(o,i){return {t:o[0],ok:!!o[1],fb:o[2]||'',i:i}});
  var order=(q.kind==='j')?opts:shuffle(opts);
  var h='<div class="stem">'+v.stem+'</div><div class="opts"'+(q.kind==='j'?' style="grid-template-columns:repeat('+order.length+',1fr)"':'')+'>';
  order.forEach(function(o,i){h+='<button class="opt" data-i="'+o.i+'">'+(q.kind==='j'?'':String.fromCharCode(65+i)+'. ')+o.t+'</button>'});
  h+='</div><div class="verdict"></div><div class="exp"></div><div class="qbtns"><span class="mastery">'+(st.mastered?'已掌握，可再练巩固':'连对 2 个变式即算掌握')+'</span></div>';
  body.innerHTML=h;
  $$('.opt',body).forEach(function(b){
    b.onclick=function(){
      var i=+b.getAttribute('data-i');var o=opts[i];
      st.tries++;
      $$('.opt',body).forEach(function(x){x.classList.add('dim')});
      var vd=$('.verdict',body),ex=$('.exp',body);
      if(o.ok){
        b.classList.remove('dim');b.classList.add('sel-ok');
        st.streak++;
        if(st.streak>=2&&!st.mastered){st.mastered=true;clearReview(qid);vd.className='verdict v-ok';vd.textContent='✓ 正确 · 连对两次，已掌握！'}
        else{vd.className='verdict v-ok';vd.textContent='✓ 正确 · 连对 '+st.streak+'/2'}
        ex.className='exp show';ex.innerHTML=v.exp||'';
      }else{
        b.classList.remove('dim');b.classList.add('sel-bad');
        st.streak=0;st.wrong++;
        addReview(qid,q.brief);
        vd.className='verdict v-bad';vd.textContent='✗ 不对 · 看讲解，换个变式再来';
        ex.className='exp show';ex.innerHTML=(o.fb?'<b>为什么错：</b>'+o.fb+'<div class="divider"></div>':'')+(v.exp||'');
      }
      st.vi++;
      var btn=el('button','btn btn-ink btn-mini',st.mastered?'再练一个变式':'下一个变式 →');
      btn.onclick=function(){mountChoice(qid)};
      $('.qbtns',body).appendChild(btn);
      $('.q-head .st',box).outerHTML=qStatusHTML(st);
      save();refreshLevelPct();
    };
  });
}
/* ================= 排序引擎 ================= */
var OMAP={};
function regO(o){OMAP[o.id]=o}
function exState(id){if(!S.ex[id])S.ex[id]={ok:false,best:0,tries:0,vi:0};return S.ex[id]}
function orderHTML(o){return '<div class="oq" data-o="'+o.id+'"></div>'}
function mountOrder(oid){
  var o=OMAP[oid],box=$('[data-o="'+oid+'"]');if(!o||!box)return;
  var st=exState(oid);
  var v=o.v[st.vi%o.v.length];
  var items=v.items.map(function(t,i){return{t:t,ci:i}});
  var pool=shuffle(items);
  var placed=new Array(items.length).fill(null);
  var h='<p style="font-size:14px;color:var(--sub)">'+(o.intro||'点击下方卡片，按正确顺序放入槽位；点击槽内卡片可退回。')+'</p><div class="slotbox">';
  items.forEach(function(_,i){h+='<div class="slot" data-s="'+i+'"><span class="sn">'+(i+1)+'</span><span class="sv" style="color:var(--sub)">'+((o.slots&&o.slots[i])||'（点击卡片放入）')+'</span></div>'});
  h+='</div><div class="pool">';
  pool.forEach(function(it,i){h+='<button class="chipbtn" data-p="'+i+'">'+it.t+'</button>'});
  h+='</div><div class="qbtns"><button class="btn btn-blue btn-mini" data-check>检查顺序</button><span class="fb"></span></div><div class="exp"></div>';
  box.innerHTML=h;
  function paint(){
    $$('.slot',box).forEach(function(s,i){
      var p=placed[i];
      s.className='slot'+(p!=null?' filled':'');
      $('.sv',s).innerHTML=p!=null?pool[p].t:'<span style="color:var(--sub)">'+((o.slots&&o.slots[i])||'（点击卡片放入）')+'</span>';
    });
    $$('.chipbtn',box).forEach(function(c,i){c.classList.toggle('used',placed.indexOf(i)>=0)});
  }
  $$('.chipbtn',box).forEach(function(c,i){c.onclick=function(){
    if(placed.indexOf(i)>=0)return;
    var slot=placed.indexOf(null);if(slot<0)return;
    placed[slot]=i;paint();
  }});
  $$('.slot',box).forEach(function(s,i){s.onclick=function(ev){
    if(ev.target.closest('.chipbtn'))return;
    if(placed[i]!=null){placed[i]=null;paint()}
  }});
  $('[data-check]',box).onclick=function(){
    if(placed.indexOf(null)>=0){toast('先把所有卡片放进槽位');return}
    st.tries++;var allOk=true;
    $$('.slot',box).forEach(function(s,i){
      var ok=pool[placed[i]].ci===i;
      s.classList.add(ok?'s-ok':'s-bad');
      if(!ok)allOk=false;
    });
    var fb=$('.fb',box),ex=$('.exp',box);
    if(allOk){
      st.ok=true;st.best=100;clearReview(oid);
      fb.className='fb ok';fb.textContent='✓ 顺序完全正确';
      ex.className='exp show';ex.innerHTML=v.exp||'';
    }else{
      addReview(oid,o.brief);
      fb.className='fb bad';fb.textContent='✗ 有卡片放错了位置 · 读讲解后点"重排"';
      ex.className='exp show';ex.innerHTML=(v.exp||'');
      var btn=el('button','btn btn-ink btn-mini','重排（换一次）');
      btn.onclick=function(){st.vi++;mountOrder(oid)};
      $('.qbtns',box).appendChild(btn);
    }
    save();refreshLevelPct();
  };
}
/* ================= 角色标注引擎 ================= */
var RMAP={};
function regR(r){RMAP[r.id]=r}
function rolesHTML(r){return '<div class="rq" data-r="'+r.id+'"></div>'}
function mountRoles(rid){
  var r=RMAP[rid],box=$('[data-r="'+rid+'"]');if(!r||!box)return;
  var st=exState(rid);
  var v=r.v[st.vi%r.v.length];
  var sel=new Array(v.rows.length).fill(-1);
  var h='<p style="font-size:14px;color:var(--sub)">'+(r.intro||'为每一句选择它在段落中扮演的角色。')+'</p>';
  v.rows.forEach(function(row,i){
    h+='<div class="rrow" data-i="'+i+'"><div class="rtxt">'+row[0]+'</div><div class="rpick">';
    r.roles.forEach(function(ro,j){h+='<button class="rpill" data-j="'+j+'">'+ro+'</button>'});
    h+='</div></div>';
  });
  h+='<div class="qbtns"><button class="btn btn-blue btn-mini" data-check>检查标注</button><span class="fb"></span></div><div class="exp"></div>';
  box.innerHTML=h;
  $$('.rrow',box).forEach(function(row,i){
    $$('.rpill',row).forEach(function(p,j){
      p.onclick=function(){sel[i]=j;$$('.rpill',row).forEach(function(x,k){x.classList.toggle('on',k===j)})};
    });
  });
  $('[data-check]',box).onclick=function(){
    if(sel.indexOf(-1)>=0){toast('还有句子没有选角色');return}
    st.tries++;var allOk=true;
    $$('.rrow',box).forEach(function(row,i){
      var ok=sel[i]===v.rows[i][1];
      row.classList.remove('r-ok','r-bad');row.classList.add(ok?'r-ok':'r-bad');
      if(!ok)allOk=false;
    });
    var fb=$('.fb',box),ex=$('.exp',box);
    if(allOk){st.ok=true;st.best=100;clearReview(rid);fb.className='fb ok';fb.textContent='✓ 全部标对';ex.className='exp show';ex.innerHTML=v.exp||''}
    else{addReview(rid,r.brief);st.vi+=(r.v.length>1?1:0);fb.className='fb bad';fb.textContent='✗ 红色句子标错了 · 读讲解后重试';ex.className='exp show';ex.innerHTML=v.exp||'';
      var btn=el('button','btn btn-ink btn-mini','重新标注');btn.onclick=function(){mountRoles(rid)};$('.qbtns',box).appendChild(btn)}
    save();refreshLevelPct();
  };
}
/* ================= 口语雷达引擎 ================= */
var DMAP={};
function regD(d){DMAP[d.id]=d}
function radarHTML(d){return '<div class="dq" data-d="'+d.id+'"></div>'}
function mountRadar(did){
  var d=DMAP[did],box=$('[data-d="'+did+'"]');if(!d||!box)return;
  var st=exState(did);
  var v=d.v[st.vi%d.v.length];
  var sel={};
  var h='<p style="font-size:14px;color:var(--sub)">'+(d.intro||'点击你认为"口语化 / 应该替换或删除"的词语，选完点检查。')+'</p><div class="radarbox">';
  v.toks.forEach(function(t,i){
    if(t[1]===-1){h+=t[0]}
    else{h+='<span class="tok" data-i="'+i+'">'+t[0]+'</span>'}
  });
  h+='</div><div class="qbtns"><button class="btn btn-blue btn-mini" data-check>检查</button><span class="fb"></span></div><div class="exp"></div>';
  box.innerHTML=h;
  $$('.tok',box).forEach(function(tk){tk.onclick=function(){
    if(tk.classList.contains('hit')||tk.classList.contains('miss'))return;
    var i=tk.getAttribute('data-i');sel[i]=!sel[i];tk.classList.toggle('sel',!!sel[i]);
  }});
  $('[data-check]',box).onclick=function(){
    st.tries++;
    var hits=0,total=0,fa=0;
    $$('.tok',box).forEach(function(tk){
      var i=+tk.getAttribute('data-i');var isBad=v.toks[i][1]===1;
      tk.classList.remove('sel');
      if(isBad){total++;if(sel[i]){hits++;tk.classList.add('hit')}else{tk.classList.add('miss')}}
      else if(sel[i]){fa++;tk.classList.add('fa')}
    });
    var score=Math.max(0,Math.round((hits-fa*0.5)/Math.max(1,total)*100));
    if(score>st.best)st.best=score;
    var pass=score>=80;if(pass){st.ok=true;clearReview(did)}else{addReview(did,d.brief)}
    var fb=$('.fb',box),ex=$('.exp',box);
    fb.className='fb '+(pass?'ok':'bad');
    fb.textContent=(pass?'✓ ':'✗ ')+'命中 '+hits+'/'+total+(fa?' · 误报 '+fa+'（黄色）':'')+' · 得分 '+score+'%'+(pass?'':' · 需 ≥80%');
    ex.className='exp show';ex.innerHTML=v.exp||'';
    var btn=el('button','btn btn-ink btn-mini',pass?'换一段再扫':'读完讲解，换一段重扫');
    btn.onclick=function(){st.vi++;mountRadar(did)};
    $('.qbtns',box).appendChild(btn);
    save();refreshLevelPct();
  };
}
/* ================= A/B 对比引擎 ================= */
var AMAP={};
function regA(a){AMAP[a.id]=a}
function abHTML(a){return '<div class="aq" data-a2="'+a.id+'"></div>'}
function mountAB(aid){
  var a=AMAP[aid],box=$('[data-a2="'+aid+'"]');if(!a||!box)return;
  var st=exState(aid);
  var h='<p style="font-size:14px;color:var(--sub)">'+(a.intro||'先判断哪一段更好，再回答"好在哪"。')+'</p><div class="abgrid">'
    +'<div class="abcard" data-pick="a"><div class="ablab">A 段</div>'+a.a+'</div>'
    +'<div class="abcard" data-pick="b"><div class="ablab">B 段</div>'+a.b+'</div>'
    +'</div><div class="fb" data-fb1></div><div class="whybox" style="display:none"><div class="stem" style="margin-top:8px">'+a.why.stem+'</div><div class="opts" data-why></div></div><div class="exp"></div>';
  box.innerHTML=h;
  var step1=false;
  $$('.abcard',box).forEach(function(c){c.onclick=function(){
    if(step1)return;step1=true;st.tries++;
    var pick=c.getAttribute('data-pick');var ok=pick===a.better;
    $$('.abcard',box).forEach(function(x){x.style.pointerEvents='none'});
    c.classList.add(ok?'sel-ok':'sel-bad');
    if(!ok){$('[data-pick="'+a.better+'"]',box).classList.add('sel-ok')}
    var fb=$('[data-fb1]',box);fb.className='fb '+(ok?'ok':'bad');
    fb.textContent=ok?'✓ 选对了 · 现在说出理由':'✗ 更好的其实是 '+a.better.toUpperCase()+' 段 · 想想为什么，再答下一问';
    if(!ok){st.streakBad=true;addReview(aid,a.brief)}
    var wb=$('.whybox',box);wb.style.display='block';
    var opts=shuffle(a.why.opts.map(function(o){return{t:o[0],ok:!!o[1],fb:o[2]||''}}));
    var wh='';opts.forEach(function(o,i){wh+='<button class="opt" data-w="'+i+'">'+String.fromCharCode(65+i)+'. '+o.t+'</button>'});
    $('[data-why]',box).innerHTML=wh;
    $$('[data-why] .opt',box).forEach(function(b,i){b.onclick=function(){
      $$('[data-why] .opt',box).forEach(function(x){x.classList.add('dim')});
      var o=opts[i];b.classList.remove('dim');b.classList.add(o.ok?'sel-ok':'sel-bad');
      var ex=$('.exp',box);ex.className='exp show';
      if(o.ok&&ok&&!st.streakBad){st.ok=true;st.best=100;clearReview(aid);ex.innerHTML='<b>✓ 两问全对。</b> '+a.exp}
      else if(o.ok){st.ok=true;st.best=Math.max(st.best,80);ex.innerHTML='<b>理由答对了。</b> '+a.exp}
      else{addReview(aid,a.brief);ex.innerHTML=(o.fb?'<b>为什么错：</b>'+o.fb+'<div class="divider"></div>':'')+a.exp;
        var btn=el('button','btn btn-ink btn-mini','重做本题');btn.onclick=function(){st.streakBad=false;mountAB(aid)};ex.appendChild(btn)}
      save();refreshLevelPct();
    }});
  }});
}
/* ================= 翻牌卡引擎 ================= */
function flipHTML(id,cardIds){
  var h='<div class="flipgrid" data-fg="'+id+'">';
  cardIds.forEach(function(cid){
    var c=cardById(cid);
    h+='<div class="fc" data-fc="'+cid+'"><div class="fci"><div class="fcf"><div class="fname">'+c.name.replace(/·.*$/,'')+'</div><div class="fhint">点击翻面</div></div><div class="fcb">'+c.body+'</div></div></div>';
  });
  return h+'</div><p class="tip" data-fgtip="'+id+'">逐张翻看 · 翻完全部后本项自动完成</p>';
}
function mountFlips(id,cardIds){

function reqDone(r){
  if(r.t==='q'){var st=S.q[r.id];return !!(st&&st.mastered)}
  if(r.t==='ex'){var e=S.ex[r.id];return !!(e&&e.ok)}
  if(r.t==='essay'){var w=S.essays[r.id];if(!w||zlen(w.t)<r.min)return false;
    if(r.ck){var c=S.checks[r.id]||{};for(var i=0;i<r.ck;i++)if(!c[i])return false}return true}
  if(r.t==='micro'){var m=S.micro[r.id];return !!(m&&zlen(m)>=r.min)}
  return false;
}
function levelPct(L){var d=0;L.req.forEach(function(r){if(reqDone(r))d++});return L.req.length?Math.round(d/L.req.length*100):0}
function levelDone(L){return L.req.every(reqDone)}
function levelUnlocked(idx){
  if(idx===0)return true;
  return levelDone(LEVELS[idx-1]);
}
function refreshLevelPct(){
  var L=LEVELS[CUR_LV];if(L==null)return;
  var pct=levelPct(L);
  var tag=$('#lvPctTag');if(tag)tag.textContent='本关进度 '+pct+'%';
  if(pct===100&&!S.q['__lvdone_'+L.id]){
    S.q['__lvdone_'+L.id]={mastered:true,streak:2,tries:1,wrong:0,vi:0};
    unlockCards(L.cards||[]);
    toast('🏮 第 '+(CUR_LV+1)+' 关完成！'+(CUR_LV<LEVELS.length-1?'下一关已解锁':'全部通关！'));
    save();
  }
}

 body:'<b>点</b>：观点句（本段只说一件事）→ <b>释</b>：用一两句解释这个观点是什么意思 → <b>证</b>：论据（事例 / 引言 / 数据，从素材卡取）→ <b>析</b>：分析论据<b>为什么</b>能支撑观点（最容易被省掉、也最值分的一步）→ <b>结</b>：小结回扣。<br>口诀：<b>无「析」不成段</b>——只摆例子不分析，等于把菜买回来没下锅。'},
{id:'P4',cat:'PAT',seal:'范式',name:'结论两句式',sub:'第 6 关解锁 · 收尾不虎头蛇尾',lockHint:'通过第 6 关解锁',
 body:'<b>句 1 收束</b>：「综上所述……」用一个长句把三个分论点拧成一股绳（换说法，别照抄观点句）。<br><b>句 2 升华</b>：把话题从「这件事」推到「一类事 / 一种态度」——由手机谈到自律，由阅读谈到时代。<br>禁忌：结尾冒出<b>新论点</b>、新例子，或喊空口号。'},
{id:'P5',cat:'PAT',seal:'范式',name:'指导性写作四步',sub:'第 11 关解锁 · 0509 试卷一必考',lockHint:'通过第 11 关解锁',
 body:'<b>① 圈</b>：在两则材料里圈出全部信息点（通常 6–8 个）。<br><b>② 分</b>：按「支持 / 反对 / 背景」归类。<br><b>③ 重组</b>：把信息点<b>换成自己的话</b>并重新排队——考官报告明确警告：整句照抄材料、不重组措辞的作文<b>不能得高分</b>。<br><b>④ 成文</b>：按要求的格式（信 / 邮件 / 文章）和身份口吻写，观点鲜明，信息点全覆盖。'},
{id:'P6',cat:'PAT',seal:'范式',name:'评论段 · 点证析联',sub:'第 13 关解锁 · IBDP 中文A 的段落语法',lockHint:'通过第 13 关解锁',
 body:'<b>点</b>：本段论点——作者用了什么手法、想达成什么 → <b>证</b>：引用原文（短引，加引号）→ <b>析</b>：拆解这个手法<b>如何</b>制造效果（节奏？画面？情绪落差？）→ <b>联</b>：联回全文主旨或读者感受。<br>红线：<b>只报手法名不分析 = 不得分</b>。「用了排比」是零分句，「排比制造出循环往复的节奏，从而……」才开始得分。'},
{id:'P7',cat:'PAT',seal:'范式',name:'效果句式骨架',sub:'第 14 关解锁 · 分析句的万能模板',lockHint:'通过第 14 关解锁',
 body:'挑一个填空即可成句：<br>· 作者通过<b>____</b>（手法），描绘出 / 营造出<b>____</b>，从而<b>____</b>（表达情感 / 突出主旨 / 引发思考）。<br>· <b>____</b>一词看似平常，实则<b>____</b>。<br>· 前文的<b>____</b>与此处的<b>____</b>形成呼应 / 反差，使<b>____</b>。<br>· 若删去此句，则<b>____</b>——可见其作用在于<b>____</b>。'},
{id:'P8',cat:'PAT',seal:'范式',name:'考场时间分配',sub:'第 17 关解锁 · 45 分钟怎么切',lockHint:'通过第 17 关解锁',
 body:'以 45 分钟 600 字为例：<b>审题 3 分钟</b>（圈题眼，判断文体与立场）→ <b>提纲 5 分钟</b>（五段各写 10 字观点句 + 选定素材卡）→ <b>写作 32 分钟</b>（每段约 6 分钟，卡住就跳，先保结构完整）→ <b>检查 5 分钟</b>（专查：错别字、口语词、关联词、结尾是否升华）。<br>铁律：<b>宁可每段短，不可缺一段</b>——结构完整是保底分。'},
/* ---- 兵器卡 WPN ---- */
{id:'W1',cat:'WPN',seal:'论证',name:'例证法',sub:'第 8 关解锁 · 用事实说话',lockHint:'通过第 8 关解锁',
 body:'<b>定义</b>：举具体事例证明观点。<br><b>触发句式</b>：「……便是明证」「以……为例」。<br><b>微示例</b>：坚持方能成事，屠呦呦历经数百次提取失败仍不放弃，终获青蒿素，便是明证。<br><b>警告</b>：例后必须跟一句「析」——例子不会自己说话。一段一例即可，堆例不加分。'},
{id:'W2',cat:'WPN',seal:'论证',name:'引证法',sub:'第 8 关解锁 · 借权威之口',lockHint:'通过第 8 关解锁',
 body:'<b>定义</b>：引用名言、经典、数据证明观点。<br><b>触发句式</b>：「正如……所言」「古人云……」。<br><b>微示例</b>：正如荀子所言，「不积跬步，无以至千里」，积累从来不是笨办法，而是唯一的办法。<br><b>警告</b>：引文要短、要准；引完要接自己的话，不能让名言替你写作文。'},
{id:'W3',cat:'WPN',seal:'论证',name:'对比论证',sub:'第 8 关解锁 · 有比较才有分量',lockHint:'通过第 8 关解锁',
 body:'<b>定义</b>：正反两面并置，在反差中凸显观点。<br><b>触发句式</b>：「反观……」「与其……不如……」「同样是……，前者……后者……」。<br><b>微示例</b>：同样面对失利，有人一蹶不振，苏轼却吟出「一蓑烟雨任平生」——境界高下，正在于此。<br><b>警告</b>：对比双方要在<b>同一维度</b>上比，否则是错位比较。'},
{id:'W4',cat:'WPN',seal:'论证',name:'因果论证',sub:'第 9 关解锁 · 挖一层「为什么」',lockHint:'通过第 9 关解锁',
 body:'<b>定义</b>：由原因推结果，或由结果追原因。<br><b>触发句式</b>：「究其原因……」「正因如此……」「之所以……是因为……」。<br><b>微示例</b>：碎片化阅读之所以令人焦虑，究其原因，是它只喂给我们结论，却抽走了得出结论的过程。<br><b>警告</b>：警惕「先后」冒充「因果」——A 发生在 B 之前，不代表 A 导致了 B。'},
{id:'W5',cat:'WPN',seal:'论证',name:'比喻论证',sub:'第 9 关解锁 · 把抽象说活',lockHint:'通过第 9 关解锁',
 body:'<b>定义</b>：用具体形象比喻抽象道理。<br><b>触发句式</b>：「……犹如……」「好比……」。<br><b>微示例</b>：范式犹如脚手架——楼没起来时离不得，楼起来后必须拆。<br><b>警告</b>：比喻是「像什么」的说明，不是证据本身，宜与例证、因果搭配使用。'},
{id:'W6',cat:'WPN',seal:'论证',name:'让步反驳',sub:'第 9 关解锁 · 高分段的标配',lockHint:'通过第 9 关解锁',
 body:'<b>定义</b>：先承认对方合理处（让步），再指出其局限并反驳。这是最能体现「思想深度」的一招，第三分论点的黄金结构。<br><b>触发句式</b>：「诚然，……但……」「不可否认……然而……」「有人认为……这种看法看似有理，却忽略了……」。<br><b>微示例</b>：诚然，兼职会占用学习时间；但真正偷走时间的从来不是兼职本身，而是没有规划的生活。<br><b>警告</b>：让步要真诚具体，不能立个稻草人一推就倒。'},
/* ---- 语料卡 REG ---- */
{id:'G1',cat:'REG',seal:'语料',name:'口语 → 书面 替换表（80 对）',sub:'第 3 关解锁 · 写作时随时翻',lockHint:'通过第 3 关解锁',
 body:'<details open><summary><b>动词（16）</b></summary>觉得→认为 · 说→指出/表示/强调 · 看→观察/审视 · 想→思考/设想 · 用→运用/采用 · 帮→协助 · 弄/搞→处理/进行 · 给→提供/赋予 · 拿到→获得/取得 · 碰到→遭遇/面临 · 开始→着手/展开 · 变成→转变为 · 知道→了解/知晓 · 喜欢→青睐/倾向于 · 讨厌→排斥/抵触 · 打算→计划/意在</details>'
 +'<details><summary><b>副词与程度（14）</b></summary>很/非常→极为/颇为/相当 · 特别→尤为 · 真的→确实/的确 · 太→过于 · 有点→略显/稍显 · 越来越→日益/愈发 · 一直→始终/持续 · 马上→随即 · 常常→往往/时常 · 都→均/皆 · 大概→大致/约 · 到处→处处/随处 · 好好→认真/切实 · 一下子→顷刻/骤然</details>'
 +'<details><summary><b>名词（14）</b></summary>东西→事物/因素 · 事儿→事务/现象 · 地方→场所/层面 · 人→人们/个体/群体 · 好处→益处/优势 · 坏处→弊端/危害 · 问题→议题/弊病 · 办法→途径/策略/方案 · 样子→形态/面貌 · 想法→观点/见解 · 原因→缘由/成因 · 结果→后果/成效 · 力气→精力 · 机会→契机/机遇</details>'
 +'<details><summary><b>形容词（12）</b></summary>好→有益/出色/优良 · 坏→不良/有害/恶劣 · 大→巨大/显著/重大 · 小→细微/有限 · 多→众多/大量/诸多 · 少→寥寥/稀少 · 快→迅速/快捷 · 慢→迟缓 · 重要→关键/至关重要 · 厉害→出众/剧烈 · 差不多→大致/近乎 · 一样→相同/一致</details>'
 +'<details><summary><b>连接（12）</b></summary>然后→随后/继而 · 但是→然而 · 所以→因此/因而 · 要是→倘若/若 · 不管→无论 · 还有→此外/再者 · 反正→总之（慎用）· 其实→实际上/事实上 · 就算→即便/纵然 · 因为→由于 · 这样→如此/由此 · 那→那么</details>'
 +'<details><summary><b>直接删除黑名单（12）</b></summary>就是 · 然后（口头禅式）· 那个 · 的话 · 其实（滥用时）· 什么的 · 之类的（滥用时）· 啊/呀/嘛/呗 · 超/贼/蛮/挺 · 啥/咋 · 咱（改「我们」）· 搞（改「进行/开展」）</details>'},
{id:'G2',cat:'REG',seal:'语料',name:'关联词罗盘（六族）',sub:'第 4 关解锁 · 段落之间的螺丝钉',lockHint:'通过第 4 关解锁',
 body:'<b>递进</b>：不仅……而且…… · 更有甚者 · 进一步说<br><b>转折</b>：然而 · 诚然……但…… · 尽管如此<br><b>因果</b>：因此 · 究其原因 · 正因如此<br><b>并列</b>：一方面……另一方面…… · 与此同时 · 其一……其二……<br><b>条件假设</b>：倘若 · 唯有……方能…… · 一旦……便……<br><b>总结</b>：综上所述 · 由此可见 · 归根结底<br><b>用法铁律</b>：段首关联词决定段落关系——写每一段前先问：这段和上一段是什么关系？选对族，再选词。'},
/* ---- 素材卡 MAT（万能论据 15）---- */
{id:'M1',cat:'MAT',seal:'素材',name:'苏轼 · 三起三落',sub:'逆境 / 豁达 / 心态',lockHint:'通过第 10 关解锁',
 body:'<b>事例</b>：一生三次被贬（黄州、惠州、儋州），却在贬所写出传世名篇、修堤办学。<br><b>可引</b>：「竹杖芒鞋轻胜马，谁怕？一蓑烟雨任平生。」（《定风波》）<br><b>适用论点</b>：逆境成就人 · 心态决定境界 · 真正的强大是内心从容。'},
{id:'M2',cat:'MAT',seal:'素材',name:'司马迁 · 发愤著史',sub:'坚持 / 使命 / 忍辱',lockHint:'通过第 10 关解锁',
 body:'<b>事例</b>：受刑之后忍辱负重，历时十余年完成《史记》。<br><b>可引</b>：「究天人之际，通古今之变，成一家之言。」（《报任安书》）<br><b>适用论点</b>：苦难与成就 · 长期主义 · 为热爱之事承受代价。'},
{id:'M3',cat:'MAT',seal:'素材',name:'屠呦呦 · 青蒿素',sub:'科学 / 坚持 / 古为今用',lockHint:'通过第 10 关解锁',
 body:'<b>事例</b>：历经数百次提取试验失败，从东晋葛洪《肘后备急方》中获得低温提取灵感，最终发现青蒿素，2015 年获诺贝尔生理学或医学奖。<br><b>适用论点</b>：坚持与试错 · 传统智慧的现代价值 · 冷板凳上的大成就。'},
{id:'M4',cat:'MAT',seal:'素材',name:'袁隆平 · 稻田里的一生',sub:'实干 / 理想 / 朴素',lockHint:'通过第 10 关解锁',
 body:'<b>事例</b>：毕生躬耕田野研究杂交水稻，年逾九旬仍下田。<br><b>可引</b>：「人就像一粒种子，要做一粒好种子。」<br><b>适用论点</b>：把理想种进土里 · 实干精神 · 一件事做到极致。'},
{id:'M5',cat:'MAT',seal:'素材',name:'贝多芬 · 失聪作曲',sub:'逆境 / 艺术 / 意志',lockHint:'通过第 10 关解锁',
 body:'<b>事例</b>：晚年几乎完全失聪，仍完成《第九交响曲》——一位听不见的人写出了《欢乐颂》。<br><b>适用论点</b>：命运的限制不等于人生的上限 · 热爱可抵万难 · 身体的残缺与精神的完整。'},
{id:'M6',cat:'MAT',seal:'素材',name:'居里夫人 · 两获诺奖',sub:'专注 / 淡泊 / 女性力量',lockHint:'通过第 10 关解锁',
 body:'<b>事例</b>：1903 年获诺贝尔物理学奖、1911 年获化学奖；放弃为镭的提纯方法申请专利，把发现留给全人类。<br><b>适用论点</b>：专注与淡泊 · 科学的公共精神 · 名利之外的追求。'},
{id:'M7',cat:'MAT',seal:'素材',name:'樊锦诗 · 敦煌的女儿',sub:'坚守 / 文化传承 / 选择',lockHint:'通过第 10 关解锁',
 body:'<b>事例</b>：北大毕业后扎根莫高窟数十年，主持「数字敦煌」，让千年壁画在数字世界永生。<br><b>适用论点</b>：一生择一事 · 传统文化的现代守护 · 冷清处自有大事业。'},
{id:'M8',cat:'MAT',seal:'素材',name:'王羲之 · 墨池',sub:'刻苦 / 积累',lockHint:'通过第 10 关解锁',
 body:'<b>事例</b>：相传他临池练字，洗笔洗砚，日久池水尽黑，后人称「墨池」。（传说典故，引用时可加「相传」）<br><b>适用论点</b>：功夫在日常 · 量变到质变 · 天才背后的笨功夫。'},
{id:'M9',cat:'MAT',seal:'素材',name:'爱迪生 · 千种灯丝',sub:'试错 / 创新 / 韧性',lockHint:'通过第 10 关解锁',
 body:'<b>事例</b>：据传记记载，为寻找合适的灯丝材料，他试验了上千种材料方才成功。<br><b>适用论点</b>：失败是数据不是终点 · 创新源于笨拙的坚持 · 把不可能穷举成可能。'},
{id:'M10',cat:'MAT',seal:'素材',name:'乔布斯 · 串起人生的点',sub:'跨界 / 长期主义 / 兴趣',lockHint:'通过第 10 关解锁',
 body:'<b>事例</b>：大学退学后旁听书法课，十年后这门「无用」的课成就了 Mac 的优美字体。他在 2005 年斯坦福演讲中说：人生的点无法预先连成线，只能在回望时串起它们。<br><b>适用论点</b>：无用之用 · 兴趣的长期价值 · 允许人生绕路。'},
{id:'M11',cat:'MAT',seal:'素材',name:'达·芬奇 · 跨界通才',sub:'好奇心 / 广博与专精',lockHint:'通过第 10 关解锁',
 body:'<b>事例</b>：画《蒙娜丽莎》之外，留下数千页手稿，涉及解剖、工程、光学、飞行器设计。<br><b>适用论点</b>：好奇心是第一生产力 · 学科之间没有墙 · 广博滋养专精。'},
{id:'M12',cat:'MAT',seal:'素材',name:'张桂梅 · 华坪女高',sub:'教育 / 责任 / 平凡英雄',lockHint:'通过第 10 关解锁',
 body:'<b>事例</b>：创办全国第一所免费女子高中，拖着病体家访十余万公里，帮助数千名山区女孩走进大学。<br><b>适用论点</b>：教育改变命运 · 一个人可以照亮多少人 · 责任高于自我。'},
{id:'M13',cat:'MAT',seal:'素材',name:'荀子 · 积累之道',sub:'名言 / 积累 / 恒心',lockHint:'通过第 10 关解锁',
 body:'<b>可引</b>：「不积跬步，无以至千里；不积小流，无以成江海。」（《荀子·劝学》）<br><b>用法</b>：谈学习方法、习惯养成、长期主义时作引证；引后接一句自己的阐释，如「积累从来不是笨办法，而是唯一的办法」。'},
{id:'M14',cat:'MAT',seal:'素材',name:'韩愈 · 业精于勤',sub:'名言 / 勤奋 / 思考',lockHint:'通过第 10 关解锁',
 body:'<b>可引</b>：「业精于勤荒于嬉，行成于思毁于随。」（韩愈《进学解》）<br><b>用法</b>：前半句谈勤奋，后半句谈独立思考——两个论点共用一句引文，性价比极高。'},
{id:'M15',cat:'MAT',seal:'素材',name:'数据 · 屏幕时代的阅读',sub:'数据 / 科技与生活',lockHint:'通过第 10 关解锁',
 body:'<b>可引数据</b>：据中国新闻出版研究院发布的全国国民阅读调查，近年来我国成年国民人均每天手机接触时长超过 100 分钟。<br><b>用法</b>：谈碎片化阅读、手机使用、深度思考等话题的开篇引题或论据；引用时保留「据……调查」的来源框架，显得严谨。'},
/* ---- 术语卡 TRM（手法 25）---- */
{id:'T1',cat:'TRM',seal:'手法',name:'比喻',sub:'第 13 关解锁',lockHint:'通过第 13 关解锁',body:'<b>定义</b>：用相似的事物打比方（明喻「像」、暗喻「是」、借喻不出现本体）。<br><b>识别</b>：像 / 如 / 仿佛 / 是。<br><b>效果句式</b>：将____比作____，使抽象的____变得具体可感。'},
{id:'T2',cat:'TRM',seal:'手法',name:'拟人',sub:'第 13 关解锁',lockHint:'通过第 13 关解锁',body:'<b>定义</b>：赋予事物以人的动作、情感。<br><b>识别</b>：非人事物做出人的行为。<br><b>效果句式</b>：赋予____以人的____，使画面生动，并暗含作者对它的____之情。'},
{id:'T3',cat:'TRM',seal:'手法',name:'排比',sub:'第 13 关解锁',lockHint:'通过第 13 关解锁',body:'<b>定义</b>：三个及以上结构相似的短语或句子并列。<br><b>识别</b>：句式重复、节奏推进。<br><b>效果句式</b>：连用三个「____」，形成层层推进的节奏，增强了____的气势 / 情感。'},
{id:'T4',cat:'TRM',seal:'手法',name:'对比',sub:'第 13 关解锁',lockHint:'通过第 13 关解锁',body:'<b>定义</b>：把相反的事物或同一事物的两面并置。<br><b>识别</b>：一正一反、一今一昔、一明一暗。<br><b>效果句式</b>：____与____形成鲜明对比，突出了____。'},
{id:'T5',cat:'TRM',seal:'手法',name:'夸张',sub:'第 13 关解锁',lockHint:'通过第 13 关解锁',body:'<b>定义</b>：故意言过其实，放大或缩小。<br><b>识别</b>：明显超出常理的程度描述。<br><b>效果句式</b>：以夸张之笔写____，强化了____的感受，令人印象深刻。'},
{id:'T6',cat:'TRM',seal:'手法',name:'反问',sub:'第 13 关解锁',lockHint:'通过第 13 关解锁',body:'<b>定义</b>：用问句表达确定的意思，答案在问题里。<br><b>识别</b>：难道 / 岂 / 怎能——不需要回答。<br><b>效果句式</b>：以反问收束，语气强烈，不容置疑地强调了____。'},
{id:'T7',cat:'TRM',seal:'手法',name:'设问',sub:'第 13 关解锁',lockHint:'通过第 13 关解锁',body:'<b>定义</b>：自问自答，或问而引人思考。<br><b>识别</b>：先提问，随后作者自己回答或引出下文。<br><b>效果句式</b>：以设问开启，引发读者思考，并自然引出____。'},
{id:'T8',cat:'TRM',seal:'手法',name:'反复',sub:'第 13 关解锁',lockHint:'通过第 13 关解锁',body:'<b>定义</b>：同一词句有意重复出现。<br><b>识别</b>：原词原句再现（区别于排比的「结构相似」）。<br><b>效果句式</b>：「____」的反复出现，一唱三叹，强化了____的情感 / 营造出回环的节奏。'},
{id:'T9',cat:'TRM',seal:'手法',name:'引用',sub:'第 14 关解锁',lockHint:'通过第 14 关解锁',body:'<b>定义</b>：引诗文、名言、俗语入文。<br><b>识别</b>：引号 + 出处或熟语。<br><b>效果句式</b>：引用____，既增添文采，又借其权威 / 意蕴支撑了____。'},
{id:'T10',cat:'TRM',seal:'手法',name:'双关',sub:'第 14 关解锁',lockHint:'通过第 14 关解锁',body:'<b>定义</b>：一语两义，表里各有所指。<br><b>识别</b>：字面义之外另有谐音义或语境义。<br><b>效果句式</b>：「____」一语双关，表面写____，实则暗指____，含蓄而有味。'},
{id:'T11',cat:'TRM',seal:'手法',name:'象征',sub:'第 14 关解锁',lockHint:'通过第 14 关解锁',body:'<b>定义</b>：用具体事物代表抽象观念或情感（整体层面）。<br><b>识别</b>：某物在全文反复出现并承载含义。<br><b>效果句式</b>：____象征着____，使抽象的____有了可触可感的形象。'},
{id:'T12',cat:'TRM',seal:'手法',name:'衬托',sub:'第 14 关解锁',lockHint:'通过第 14 关解锁',body:'<b>定义</b>：用次要事物陪衬主要事物（正衬 / 反衬）。<br><b>识别</b>：写 A 是为了让 B 更突出。<br><b>效果句式</b>：以____衬托____，使____的形象 / 情感更加鲜明。'},
{id:'T13',cat:'TRM',seal:'手法',name:'白描',sub:'第 14 关解锁',lockHint:'通过第 14 关解锁',body:'<b>定义</b>：不加渲染修饰、寥寥数笔勾勒。<br><b>识别</b>：几乎没有形容词与比喻，却轮廓分明。<br><b>效果句式</b>：以白描手法勾勒____，笔墨极简而形神俱出。'},
{id:'T14',cat:'TRM',seal:'手法',name:'细节描写',sub:'第 14 关解锁',lockHint:'通过第 14 关解锁',body:'<b>定义</b>：抓住细小动作、神态、物件精雕细刻。<br><b>识别</b>：镜头拉近，一个动作 / 一件小物被放大。<br><b>效果句式</b>：「____」这一细节，于细微处见____，比直接抒情更有力量。'},
{id:'T15',cat:'TRM',seal:'手法',name:'借景抒情',sub:'第 14 关解锁',lockHint:'通过第 14 关解锁',body:'<b>定义</b>：情感不直说，寄托在景物描写中。<br><b>识别</b>：大段写景，景中含情绪色彩。<br><b>效果句式</b>：借____之景，抒____之情，情景交融。'},
{id:'T16',cat:'TRM',seal:'手法',name:'托物言志',sub:'第 14 关解锁',lockHint:'通过第 14 关解锁',body:'<b>定义</b>：借某一事物寄托志向、品格。<br><b>识别</b>：咏物之文，物的品性即人的追求。<br><b>效果句式</b>：借____之____，言____之志。'},
{id:'T17',cat:'TRM',seal:'手法',name:'欲扬先抑',sub:'第 14 关解锁',lockHint:'通过第 14 关解锁',body:'<b>定义</b>：想褒扬先贬抑，造成情感落差。<br><b>识别</b>：前文贬损铺垫，后文态度反转。<br><b>效果句式</b>：先抑后扬，前后反差使____的形象更为动人，也让情感有了起伏。'},
{id:'T18',cat:'TRM',seal:'手法',name:'首尾呼应',sub:'第 14 关解锁',lockHint:'通过第 14 关解锁',body:'<b>定义</b>：结尾回应开头的意象、句子或问题。<br><b>识别</b>：末段与首段出现同一元素。<br><b>效果句式</b>：结尾回应开头的____，结构圆合，余味悠长。'},
{id:'T19',cat:'TRM',seal:'手法',name:'悬念',sub:'第 14 关解锁',lockHint:'通过第 14 关解锁',body:'<b>定义</b>：故意留下疑问，吊住读者。<br><b>识别</b>：关键信息被延迟揭晓。<br><b>效果句式</b>：设置____的悬念，牵引读者追读，直至____方才释然。'},
{id:'T20',cat:'TRM',seal:'手法',name:'伏笔',sub:'第 14 关解锁',lockHint:'通过第 14 关解锁',body:'<b>定义</b>：前文不动声色地埋下线索，后文应验。<br><b>识别</b>：回看时发现「原来早有交代」。<br><b>效果句式</b>：前文的____为后文____埋下伏笔，使情节合理而有回味。'},
{id:'T21',cat:'TRM',seal:'手法',name:'侧面描写',sub:'第 14 关解锁',lockHint:'通过第 14 关解锁',body:'<b>定义</b>：不直接写对象，通过他人反应、环境烘托来写。<br><b>识别</b>：主角未出场或未正面着墨，效果却已呈现。<br><b>效果句式</b>：通过____的反应侧面烘托____，不着一字而尽得风流。'},
{id:'T22',cat:'TRM',seal:'手法',name:'动静结合',sub:'第 14 关解锁',lockHint:'通过第 14 关解锁',body:'<b>定义</b>：动态与静态景物相互映衬。<br><b>识别</b>：一静一动同框（以动衬静最常见）。<br><b>效果句式</b>：以____之动衬____之静，画面顿生层次与生气。'},
{id:'T23',cat:'TRM',seal:'手法',name:'叙事视角',sub:'第 14 关解锁',lockHint:'通过第 14 关解锁',body:'<b>定义</b>：故事由谁的眼睛讲出（第一人称 / 第三人称 / 儿童视角等）。<br><b>识别</b>：注意「我」是谁、知道多少。<br><b>效果句式</b>：采用____视角叙述，既____，又让读者____。'},
{id:'T24',cat:'TRM',seal:'手法',name:'意象',sub:'第 14 关解锁',lockHint:'通过第 14 关解锁',body:'<b>定义</b>：承载情感与含义的具体物象（月、雨、灯、路……）。<br><b>识别</b>:反复出现、带情绪色彩的「物」。<br><b>效果句式</b>：「____」这一意象贯穿全文，承载着____，使情感有所依附。'},
{id:'T25',cat:'TRM',seal:'手法',name:'以乐写哀',sub:'第 14 关解锁',lockHint:'通过第 14 关解锁',body:'<b>定义</b>：用明快的景物或语调反衬悲哀，倍增其哀。<br><b>识别</b>：内容欢快，语境情感却低沉。<br><b>效果句式</b>：以乐景写哀情，前面的明快铺垫越足，此处的____便越显沉重。'},

{id:'Y2',cat:'STY',seal:'文体',name:'演讲稿',sub:'第 15 关解锁',lockHint:'通过第 15 关解锁',body:'<b>读者</b>：现场听众。<b>目的</b>：鼓动 / 说服。<br><b>语言标志</b>：称呼语（「各位老师、同学」）、第二人称「我们」拉近距离、短句与排比密集、结尾有号召。<br><b>常用手法</b>：排比、反问、反复、呼告。'},
{id:'Y3',cat:'STY',seal:'文体',name:'新闻报道',sub:'第 15 关解锁',lockHint:'通过第 15 关解锁',body:'<b>读者</b>：公众。<b>目的</b>：客观传递信息。<br><b>语言标志</b>：标题 + 导语（何时何地何人何事）、第三人称、引述消息来源（「据……介绍」）、几乎不出现「我认为」。<br><b>常用手法</b>：引用、数据、倒金字塔结构。'},
{id:'Y4',cat:'STY',seal:'文体',name:'广告文案',sub:'第 15 关解锁',lockHint:'通过第 15 关解锁',body:'<b>读者</b>：潜在消费者。<b>目的</b>：促成行动。<br><b>语言标志</b>：极短句、祈使句（「立即拥有」）、押韵或双关的口号、放大痛点与愿景。<br><b>常用手法</b>：双关、夸张、反复、对比。'},
{id:'Y5',cat:'STY',seal:'文体',name:'访谈',sub:'第 15 关解锁',lockHint:'通过第 15 关解锁',body:'<b>读者</b>：对受访者感兴趣的公众。<b>目的</b>：呈现人物观点与个性。<br><b>语言标志</b>：问答体、问题层层递进、保留受访者口语痕迹以显真实。<br><b>常用手法</b>：追问、细节描写（神态动作插叙）、引用原话。'}

{id:'d5',t:'议论文全景 · X 光第一课',s:'看穿一篇 650 字范文的骨架',cards:['P1'],
goal:'认识五段骨架；开启 X 光看穿一篇完整范文，再把打乱的骨架亲手装回去。',
req:[{t:'ex',id:'x_d5_x'},{t:'ex',id:'d5_ord1'},{t:'q',id:'q5_1'}],
itemIds:['d5_ord1','q5_1'],
html:function(){
 var h='<div class="blk"><h3><span class="kicker k-learn">精讲</span>五段骨架：议论文的母版</h3>'
 +'<p>从今天起，你写的每一篇议论文都长同一副骨头：<b>引论 → 分论一 → 分论二 → 分论三 → 结论</b>。三个分论点要么<b>并列</b>（个人 / 社会 / 文化三个面），要么<b>递进</b>（是什么 → 为什么 → 怎么办）。第三分论点是黄金位——通常放「让步反驳」，那是全文思想深度所在。'+spkBtn('引论，分论一，分论二，分论三，结论。写前先用十个字写出每段的观点句。')+'</p>'
 +'<div class="pillrow"><span class="pill" style="background:var(--qibg);color:var(--qi)">引论 · 亮观点</span><span class="pill" style="background:var(--chengbg);color:var(--cheng)">分论一</span><span class="pill" style="background:var(--chengbg);color:var(--cheng)">分论二</span><span class="pill" style="background:var(--zhuanbg);color:var(--zhuan)">分论三 · 让步反驳</span><span class="pill" style="background:var(--hebg);color:var(--he)">结论 · 升华</span></div></div>';
 h+='<div class="blk"><h3><span class="kicker k-play">X 光</span>透视一篇真范文</h3><p style="font-size:13.5px;color:var(--sub)">先当普通读者读一遍，再点「开启 X 光」——骨架和批注会显影。左侧色条即段落角色。</p>'
 +xrayHTML('d5_x','碎片化阅读，是敌是友？（范文 · 约 650 字）',[
 {role:'intro',tag:'引论 · 三句式',note:'三句式：现象引题 → 亮观点（一个可被反驳的判断句）→ 定调（预告全文思路）。',
  html:'地铁上、课间里、睡前的十分钟——人们低头刷着几百字的短文与几十秒的视频，碎片化阅读已成为这个时代最普遍的阅读姿态。有人断言它正在摧毁深度思考，也有人视之为高效获取信息的利器。<span class="xu" title="观点句">在我看来，碎片化阅读本身并无善恶，关键在于谁掌握主动权：会用者得其利，被动者受其害。</span>'},
 {role:'body',tag:'分论一 · 利',note:'段内五步：点（门槛降低）→ 释（嵌进生活缝隙）→ 证（「三上」典故）→ 析 + 结（善用者积少成多）。',
  html:'不可否认，碎片化阅读大幅降低了获取信息的门槛。等车的五分钟可以读完一篇科普，排队的间隙可以听半集播客——知识第一次如此轻盈地嵌进生活的缝隙。古人尚且珍惜「马上、枕上、厕上」的三上时光，今天的我们不过是用屏幕延续了同一种智慧。善用零碎时间者，积少成多，视野自宽。'},
 {role:'body',tag:'分论二 · 弊',note:'转折起段。注意引用《论语》后立即接自己的话——引文不能替你写作文。',
  html:'然而，若长期只满足于碎片，思维便会在不知不觉中变浅。短内容为了抓住眼球，往往只给结论、不给论证；我们看似知道了很多，实则只是<span class="xu" title="警句：收藏不等于思考">收藏了很多</span>。久而久之，注意力被切成碎屑，读一本完整的书竟成了苦役。「学而不思则罔」，只输入不消化的阅读，正是现代版的「罔」。'},
 {role:'turn',tag:'分论三 · 让步反驳',note:'高分三步：诚然（承认对方合理处）→ 却（指出其混淆）→ 真正的解法（给出「怎么办」）。',
  html:'诚然，有人辩称：信息爆炸的时代，不碎片化就跟不上节奏。这话有几分道理，却混淆了「获取信息」与「建构知识」两件事。真正的解法是<span class="xu" title="全文金句 · 方法论">「以整驭碎」</span>——用碎片时间做筛选和标记，把值得深读的内容留给整块时间；让碎片为深读服务，而非取而代之。'},
 {role:'end',tag:'结论 · 两句式',note:'句 1 收束（把三个分论拧成一股绳）；句 2 升华（由「阅读」推到「人与工具的关系」）。',
  html:'综上所述，碎片化阅读是一件工具，而工具从不为后果负责——决定成败的，是握着它的那只手。愿我们都能在信息的洪流里既拾得起碎片，也沉得下心来；驾驭工具，而不是被工具驯化。'}])
 +'</div>';
 h+='<div class="blk"><h3><span class="kicker k-play">拼装台</span>把骨架亲手装回去</h3>'+orderHTML(OMAP.d5_ord1)+'</div>';
 h+='<div class="blk"><h3><span class="kicker k-quiz">加固</span></h3>'+choiceHTML(QMAP.q5_1,1)+'</div>';
 return h;
},

 +spkBtn('积累是学业进步的唯一捷径。所谓积累，就是把大目标拆成每天可完成的小动作。相传王羲之临池习字，日复一日，竟把一池清水洗成墨色。池水变黑并非天赋使然，而是每天都来的必然结果，量的堆叠终会撬动质的改变。可见，笨功夫才是真捷径。','听标准段')+'</p></div>';

itemIds:['q8_1','q8_2','q8_3','w8'],
html:function(){
 var h='<div class="blk"><h3><span class="kicker k-learn">精讲</span>三件兵器</h3>'
 +'<p>⚔️ <b>例证法</b>：举事实。「屠呦呦历经数百次失败终获青蒿素，便是明证。」'+spkBtn('坚持方能成事。屠呦呦历经数百次提取失败仍不放弃，终获青蒿素，便是明证。')
 +'<br>⚔️ <b>引证法</b>：借权威。「正如荀子所言：不积跬步，无以至千里。」'+spkBtn('正如荀子所言，不积跬步，无以至千里。积累从来不是笨办法，而是唯一的办法。')
 +'<br>⚔️ <b>对比论证</b>：正反照。「同样面对失利，有人一蹶不振，苏轼却吟出一蓑烟雨任平生。」'+spkBtn('同样面对失利，有人一蹶不振，苏轼却吟出一蓑烟雨任平生。境界高下，正在于此。')
 +'</p><div class="tip">通关掉落三张兵器卡。写作时打开图鉴，兵器上都印着<b>触发句式</b>——照着起笔就行。</div></div>';

 h+='<div class="blk"><h3><span class="kicker k-write">写作</span>全模板首作（脚手架满配）</h3>'

  prompt:'<p class="stem"><b>题目：</b>中学生该不该拥有自己的手机？（450 字以上）</p>'
  +'<div class="tip"><b>脚手架 · 每段照这个起笔：</b><br>① 引论：放学铃一响……（现象）＋ 在我看来……（观点）＋ 一句定调<br>② 分论一（利）：手机首先是＿＿。＋ 释 ＋ 证（例 / 引）＋ 析 ＋ 结<br>③ 分论二（弊）：然而，＿＿。＋ 五步走<br>④ 分论三（怎么办）：诚然，有人认为＿＿，但＿＿。真正的关键在于＿＿。<br>⑤ 结论：综上所述……（收束）＋ 升华一句<br>兵器至少用两种；素材不够就打开右下角图鉴现翻。</div>',
  checklist:['开头是标准三句式','三个分论点各只说一件事，互不重复','每个主体段都有「析」','用了至少两种论证兵器','按替换表清扫过口语词','结尾两句式：收束 + 升华'],
  model:'<div class="quote"><b>参考范文 · 手机：立规则，再拥有（约 560 字）</b><br><br>放学铃一响，教室里此起彼伏地亮起屏幕——手机早已长在了许多中学生的手心里。有人主张一禁了之，也有人认为放任自由。在我看来，中学生可以拥有手机，但必须<b>先有规则，再有手机</b>：无规则的拥有是失控，有规则的拥有才是成长。<br><br>手机首先是一件高效的学习与联络工具。查一个生词、约一次讨论、在通勤路上听一段课程，皆可在方寸之间完成；遇到突发情况，它更是与家人之间最快的一条线。工具本身并不制造问题，恰如一把菜刀，握在厨师手里是生产力。善用者，让手机为学习开路。<br><br>然而，无规则的手机极易反客为主。短视频与游戏以分钟为单位切割注意力，令完整的作业时间支离破碎；深夜的屏幕光则一点点偷走睡眠。据全国国民阅读调查，成年人日均手机接触已超过一百分钟——自控力尚在发育的中学生，只会更难抽身。此时不是人在用手机，而是手机在用人。<br><br>诚然，有人担心「一给就沉迷」，主张彻底禁止。这种担忧不无道理，却混淆了「工具」与「使用方式」：真正让人沉迷的不是手机，而是无边界的使用。与其一禁了之，不如与父母约法三章——定时段、定场景、作业优先，让规则先于欲望到场。<br><br>综上所述，手机之利在联通与效率，其弊在失序与沉迷，而化弊为利的钥匙是规则。愿我们都能做工具的主人：先立规矩，再握手机——驾驭它，而不是被它驯化。<br><br><span style="font-size:12.5px;color:var(--sub)">🖊 简批：五段完整；每段先「点」后「析」；第四段是标准让步反驳；引用了图鉴里的 M15 数据素材；结尾回扣「工具与人」完成升华。对照你的版本：你的「析」够不够两句？</span></div>'})
 +'</div>';
 return h;
},

 var h='<div class="blk"><h3><span class="kicker k-learn">精讲</span>什么是指导性写作</h3>'
 +'<p>考卷给你<b>两则观点相反的材料</b>，要求你读懂、提取信息，再以指定身份和文体（信件 / 邮件 / 文章）写出<b>自己的</b>观点文。它考的不是文采，是<b>信息处理</b>：① <b>圈</b>出全部信息点（通常 6–8 个）→ ② 按「支持 / 反对 / 背景」<b>分</b>类 → ③ <b>重组</b>：换成自己的话、重新排队 → ④ <b>成文</b>。'+spkBtn('圈，分，重组，成文。抄材料原句，等于把零分抄进作文。')+'</p>'
 +'<div class="tip"><b>考官红线</b>：整句照抄材料、不重组措辞的作文<b>没有说服力，不能得高分</b>——这是剑桥考官报告反复点名的失分模式。重组 = 换词 + 换序 + 换视角，缺一不可。</div></div>';
 h+='<div class="blk"><h3><span class="kicker k-learn">材料</span>今天的两则材料（考场仿真 · 自撰）</h3>'
 +'<div class="quote"><b>材料 A 《兼职是一堂提前的社会课》</b>（校刊 · 学生来稿）<br>上学期我在一家饮品店做周末兼职。为了不迟到，我第一次主动定了闹钟——那种「有人等着我」的责任感，是课堂给不了的。第一次拿到自己挣的两百多元，我才真正明白了父母工资单背后的分量，也开始学着记账。柜台前形形色色的顾客，逼着我学会了跟陌生人清楚、礼貌地说话。更意外的是，排班表和库存单让我发现自己对经营管理很感兴趣——这也许会影响我将来选专业。<span class="src">'+spkBtn('上学期我在一家饮品店做周末兼职。为了不迟到，我第一次主动定了闹钟，那种有人等着我的责任感，是课堂给不了的。第一次拿到自己挣的两百多元，我才真正明白了父母工资单背后的分量，也开始学着记账。柜台前形形色色的顾客，逼着我学会了跟陌生人清楚礼貌地说话。更意外的是，排班表和库存单让我发现自己对经营管理很感兴趣，这也许会影响我将来选专业。','整段朗读 A')+'</span></div>'
 +'<div class="quote"><b>材料 B 《别让兼职偷走你的高中》</b>（班主任 · 王老师）<br>我不反对劳动，但反对用高中的黄金时间去做低回报的重复劳动。人的精力是有限的：我带过的学生里，凡是周末连续打工的，下学期成绩几乎都有下滑。端盘子、贴标签这类工作练不出真本事，成长价值很低。未成年人在外工作还面临安全与权益风险——超时、欠薪时常发生。同样的时间，参加社团、读几本好书、做一个研究小项目，对升学和成长的回报都远高于时薪二十元。<span class="src">'+spkBtn('我不反对劳动，但反对用高中的黄金时间去做低回报的重复劳动。人的精力是有限的，我带过的学生里，凡是周末连续打工的，下学期成绩几乎都有下滑。端盘子贴标签这类工作练不出真本事，成长价值很低。未成年人在外工作还面临安全与权益风险，超时欠薪时常发生。同样的时间，参加社团，读几本好书，做一个研究小项目，对升学和成长的回报都远高于时薪二十元。','整段朗读 B')+'</span></div></div>';
 h+='<div class="blk"><h3><span class="kicker k-play">流水线 ①②</span>圈 + 分：给信息点发工牌</h3>'+rolesHTML(RMAP.d11_cls1)+'</div>';

{id:'d12',t:'指导性写作实战 · 一封信',s:'半模板：只给功能，不给句子',w:1,cards:[],

html:function(){
 var h='<div class="blk"><h3><span class="kicker k-learn">任务书</span></h3>'
 +'<p>校刊「观点版」正在就<b>「中学生假期兼职」</b>征集读者来信。请结合昨天的材料 A 与 B（可回第 11 关翻看，图鉴里也有 P5 流程卡），写一封 300–350 字的信，表明你的立场。</p>'
 +'<div class="tip"><b>半模板（只给每段功能）</b>：称呼「编辑你好：」→ ① 亮明立场 → ② 谈收获（用 A 的信息点，换自己的话）→ ③ 正视风险（用 B 的信息点）→ ④ 给出你的条件或建议 → ⑤ 一句收束 → 落款「一名高一读者」。<br>硬要求：A、B 各至少用两个信息点且<b>全部换说法</b>；用一次「诚然……然而……」。</div></div>';
 h+='<div class="blk"><h3><span class="kicker k-write">写作</span></h3>'
 +essayHTML({id:'w12',minChars:280,
  prompt:'<p class="stem"><b>题目：</b>就「中学生假期兼职」给校刊写一封读者来信（300–350 字）。</p>',
  checklist:['有称呼「编辑你好：」和落款「一名高一读者」','我的立场可以用一句话复述出来','覆盖了材料 A 的至少两个信息点，且换了说法','覆盖了材料 B 的至少两个信息点，且换了说法','用了「诚然……然而……」或同族让步句式'],
  model:'<div class="quote"><b>参考信（约 330 字）</b><br><br>编辑你好：<br><br>读了贵刊关于假期兼职的两篇文章，我想表明自己的立场：我<b>有条件地支持</b>中学生假期兼职——兼职应当是一门「选修课」，而不是必修课，更不是主课。<br><br>兼职的价值是真实的。一份「有人等着我」的工作能逼出课堂给不了的责任感与守时习惯；亲手挣到的第一笔钱，会让人重新掂量劳动与金钱的分量；柜台前的沟通，则是最便宜的社交训练场。有人甚至由此摸到了自己未来的专业方向。<br><br>诚然，反对者的担忧并非多虑：精力有限，长期打工确有拖累学业之虞；重复性劳动的成长回报偏低，安全与权益风险也不容忽视。然而，这些是「无节制兼职」的代价，而非兼职本身的原罪。<br><br>因此我建议给兼职装上三道闸门：只在假期、每周不超过两个半天；学业任务优先完成；家长知情并把关工作环境。有闸门的水才是灌溉，没闸门的水只会淹田。<br><br>一名高一读者<br><br><span style="font-size:12.5px;color:var(--sub)">🖊 简批：立场一句可复述；A 取了责任 / 金钱观 / 沟通 / 兴趣四点、B 取了精力 / 低成长 / 风险三点，全部换了说法；第四段是标准让步反驳；结尾用比喻收束。</span></div>'})
 +'</div>';
 return h;
},

html:function(){
 var h='<div class="blk"><h3><span class="kicker k-learn">精讲</span>换一种写作：从「谈观点」到「拆文本」</h3>'
 +'<p>议论文是<b>你</b>对世界发表观点；文本评论是你分析<b>作者</b>怎样用文字制造效果——这是 DP 中文A 的主战场，G10 就要开始铺桥。评论段的语法是<b>点证析联</b>：<b>点</b>（作者用了什么手法、想干什么）→ <b>证</b>（短引原文，加引号）→ <b>析</b>（这个手法<b>如何</b>产生效果）→ <b>联</b>（联回全文主旨或读者感受）。'
 +'</p><div class="tip"><b>红线</b>：「作者用了排比」是<b>零分句</b>——只报菜名不上菜。必须回答「如何」：排比制造了什么节奏？节奏又推着读者产生了什么感受？</div></div>';
 h+='<div class="blk"><h3><span class="kicker k-learn">文本</span>朱自清《匆匆》· 首段（1922）</h3>'
 +'<div class="quote">燕子去了，有再来的时候；杨柳枯了，有再青的时候；桃花谢了，有再开的时候。但是，聪明的，你告诉我，我们的日子为什么一去不复返呢？<span class="src">'+spkBtn('燕子去了，有再来的时候。杨柳枯了，有再青的时候。桃花谢了，有再开的时候。但是，聪明的，你告诉我，我们的日子为什么一去不复返呢？','朗读原文')+'　朱自清《匆匆》，1922 年（公版）</span></div></div>';

 {role:'intro',tag:'点',note:'第一句就亮出「手法 + 意图」，绝不绕弯。',html:'开篇，作者以一组排比铺陈自然的循环，为的是给「日子」的一去不返蓄力。'},

{id:'d16',t:'评论实战 · 秋夜的枣树',s:'第一次独立写文本评论',w:1,cards:[],
goal:'用「点证析联」独立写出两段文本评论——这是 DP 中文A 的最小作战单元。',
req:[{t:'essay',id:'w16',min:260,ck:5}],itemIds:['w16'],
html:function(){
 var h='<div class="blk"><h3><span class="kicker k-learn">文本</span>鲁迅《秋夜》· 开头（1924）</h3>'
 +'<div class="quote">在我的后园，可以看见墙外有两株树，一株是枣树，还有一株也是枣树。这上面的夜的天空，奇怪而高，我生平没有见过这样奇怪而高的天空。他仿佛要离开人间而去，使人们仰面不再看见。<span class="src">'+spkBtn('在我的后园，可以看见墙外有两株树，一株是枣树，还有一株也是枣树。这上面的夜的天空，奇怪而高，我生平没有见过这样奇怪而高的天空。他仿佛要离开人间而去，使人们仰面不再看见。','朗读原文')+'　鲁迅《秋夜》，1924 年（公版）</span></div>'
 +'<div class="tip">两个抓手已替你圈好：① 「一株是枣树，还有一株也是枣树」——明明可以说「有两株枣树」，作者偏不。这是<b>反复</b>造成的陌生化：句子被拉长、放慢，逼你一株一株地看。它像什么？为什么开篇要这样慢？② 天空被写成「他」，「奇怪而高」「仿佛要离开人间而去」——<b>拟人</b>之下，天空成了一个疏远、冷漠、想抽身而去的存在。</div></div>';
 h+='<div class="blk"><h3><span class="kicker k-write">写作</span>两段点证析联（各一个抓手）</h3>'
 +essayHTML({id:'w16',minChars:260,
  prompt:'<p class="stem"><b>任务：</b>就上面两个抓手各写一段评论，每段都按「点 → 证 → 析 → 联」推进，合计 260 字以上。手法卡和效果句式（P7）就在右下角图鉴里，随时翻。</p>',
  checklist:['每段第一句都是「点」（手法 + 意图）','每段都有带引号的短引','每段的「析」不少于两句，且回答了「如何产生效果」','至少套用了一次图鉴 P7 里的效果句式','没有「作者用了××」就完事的贴标签句'],
  model:'<div class="quote"><b>参考评论（约 350 字）</b><br><br>开篇，作者以反复的笔法写树，为的是让寻常景物变得陌生。「一株是枣树，还有一株也是枣树」——本可一笔带过的信息被刻意拆成两半，句子因此变慢、变重，读者被迫像作者一样，把目光在两株树上逐一停留。这种近乎笨拙的重复，恰恰滤掉了观景的轻快，让开篇就笼上一层孤寂而固执的调子，也为整篇夜的独语定了速度。<br><br>继而，作者将夜空拟人化，以写出它的冷漠与疏离。天空被称作「他」，「奇怪而高」，甚至「仿佛要离开人间而去」——本应笼罩万物的夜空，竟成了一个急于抽身、不愿与人间相认的存在。「离开」与「不再看见」两词，把物理的高远改写成情感上的弃绝，天地之间由此拉开一道冷冷的缝隙。这份被天空「背过身去」的孤独感，正是全文夜之寒意的源头，也让后文枣树独自直刺天空的姿态，有了对手与分量。<br><br><span style="font-size:12.5px;color:var(--sub)">🖊 简批：两段第一句都是「点」；引文短而带引号；「析」各三句以上，全部在回答「如何」；结尾各有一句「联」。对照自查：你的「析」是否也在讲机制，而不是复述内容？</span></div>'})
 +'</div>';
 return h;
},
mount:function(){mountEssay({id:'w16',minChars:260,checklist:[1,1,1,1,1],model:1})}},

html:function(){
 var h='<div class="blk"><h3><span class="kicker k-learn">考前一分钟</span></h3>'
 +'<p>脚手架今天全拆。你手里有的：五段骨架（P1）、三句式两句式（P2 / P4）、点释证析结（P3）、六件兵器（W1–W6）、15 张素材卡、45 分钟切分法（P8）——全在图鉴里，但<b>开考后尽量不翻</b>，考场没有图鉴。点「开始限时」即视为开考。</p></div>';

 +essayHTML({id:'w18',minChars:550,timed:45,
  prompt:'<p class="stem"><b>题目：</b>人工智能时代，我们还需要背诵与记忆吗？<br><span style="font-size:13px;color:var(--sub)">写一篇不少于 550 字的议论文，观点明确，论证充分。</span></p>',
  checklist:['结构五段完整（引论 + 三分论 + 结论）','我的观点可以用一句话复述','用了让步反驳','引用与事例至少各一','留出了约 5 分钟检查，并实际改掉了错别字 / 口语词'],
  model:'<div class="quote"><b>参考范文 · 背诵不死，只是升级（约 620 字）</b><br><br>「都能搜到，为什么还要背？」——人工智能时代，这句反问几乎成了拒绝背诵的通行证。的确，机器的记忆又大又准，人脑似乎已无必要与之竞赛。但在我看来，越是外包记忆的时代，越需要背诵：<b>该升级的是背什么、怎么背，而不是要不要背</b>。<br><br>背诵首先是思考的原材料仓库。思维从不凭空运转，它靠调用脑内已有之物完成连接；正如荀子所言，「不积跬步，无以至千里」——没有存货的头脑，搜索再快也只是过路的驿站。诗句、公式、史实烂熟于心，灵感才有燃料可点。<br><br>更进一步，背诵在塑造大脑本身。记忆的过程即反复提取、组织与编码的过程，这份「慢功夫」恰是专注力与理解力的健身房。屠呦呦能从古籍的字缝里认出低温提取的灵感，靠的正是常年积累在胸中的知识底盘——机会只提示有准备的大脑，而准备，写在记忆里。<br><br>诚然，有人认为背诵是应试的遗产，理解才是王道。这话对了一半：死记硬背确应淘汰，但「理解」与「记忆」从来不是对手——不被记住的理解，考场上调不出，生活里用不上。真正该做的，是把背诵从机械复读升级为理解之上的内化：先懂，再背，背到能用。<br><br>综上所述，人工智能接管的是「存储」，接管不了「内化」。愿我们在把琐碎交给机器的同时，把最好的诗句、最硬的原理留在自己心里——因为决定一个人思想高度的，从来不是他能搜到什么，而是他随身带着什么。<br><br><span style="font-size:12.5px;color:var(--sub)">🖊 简批：开头以反问引题；两个分论递进（仓库 → 健身房）；第四段让步反驳并给出「怎么办」；引证（荀子）与例证（屠呦呦）各一；结尾升华到「搜到 vs 带着」。写完后逐段对照。</span></div>'})
 +'</div>';
 return h;
},
