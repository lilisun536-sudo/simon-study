<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simon · 暑期学习课件 v1 (2026)</title>
<style>
:root{
  --paper:#FBFBF9; --ink:#1C2733; --muted:#5B6B7B;
  --navy:#1F4E78; --navy-d:#173B5C; --sky:#EAF1F7; --sky-d:#D9E6F2;
  --rust:#B4452C; --rust-bg:#FAEFEB;
  --ok:#2F7D4F; --ok-bg:#EDF5F0;
  --line:#DCE3EA; --code-bg:#16202B; --code-ink:#D8E2EC;
}
*{box-sizing:border-box; margin:0; padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--paper); color:var(--ink);
  font-family:'Segoe UI','Microsoft YaHei','PingFang SC',sans-serif;
  font-size:15.5px; line-height:1.65;
}
::selection{background:var(--sky-d)}

/* ---------- layout ---------- */
#app{display:flex; min-height:100vh}
#rail{
  width:228px; flex-shrink:0; border-right:1px solid var(--line);
  background:#fff; position:sticky; top:0; height:100vh; overflow-y:auto;
  padding:20px 0 30px;
}
#main{flex:1; min-width:0; padding:34px 48px 90px; max-width:880px}
@media(max-width:760px){
  #app{flex-direction:column}
  #rail{width:100%; height:auto; position:static; display:flex; flex-wrap:wrap; gap:2px; padding:8px}
  #main{padding:20px 16px 70px}
}

/* ---------- rail nav ---------- */
.rail-brand{padding:0 18px 14px; border-bottom:1px solid var(--line); margin-bottom:10px}
.rail-brand .nm{font-family:Georgia,'Times New Roman',serif; font-size:19px; font-weight:700; color:var(--navy)}
.rail-brand .sub{font-size:11px; color:var(--muted); letter-spacing:.06em; margin-top:2px}
.rail-group{font-size:10.5px; letter-spacing:.14em; color:var(--muted); padding:14px 18px 4px; text-transform:uppercase}
.nav-btn{
  display:flex; align-items:center; justify-content:space-between; gap:8px;
  width:100%; text-align:left; padding:8px 18px; border:0; background:none;
  font:inherit; font-size:14px; color:var(--ink); cursor:pointer;
  border-left:3px solid transparent;
}
.nav-btn:hover{background:var(--sky)}
.nav-btn.active{background:var(--sky); border-left-color:var(--navy); color:var(--navy); font-weight:600}
.nav-btn .pct{font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums}
.nav-btn.active .pct{color:var(--navy)}
@media(max-width:760px){
  .rail-brand,.rail-group{display:none}
  .nav-btn{width:auto; border:1px solid var(--line); border-radius:4px; padding:6px 10px; font-size:13px}
  .nav-btn.active{border-color:var(--navy)}
}

/* ---------- sections ---------- */
.view{display:none}
.view.on{display:block}
.eyebrow{font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:6px}
h1.vt{font-family:Georgia,'Times New Roman',serif; font-size:30px; font-weight:700; color:var(--navy); line-height:1.25; margin-bottom:6px}
.vlead{color:var(--muted); margin-bottom:26px; max-width:640px}
h2.unit{
  font-family:Georgia,serif; font-size:21px; color:var(--navy);
  margin:40px 0 4px; padding-top:22px; border-top:1px solid var(--line);
}
h2.unit:first-of-type{margin-top:18px; border-top:0; padding-top:0}
.unit-sub{font-size:13px; color:var(--muted); margin-bottom:16px}
h3.lesson{font-size:16.5px; font-weight:700; margin:26px 0 10px; color:var(--ink)}
h3.lesson .tag{font-size:11px; font-weight:600; color:var(--navy); background:var(--sky); padding:2px 8px; border-radius:3px; margin-left:8px; vertical-align:2px}

/* ---------- cards / common ---------- */
.card{background:#fff; border:1px solid var(--line); border-radius:6px; padding:20px 22px; margin:14px 0}
.card p{margin:0 0 10px} .card p:last-child{margin-bottom:0}
.note{background:var(--sky); border:1px solid var(--sky-d); border-radius:6px; padding:12px 16px; margin:14px 0; font-size:14px}
.warn{background:var(--rust-bg); border:1px solid #E8C9BE; border-radius:6px; padding:12px 16px; margin:14px 0; font-size:14px}
.cn{color:var(--muted); font-size:13.5px; border-left:3px solid var(--sky-d); padding-left:12px; margin:10px 0}
.terms{display:flex; flex-wrap:wrap; gap:8px; margin:12px 0}
.term{font-size:12.5px; background:#fff; border:1px solid var(--line); border-radius:4px; padding:4px 10px}
.term b{color:var(--navy)}
pre.code{
  background:var(--code-bg); color:var(--code-ink); border-radius:6px;
  padding:14px 18px; overflow-x:auto; font-family:Consolas,'Courier New',monospace;
  font-size:13.5px; line-height:1.6; margin:12px 0;
}
pre.code .cm{color:#7E94A8}
table.tb{border-collapse:collapse; width:100%; margin:12px 0; font-size:14px}
table.tb th{background:var(--navy); color:#fff; font-weight:600; padding:7px 10px; text-align:left}
table.tb td{border:1px solid var(--line); padding:7px 10px; background:#fff}
table.tb tr:nth-child(even) td{background:#F6F8FA}

/* ---------- quiz ---------- */
.q{background:#fff; border:1px solid var(--line); border-radius:6px; padding:16px 18px; margin:12px 0}
.q .stem{font-weight:600; margin-bottom:10px}
.q .stem .qno{color:var(--navy); margin-right:6px}
.opt{
  display:block; width:100%; text-align:left; font:inherit; font-size:14.5px;
  background:#fff; border:1px solid var(--line); border-radius:5px;
  padding:9px 13px; margin:6px 0; cursor:pointer; color:var(--ink);
}
.opt:hover{border-color:var(--navy); background:var(--sky)}
.q.done .opt{cursor:default; opacity:.62}
.q.done .opt:hover{border-color:var(--line); background:#fff}
.q.done .opt.sel{opacity:1; border-width:2px}
.q.done .opt.sel.right{border-color:var(--ok); background:var(--ok-bg)}
.q.done .opt.sel.wrong{border-color:var(--rust); background:var(--rust-bg)}
.q.done .opt.key{opacity:1; border-color:var(--ok); background:var(--ok-bg)}
.exp{display:none; margin-top:10px; font-size:14px; background:#F6F8FA; border-radius:5px; padding:10px 14px}
.q.done .exp{display:block}
.verdict{display:none; font-weight:700; font-size:13px; margin-top:8px}
.q.done .verdict{display:block}
.verdict.right{color:var(--ok)} .verdict.wrong{color:var(--rust)}

/* trace input */
.trace{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin:8px 0}
.trace label{font-size:13.5px; color:var(--muted); min-width:150px}
.trace input{
  font-family:Consolas,monospace; font-size:14px; padding:7px 10px;
  border:1px solid var(--line); border-radius:5px; width:150px;
}
.trace .mark{font-size:13px; font-weight:700; min-width:120px}
.trace .mark.right{color:var(--ok)} .trace .mark.wrong{color:var(--rust)}

/* buttons */
.btn{
  font:inherit; font-size:14px; font-weight:600; cursor:pointer;
  background:var(--navy); color:#fff; border:1px solid var(--navy);
  border-radius:5px; padding:8px 16px;
}
.btn:hover{background:var(--navy-d)}
.btn.ghost{background:#fff; color:var(--navy)}
.btn.ghost:hover{background:var(--sky)}
.btn.sm{font-size:13px; padding:5px 12px}
.btn.warn-b{background:var(--rust); border-color:var(--rust)}
.btnrow{display:flex; gap:10px; flex-wrap:wrap; margin:12px 0}

/* diagnostic items */
.diag{background:#fff; border:1px solid var(--line); border-radius:6px; padding:16px 18px; margin:12px 0}
.diag .dstem{margin-bottom:8px}
.diag .dstem .qno{font-weight:700; color:var(--navy); margin-right:6px}
.diag .topic{font-size:11px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase}
.sol{display:none; background:#F6F8FA; border-radius:5px; padding:12px 14px; margin:10px 0; font-size:14px}
.sol.open{display:block}
.clsrow{display:flex; gap:6px; flex-wrap:wrap; margin-top:10px}
.clsbtn{font:inherit; font-size:12.5px; padding:6px 10px; border-radius:4px; border:1px solid var(--line); background:#fff; cursor:pointer}
.clsbtn:hover{border-color:var(--navy)}
.clsbtn.on{color:#fff; font-weight:700}
.clsbtn.on[data-cls="A"]{background:var(--ok); border-color:var(--ok)}
.clsbtn.on[data-cls="B"]{background:#7A9A3D; border-color:#7A9A3D}
.clsbtn.on[data-cls="C"]{background:#C77F2E; border-color:#C77F2E}
.clsbtn.on[data-cls="D"]{background:var(--rust); border-color:var(--rust)}

/* progress bars */
.pbar{height:7px; background:var(--sky); border-radius:4px; overflow:hidden; margin-top:6px}
.pbar i{display:block; height:100%; background:var(--navy); border-radius:4px; transition:width .3s}
.modrow{display:flex; align-items:center; gap:14px; padding:10px 0; border-bottom:1px solid var(--line)}
.modrow:last-child{border-bottom:0}
.modrow .mn{flex:1; font-size:14.5px}
.modrow .mp{width:46%; min-width:160px}
.modrow .pcttx{width:44px; text-align:right; font-size:13px; color:var(--muted); font-variant-numeric:tabular-nums}

/* masthead 学籍卡 */
.mast{
  border:1px solid var(--navy); border-radius:8px; overflow:hidden; margin-bottom:24px; background:#fff;
}
.mast .mt-top{background:var(--navy); color:#fff; padding:14px 22px; display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:6px}
.mast .mt-top .nm{font-family:Georgia,serif; font-size:22px; font-weight:700}
.mast .mt-top .pr{font-size:12px; letter-spacing:.08em; opacity:.92}
.mast .mt-body{padding:16px 22px; display:flex; gap:30px; flex-wrap:wrap; align-items:center}
.mast .stat .k{font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted)}
.mast .stat .v{font-family:Georgia,serif; font-size:24px; color:var(--navy); font-weight:700; font-variant-numeric:tabular-nums}
.dotrail{display:flex; gap:7px; align-items:center; margin-left:auto}
.dotrail .wk{width:17px; height:17px; border-radius:50%; border:2px solid var(--navy); background:#fff; position:relative}
.dotrail .wk.half{background:linear-gradient(90deg,var(--navy) 50%,#fff 50%)}
.dotrail .wk.full{background:var(--navy)}
.dotrail .lbl{font-size:10.5px; color:var(--muted); margin-left:4px}

/* mistakes */
.mk{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); font-size:14px}
.mk:last-child{border-bottom:0}
.mk .ml{flex:1}
.mk .md{font-size:12px; color:var(--muted); white-space:nowrap}

/* vocab flashcard */
.fcwrap{max-width:480px}
.fcstat{display:flex; gap:18px; font-size:13px; color:var(--muted); margin-bottom:12px; flex-wrap:wrap}
.fcstat b{color:var(--navy)}
.fcard{
  background:#fff; border:1px solid var(--line); border-radius:8px;
  min-height:200px; padding:26px; display:flex; flex-direction:column;
  justify-content:center; align-items:center; text-align:center; cursor:pointer;
}
.fcard .w{font-family:Georgia,serif; font-size:30px; color:var(--navy); font-weight:700}
.fcard .pos{font-size:13px; color:var(--muted); font-style:italic; margin-top:2px}
.fcard .back{display:none; font-size:15px}
.fcard.flip .front{display:none}
.fcard.flip .back{display:block}
.fcard .back .df{margin-bottom:6px}
.fcard .back .cnz{color:var(--muted); margin-bottom:8px}
.fcard .back .ex{font-style:italic; font-size:14px; color:var(--muted)}
.gradebtns{display:flex; gap:10px; margin-top:14px; justify-content:center}

/* ordering exercise */
.ord .pool{display:flex; flex-direction:column; gap:8px; margin:10px 0}
.ord .pick{font:inherit; text-align:left; background:#fff; border:1px solid var(--line); border-radius:5px; padding:9px 13px; cursor:pointer; font-size:14px}
.ord .pick:hover{border-color:var(--navy)}
.ord .pick.used{opacity:.35; cursor:default}
.ord .seq{min-height:34px; background:var(--sky); border-radius:5px; padding:10px 14px; font-size:14px; margin:8px 0}

/* listening */
.dict{background:#fff; border:1px solid var(--line); border-radius:6px; padding:14px 16px; margin:10px 0}
.dict input{font:inherit; font-size:14.5px; width:100%; padding:8px 11px; border:1px solid var(--line); border-radius:5px; margin:8px 0}
.dict .diff{font-size:14px; margin-top:6px; line-height:1.9}
.dict .diff .hit{background:var(--ok-bg); color:var(--ok); padding:1px 4px; border-radius:3px; margin-right:3px}
.dict .diff .miss{background:var(--rust-bg); color:var(--rust); padding:1px 4px; border-radius:3px; margin-right:3px; text-decoration:line-through}

/* essays */
textarea.ess{
  width:100%; min-height:230px; font:inherit; font-size:14.5px; line-height:1.7;
  padding:14px; border:1px solid var(--line); border-radius:6px; resize:vertical; background:#fff;
}
.wc{font-size:12.5px; color:var(--muted); text-align:right; margin-top:4px; font-variant-numeric:tabular-nums}
.rubgrid{display:grid; grid-template-columns:1fr auto; gap:8px 14px; align-items:center; max-width:480px; margin:10px 0}
.rubgrid label{font-size:14px}
.rubgrid select{font:inherit; padding:5px 8px; border:1px solid var(--line); border-radius:4px}

/* checklist & planner */
.ckrow{display:flex; gap:10px; align-items:flex-start; padding:7px 0; font-size:14.5px}
.ckrow input{margin-top:4px; width:16px; height:16px; accent-color:var(--navy); flex-shrink:0}
.ckrow.done label{color:var(--muted); text-decoration:line-through}
.wkcard{background:#fff; border:1px solid var(--line); border-radius:6px; padding:16px 20px; margin:12px 0}
.wkcard h4{font-family:Georgia,serif; color:var(--navy); font-size:16px; margin-bottom:4px}
.wkcard .wsub{font-size:12.5px; color:var(--muted); margin-bottom:8px}
.wkcard.future{background:#F6F8FA; border-style:dashed}

/* reveal toggles */
details.rv{margin:10px 0; border:1px solid var(--line); border-radius:6px; background:#fff}
details.rv summary{cursor:pointer; padding:10px 16px; font-weight:600; font-size:14px; color:var(--navy)}
details.rv .rvb{padding:0 16px 14px}

footer{margin-top:60px; padding-top:16px; border-top:1px solid var(--line); font-size:12px; color:var(--muted)}
:focus-visible{outline:2px solid var(--navy); outline-offset:2px}
@media (prefers-reduced-motion:reduce){ *{transition:none!important} }
</style>
</head>
<body>
<div id="app">
  <nav id="rail">
    <div class="rail-brand">
      <div class="nm">Summer Console</div>
      <div class="sub">SIMON SUN · 2026 · v1.2</div>
    </div>
    <div class="rail-group">总览</div>
    <button class="nav-btn" data-nav="dash">仪表盘 <span class="pct" data-pct="all"></span></button>
    <button class="nav-btn" data-nav="guide">使用说明</button>
    <div class="rail-group">深做模块 · V1</div>
    <button class="nav-btn" data-nav="psy">心理学 <span class="pct" data-pct="psy"></span></button>
    <button class="nav-btn" data-nav="java">Java 入门 <span class="pct" data-pct="java"></span></button>
    <button class="nav-btn" data-nav="math">数学诊断 <span class="pct" data-pct="math"></span></button>
    <button class="nav-btn" data-nav="writing">英语 · 写作 <span class="pct" data-pct="writing"></span></button>
    <button class="nav-btn" data-nav="vocab">英语 · 词汇卡</button>
    <button class="nav-btn" data-nav="listen">英语 · 听力 <span class="pct" data-pct="listen"></span></button>
    <button class="nav-btn" data-nav="econ">经济学 <span class="pct" data-pct="econ"></span></button>
    <div class="rail-group">维持模块 · V1</div>
    <button class="nav-btn" data-nav="sci">理化 G9 题库 <span class="pct" data-pct="sci"></span></button>
    <div class="rail-group">计划</div>
    <button class="nav-btn" data-nav="plan">9 周计划器</button>
  </nav>
  <main id="main">
    <section class="view" id="v-dash"></section>
    <section class="view" id="v-guide"></section>
    <section class="view" id="v-psy"></section>
    <section class="view" id="v-java"></section>
    <section class="view" id="v-math"></section>
    <section class="view" id="v-writing"></section>
    <section class="view" id="v-vocab"></section>
    <section class="view" id="v-listen"></section>
    <section class="view" id="v-econ"></section>
    <section class="view" id="v-sci"></section>
    <section class="view" id="v-plan"></section>
    <footer>20260611_Simon暑期课件_v1.2 · 单机离线运行 · 数据保存在本机浏览器，请每周用仪表盘"导出存档"备份 · 反馈回传给 Claude 生成 v2</footer>
  </main>
</div>
<script>
"use strict";
/* =====================================================
   CONTENT — 全部课程数据
   ===================================================== */
const CONTENT = {};
/* ---------- 心理学 ---------- */
CONTENT.psy = {
 vt:'心理学 Psychology', eyebrow:'MODULE 01 · 预习 + 元学习引擎',
 lead:'这是整个暑假的发动机。Unit 0 用心理学研究教你"怎么学"——本课件的每一个设计（自测、间隔复习、错题重现）都建立在这些研究之上。Unit 1 进入心理学本体：它如何作为一门科学运作。',
 units:[
 {t:'Unit 0 · The Psychology of Learning 学习的心理学', sub:'4 课 · 每课约 25 分钟 · 先读英文正文，遇到生词看下方词条，再做自测',
  lessons:[
  {t:'0.1 The Testing Effect — 为什么"自测"本身就是学习', tag:'V1 完整',
   read:`<p>In 2006, psychologists Henry Roediger and Jeffrey Karpicke ran a deceptively simple experiment. College students studied a short science passage. One group re-read it four times (Study-Study-Study-Study). Another group read it once, then spent the remaining sessions trying to <b>recall</b> it from memory — closing the text and writing down everything they could remember (Study-Test-Test-Test).</p>
   <p>Five minutes after the final session, the re-readers looked better: they remembered more. But one week later, the result flipped dramatically. The re-reading group had forgotten much of the material, retaining roughly 40%. The self-testing group retained roughly 60% — about half as much again, from the <i>same total study time</i>.</p>
   <p>This is the <b>testing effect</b> (also called <b>retrieval practice</b>): the act of pulling information out of your memory strengthens it far more than pushing it back in by re-reading. Re-reading feels good because the text becomes fluent and familiar — but familiarity is not knowledge. Psychologists call this trap the <b>fluency illusion</b>: "it looks familiar" masquerading as "I know it".</p>
   <p>The practical rule is brutal and simple: <b>close the book, recall, check, repeat.</b> Every quiz in this courseware exists because of this experiment.</p>`,
   cn:'重读让文字变得眼熟，"眼熟"会伪装成"我会了"——这就是流利错觉。检索（回忆）不是检查学习的工具，检索本身就是学习。',
   terms:[
    {en:'retrieval practice',cn:'检索练习',d:'actively recalling information from memory'},
    {en:'testing effect',cn:'测试效应',d:'memory improves more from self-testing than re-studying'},
    {en:'fluency illusion',cn:'流利错觉',d:'mistaking familiarity for real knowledge'},
    {en:'retention',cn:'保持/记忆留存',d:'how much information is kept over time'}],
   quiz:[
    {q:'In Roediger & Karpicke (2006), which group remembered more after one week?',
     o:['The group that re-read the passage four times','The group that read once and self-tested three times','Both groups remembered the same amount','The result depended on students\u2019 IQ'],a:1,
     e:'Five minutes after studying, re-readers led. One week later, the self-testing group retained roughly 60% vs roughly 40% — retrieval wins where it matters: long-term.'},
    {q:'The "fluency illusion" describes:',
     o:['Reading too quickly and missing details','Feeling that you know material because re-reading makes it look familiar','Being fluent in two languages','Forgetting material under exam stress'],a:1,
     e:'Familiarity from smooth re-reading masquerades as knowledge. The only honest check is closing the book and recalling.'},
    {q:'It is the night before an Economics test. Based on this lesson, the most effective use of one hour is:',
     o:['Highlight the textbook chapter again','Re-read your notes four times','Close your notes and write down everything you remember, then check the gaps','Copy your notes out neatly'],a:2,
     e:'Recall-then-check is retrieval practice. Highlighting and re-reading mostly build the fluency illusion.'}],
   reflect:{id:'psy_u0l1_r', p:'回想你上学期经济期末是怎么复习的——属于"重读型"还是"检索型"？具体写 2-3 句（中英文都行）。'}},

  {t:'0.2 Spacing — 遗忘曲线与间隔复习', tag:'V1 完整',
   read:`<p>In the 1880s, Hermann Ebbinghaus memorised thousands of nonsense syllables and tested himself at intervals — the first systematic study of forgetting. His result, the <b>forgetting curve</b>, still holds: forgetting is steepest in the first day or two, then flattens. Most of what you "learn" today is gone by the weekend — unless you interrupt the curve.</p>
   <p>The interruption is called the <b>spacing effect</b>. Reviews spread over time produce far stronger memory than the same total time spent in one block (<b>cramming</b> / massed practice). Large reviews covering hundreds of experiments confirm it across ages and subjects. A useful rule of thumb from this research: set the gap between reviews at roughly <b>10–20% of how long you want to remember the material</b>. Want it solid for a month? Review every 3–6 days. For an exam a year away? Space reviews weeks apart.</p>
   <p>Spacing feels worse while you do it — recall is harder after a gap — but that difficulty is exactly what strengthens the memory. Psychologists call this a <b>desirable difficulty</b>.</p>
   <p>This courseware applies the rule automatically: items you mark as "卡住" or "完全不会" resurface in your 错题本 for review after 3 days and again after 7.</p>`,
   cn:'间隔复习当下感觉更费劲（因为隔了几天回忆更难），但正是这种"难"在加固记忆——叫做"合意困难"。临时抱佛脚赢在明天，间隔复习赢在月底。',
   terms:[
    {en:'forgetting curve',cn:'遗忘曲线',d:'memory loss is fastest right after learning, then levels off'},
    {en:'spacing effect',cn:'间隔效应',d:'spread-out reviews beat one massive session'},
    {en:'cramming / massed practice',cn:'突击式复习',d:'studying everything in one long block'},
    {en:'desirable difficulty',cn:'合意困难',d:'effortful learning that feels worse but works better'}],
   quiz:[
    {q:'According to the forgetting curve, when is forgetting fastest?',
     o:['In the first day or two after learning','About one week after learning','One month after learning','Forgetting happens at a constant speed'],a:0,
     e:'The curve drops steeply at first and then flattens — which is why a quick review tomorrow is worth more than a long review next month.'},
    {q:'You want to remember IGCSE Economics definitions solidly for a test in 30 days. The rule of thumb suggests reviewing roughly every:',
     o:['Every day without gaps','Every 3–6 days','Every 15 days','Only on the last day'],a:1,
     e:'10–20% of 30 days = 3–6 days between reviews.'},
    {q:'Spaced review often feels harder than cramming because recall is effortful after a gap. This difficulty is:',
     o:['A sign you should go back to cramming','Evidence the material is too hard for you','A "desirable difficulty" that strengthens memory','Caused by poor sleep'],a:2,
     e:'The effort of retrieval after a delay is the mechanism, not a malfunction.'}],
   reflect:{id:'psy_u0l2_r', p:'设计你自己的间隔：这个暑假你最想在 9 月还记得的一样东西是什么？按 10–20% 规则，它的复习间隔应该是几天？'}},

  {t:'0.3 Sleep — 记忆在睡眠中完成', tag:'V1 完整',
   read:`<p>Learning does not end when you close the laptop. During deep sleep, the brain <b>replays</b> the day's new memories: the hippocampus (a temporary holding area) re-activates them and gradually transfers them to the cortex for long-term storage. This process is called <b>consolidation</b> — and it cannot be skipped, postponed, or replaced by caffeine.</p>
   <p>The cost of skipping it is measurable. In sleep-laboratory studies, participants deprived of a night's sleep showed dramatically reduced ability to form <i>new</i> memories the next day — in one well-known study, a deficit of around 40% compared with rested participants. An all-nighter before an exam is therefore a double loss: last night's material never consolidates, and today's brain cannot encode properly either.</p>
   <p>For a 16-year-old, the research consensus recommends <b>8–10 hours</b>. Two practical enemies: late-night screens (bright light delays the sleep signal; the feed is engineered to hold you) and irregular schedules (the consolidation system works best on rhythm).</p>
   <p>The summer arrangement in your weekly plan — no study after 21:00, screens away before bed — is not parental decoration. It is memory engineering.</p>`,
   cn:'睡眠不是学习的休止符，是学习的下半场。海马体在深睡中把白天的新记忆"转存"到皮层——通宵复习等于把上下半场一起放弃。',
   terms:[
    {en:'consolidation',cn:'记忆巩固',d:'sleep-time transfer of memories into long-term storage'},
    {en:'hippocampus',cn:'海马体',d:'brain region that temporarily holds new memories'},
    {en:'cortex',cn:'大脑皮层',d:'long-term storage site of consolidated memories'},
    {en:'encode',cn:'编码',d:'the initial forming of a memory'}],
   quiz:[
    {q:'During consolidation, new memories are transferred from:',
     o:['Cortex to hippocampus','Hippocampus to cortex','Short-term memory to the eyes','Left brain to right brain'],a:1,
     e:'The hippocampus is the temporary buffer; deep sleep replays and ships memories to the cortex.'},
    {q:'Why is an all-nighter before an exam a "double loss"?',
     o:['You waste electricity and time','Yesterday\u2019s learning never consolidates AND today\u2019s brain encodes poorly','Teachers can tell you didn\u2019t sleep','You will be hungry during the exam'],a:1,
     e:'No sleep = no consolidation of what you studied + roughly 40% weaker encoding of new material the next day in lab studies.'},
    {q:'The recommended sleep range for a 16-year-old is:',
     o:['5–6 hours','6–7 hours','8–10 hours','11–12 hours'],a:2,
     e:'Research consensus for teenagers is 8–10 hours; most teens chronically run below it.'}],
   reflect:{id:'psy_u0l3_r', p:'诚实记录：过去一周你平均几点睡、睡了几小时？和 8–10 小时的差距是多少？'}},

  {t:'0.4 Motivation — 自我决定理论与"奖励的陷阱"', tag:'V1 完整',
   read:`<p>Why do you open Psychology videos voluntarily but need to be pushed toward Physics? The most influential modern answer is <b>Self-Determination Theory</b> (Deci & Ryan). It claims motivation thrives when three psychological needs are met:</p>
   <p><b>Autonomy</b> — feeling that you chose the activity; <b>Competence</b> — feeling yourself getting visibly better; <b>Relatedness</b> — feeling connected to people who care about what you do. Remove any one, and motivation degrades from "I want to" (<b>intrinsic</b>) into "I have to" (<b>extrinsic</b>).</p>
   <p>A famous warning comes from a 1973 experiment by Lepper and colleagues. Preschoolers who loved drawing were promised a shiny certificate for drawing. Later, in free-play time, the rewarded children drew <i>less</i> than children who had never been rewarded. The external reward had quietly replaced the internal one — psychologists call this the <b>overjustification effect</b>. Translation for you: be careful about attaching rewards (money, treats, even points) to things you already enjoy, like Psychology or Economics reading. Rewards are for jump-starting cold engines, not for engines already running.</p>
   <p>This is also why the summer plan gives you choices (which book, which day off, task order) and visible progress bars — autonomy and competence are designed in, not hoped for.</p>`,
   cn:'外部奖励会悄悄"替换"内在动机——对你已经喜欢的事（心理学、经济阅读），不要设奖励；奖励只用于冷启动你不喜欢的事。这个课件给你选择权和可见的进度条，就是在喂养自主感和胜任感。',
   terms:[
    {en:'Self-Determination Theory (SDT)',cn:'自我决定理论',d:'motivation needs autonomy, competence, relatedness'},
    {en:'intrinsic motivation',cn:'内在动机',d:'doing something because it is interesting in itself'},
    {en:'extrinsic motivation',cn:'外在动机',d:'doing something for an external reward or pressure'},
    {en:'overjustification effect',cn:'过度合理化效应',d:'external rewards can crowd out existing interest'}],
   quiz:[
    {q:'The three needs in Self-Determination Theory are:',
     o:['Money, grades, praise','Autonomy, competence, relatedness','Food, safety, belonging','Discipline, repetition, reward'],a:1,
     e:'Autonomy (I chose it), competence (I\u2019m getting better), relatedness (people I\u2019m connected to care).'},
    {q:'In Lepper et al. (1973), children rewarded for drawing later drew less in free time. This is called:',
     o:['The testing effect','The forgetting curve','The overjustification effect','The fluency illusion'],a:2,
     e:'The expected external reward displaced the activity\u2019s own internal reward.'},
    {q:'Based on this lesson, which plan is most likely to BACKFIRE?',
     o:['Paying yourself ¥50 for every Psychology chapter you read for fun','Using a checklist to track Java progress','Choosing your own order of daily tasks','Discussing Economics articles with your father'],a:0,
     e:'Psychology reading is already intrinsically motivated — attaching money risks the overjustification effect. Save rewards for genuinely cold tasks.'}],
   reflect:{id:'psy_u0l4_r', p:'这份暑假计划里，哪一部分给了你自主感？哪一部分让你觉得"被强迫"？各写一条，诚实写——这条会直接影响 v2 怎么改。'}}
 ]},
 {t:'Unit 1 · Psychology as a Science 心理学如何成为科学', sub:'3 课 · 研究方法是 IB 心理学的脊柱——新版 IB 大纲的内部评估就是设计一份研究提案',
  lessons:[
  {t:'1.1 Empirical, not common sense — 经验科学 vs 常识', tag:'V1 完整',
   read:`<p>Everyone has theories about minds — that is exactly the problem. Psychology earns the word "science" only by being <b>empirical</b>: claims must be tested against systematically collected evidence, not against what feels true.</p>
   <p>Common sense fails often. "We only use 10% of our brains" — false; imaging shows nearly all regions active across a normal day. "Opposites attract" — decades of relationship research find the reverse: similarity predicts attraction far better. If common sense were reliable, psychology would be unnecessary; because it is unreliable, psychology is a science with instruments, controls and statistics.</p>
   <p>Two tools make claims testable. <b>Falsifiability</b>: a scientific claim must, in principle, be capable of being proven wrong by some observable result — "studying with music lowers recall accuracy" is falsifiable; "music changes your soul" is not. <b>Operationalisation</b>: vague concepts must be turned into measurable definitions. You cannot measure "aggression" directly, but you can count "number of times a child hits an inflatable doll in 20 minutes" — now it is data.</p>`,
   cn:'科学心理学和"人生经验"的区别在于两个工具：可证伪性（你的说法必须可能被证明是错的）和操作化定义（把模糊概念变成可测量的指标）。',
   terms:[
    {en:'empirical',cn:'实证的',d:'based on systematic observation and evidence'},
    {en:'falsifiability',cn:'可证伪性',d:'a claim must be capable of being proven wrong'},
    {en:'operationalisation',cn:'操作化定义',d:'turning a vague concept into something measurable'}],
   quiz:[
    {q:'Which statement is FALSIFIABLE?',
     o:['"Some people have hidden inner energy"','"Students who sleep 8 hours score higher on memory tests than students who sleep 5 hours"','"Everything happens for a reason"','"Music speaks to the heart"'],a:1,
     e:'It predicts an observable, measurable difference that an experiment could prove wrong. The others cannot fail any test.'},
    {q:'"Number of words recalled from a 20-word list after 10 minutes" is an example of:',
     o:['A falsifiable theory','An operationalised measure of memory','A case study','Common sense'],a:1,
     e:'It converts the vague concept "memory" into a countable measurement.'},
    {q:'Why does psychology need to be empirical rather than relying on common sense?',
     o:['Common sense is often wrong when tested (e.g. the 10% brain myth)','Common sense is always wrong','Scientists are smarter than ordinary people','Statistics are required by law'],a:0,
     e:'Intuitions frequently fail systematic tests — which is the entire justification for doing the science.'}],
   reflect:{id:'psy_u1l1_r', p:'写一条你听过的关于"学习"或"人"的常识说法，然后把它改写成一个可证伪的、操作化的研究问题。'}},

  {t:'1.2 Research Methods — 实验、相关与因果', tag:'V1 完整',
   read:`<p>The <b>experiment</b> is psychology's sharpest tool because it can establish cause. The researcher changes one thing — the <b>independent variable (IV)</b> — and measures its effect on another — the <b>dependent variable (DV)</b> — while holding everything else constant. Participants are split into an experimental group and a <b>control group</b>, ideally by <b>random allocation</b>, so the groups start equivalent.</p>
   <p>Example: give one class a spaced revision schedule and another class a massed schedule (IV = revision schedule), then compare their test scores (DV = score). If allocation was random and conditions otherwise identical, a difference in scores can be attributed to the schedule.</p>
   <p>A <b>correlational study</b> only measures whether two variables move together — say, hours of phone use and anxiety scores. Correlation can be strong, but it cannot prove cause. The classic illustration: ice-cream sales correlate with drowning deaths. Ice cream does not cause drowning; a hidden third variable — summer heat — drives both. Memorise the mantra: <b>correlation is not causation</b>.</p>
   <p>A <b>case study</b> examines one unusual individual in depth — rich detail, weak generalisation. (Unit 2 will introduce H.M., the most famous case in memory research.)</p>`,
   cn:'实验能证明因果（因为研究者主动操纵自变量、随机分组）；相关研究只能说明两个变量一起变动——背后可能藏着第三变量。冰淇淋销量与溺水的相关，是夏天的高温在背后驱动两者。',
   terms:[
    {en:'independent variable (IV)',cn:'自变量',d:'the factor the researcher deliberately changes'},
    {en:'dependent variable (DV)',cn:'因变量',d:'the outcome that is measured'},
    {en:'control group',cn:'控制组',d:'baseline group not receiving the treatment'},
    {en:'random allocation',cn:'随机分配',d:'assigning participants to groups by chance'},
    {en:'correlation',cn:'相关',d:'two variables moving together; not proof of cause'}],
   quiz:[
    {q:'Researchers give Class A a spaced revision schedule and Class B a massed schedule, then compare test scores. The IV is:',
     o:['The test scores','The revision schedule (spaced vs massed)','The students\u2019 intelligence','The classroom'],a:1,
     e:'The IV is what the researcher manipulates; the DV is the measured outcome (scores).'},
    {q:'In the same study, the DV is:',
     o:['The revision schedule','The number of students','The test scores','The teacher'],a:2,e:'The DV is the measured result.'},
    {q:'Ice-cream sales correlate with drowning deaths because:',
     o:['Ice cream impairs swimming','Drowning makes people buy ice cream','A third variable (summer heat) increases both','The data must be fake'],a:2,
     e:'A lurking third variable can create correlation without causation.'},
    {q:'Which method can establish CAUSE?',
     o:['A well-designed experiment with random allocation','A correlational survey','A single case study','Reading many news articles'],a:0,
     e:'Only manipulation + control + random allocation isolates cause.'}],
   reflect:{id:'psy_u1l2_r', p:'你爸的判断"孩子成绩不好是因为不主动"——这是因果结论还是相关观察？如果让你设计研究检验它，IV 和 DV 分别是什么？'}},

  {t:'1.3 Classic Study — Loftus & Palmer (1974) 记忆是重建的', tag:'V1 完整',
   read:`<p>Can a single word rewrite a memory? Elizabeth Loftus and John Palmer showed 45 students short films of car accidents, then asked one critical question with the verb varied between groups: "About how fast were the cars going when they <b>smashed / collided / bumped / hit / contacted</b> each other?"</p>
   <p>Same film, different verb — different memory. The "smashed" group estimated about <b>40.5 mph</b> on average; the "contacted" group about <b>31.8 mph</b>. One word shifted the remembered speed by nearly 9 mph.</p>
   <p>A second experiment went further. A week later, participants were asked: "Did you see any broken glass?" There was none in the film. Yet participants who had heard "smashed" said yes about twice as often as those who heard "hit". The verb had not just biased a number — it had planted a detail that was never there.</p>
   <p>The conclusion reshaped both psychology and the law: memory is not a video recording that is played back; it is <b>reconstructed</b> at the moment of recall, and the reconstruction can be steered by <b>leading questions</b>. This is why police interview protocols and courtroom rules about eyewitness testimony were rewritten in the decades after this study.</p>`,
   cn:'记忆不是录像回放，是每次回忆时的"现场重建"——而重建过程会被提问的措辞引导。一个动词让被试"记得"看见了从未存在的碎玻璃。',
   terms:[
    {en:'reconstructive memory',cn:'重建性记忆',d:'memories are rebuilt at recall, not replayed'},
    {en:'leading question',cn:'诱导性提问',d:'wording that steers the answer'},
    {en:'eyewitness testimony',cn:'目击者证词',d:'court evidence from people who saw an event'}],
   quiz:[
    {q:'The IV in Loftus & Palmer\u2019s first experiment was:',
     o:['The speed of the cars in the film','The verb used in the question','The age of the participants','The length of the film'],a:1,
     e:'Everyone saw the same films; only the verb changed between groups.'},
    {q:'The "broken glass" result matters because:',
     o:['There really was glass in the film','It shows a single word can create a false detail in memory','Participants were lying','Glass is easy to remember'],a:1,
     e:'No glass existed — yet "smashed" participants reported it about twice as often. The memory was reconstructed with an invented detail.'},
    {q:'The study\u2019s biggest real-world impact was on:',
     o:['Car safety design','How courts and police treat eyewitness testimony and question wording','Film-making techniques','Driving-school curricula'],a:1,
     e:'It demonstrated that questioning style can contaminate testimony — directly influencing interview protocols.'}],
   reflect:{id:'psy_u1l3_r', p:'Mini 设计任务：设计一个研究，检验"聊天记录里的表情包是否会改变人对对话内容的记忆"。写出你的 IV、DV，以及怎样分组。这是新版 IB 心理学内部评估（研究提案）的微缩练习。'}}
 ]},

 {t:'Unit 1 · 程序的解剖学', sub:'4 课 · 计算思维 → 第一个程序 → 变量与类型 → 输入输出',
  lessons:[
  {t:'1.1 What is a program? 计算思维', tag:'V1 完整',
   read:`<p>A program is a set of instructions so precise that a machine with zero common sense can follow them. That last part is the whole difficulty. Tell a friend "make tea" and they fill in a hundred missing steps automatically. A computer fills in nothing.</p>
   <p>Try it: write instructions for a robot to make a cup of tea. "Put the teabag in the cup" — which cup? Where is it? Is your hand empty? "Pour hot water" — how much? When do you stop? Every ambiguity you discover is the gap between human language and an <b>algorithm</b>: a finite, exact, ordered sequence of steps.</p>
   <p>Every algorithm in every language is built from just three structures: <b>sequence</b> (do A, then B, then C), <b>selection</b> (IF a condition holds, do this, ELSE do that), and <b>iteration</b> (REPEAT something while a condition holds). Master these three and you can, in principle, express any computation. Unit 1 covers sequence; Unit 2 covers selection and iteration.</p>`,
   cn:'编程的困难不在记语法，在于把"人类默认补全的常识"全部显式写出来。所有程序只由三种结构组成：顺序、选择、循环。',
   terms:[
    {en:'algorithm',cn:'算法',d:'a finite, precise, ordered set of steps'},
    {en:'sequence',cn:'顺序结构',d:'steps executed one after another'},
    {en:'selection',cn:'选择结构',d:'branching with IF / ELSE'},
    {en:'iteration',cn:'循环结构',d:'repeating steps while a condition holds'}],
   quiz:[
    {q:'"IF the water is boiling, pour it; ELSE wait 30 seconds" is an example of:',

     o:['Computers read more slowly','Computers fill in zero missing steps with common sense','Algorithms are written in English','Humans cannot follow long instructions'],a:1,

  {t:'1.2 Hello, Simon — 第一个 Java 程序', tag:'V1 完整',
   read:`<p>Here is the smallest complete Java program. Every Java journey starts by understanding all five lines:</p>`,
   code:`public class Hello {
    public static void main(String[] args) {
        System.out.println("Hello, Simon!");
    }
}`,
   read2:`<p><b>Line 1</b> — <code>public class Hello</code>: all Java code lives inside a <b>class</b>; think of it as a labelled container. The file must be saved as <code>Hello.java</code> — the name must match, capital letter and all (Java is <b>case-sensitive</b>: <code>hello</code> ≠ <code>Hello</code>).</p>
   <p><b>Line 2</b> — <code>public static void main(String[] args)</code>: the <b>entry point</b>. When you run the program, the machine looks for exactly this line and starts there. For now, memorise it as a fixed incantation; each word will earn its meaning in later units.</p>
   <p><b>Line 3</b> — <code>System.out.println("Hello, Simon!")</code>: print this text to the screen, then start a new line. Note the <b>semicolon</b> — every statement ends with one; forgetting it is the #1 beginner error.</p>
   <p><b>How it runs:</b> your source file (<code>Hello.java</code>) is first <b>compiled</b> by <code>javac</code> into bytecode (<code>Hello.class</code>), which the Java Virtual Machine then executes. Compile first, run second — two distinct steps, even when your IDE hides them behind one green button.</p>`,
   cn:'三个最常见的新手错误：忘记分号、大小写写错（println 不是 PrintLn）、文件名和类名不一致。编译（javac）和运行（java）是两个独立步骤。',
   terms:[
    {en:'class',cn:'类',d:'the container all Java code lives in'},
    {en:'main method',cn:'主方法',d:'the fixed entry point where execution starts'},
    {en:'compile',cn:'编译',d:'translate source code into bytecode before running'},
    {en:'case-sensitive',cn:'大小写敏感',d:'Hello and hello are different names'}],
   quiz:[
    {q:'Where does a Java program begin executing?',
     o:['The first line of the file','The main method','The last line','Wherever you click'],a:1,e:'The JVM looks for public static void main and starts there.'},
    {q:'What happens if you delete the semicolon after println("...")?',
     o:['Nothing, semicolons are decoration','The program prints twice','A compile error — the compiler refuses to produce bytecode','The computer restarts'],a:2,
     e:'Java will not compile a statement without its terminating semicolon. You fix it before the program can run at all.'}],
   traces:[

System.out.println(2026);`, ask:'第 1 行输出什么？', exp:'IGCSE'},

  {t:'1.3 Variables & Types 变量与类型', tag:'V1 完整',
   read:`<p>A <b>variable</b> is a named box in memory. Java insists you declare the box's <b>type</b> — what kind of thing it may hold — before using it:</p>`,
   code:`int age = 16;           <span class="cm">// integer 整数</span>
double gpa = 3.75;      <span class="cm">// decimal 小数</span>
boolean passed = true;  <span class="cm">// true / false</span>
String name = "Simon";  <span class="cm">// text — note the capital S</span>`,
   read2:`<p>Names use <b>camelCase</b> by convention: <code>reactionTime</code>, <code>totalScore</code>. Types are enforced: putting <code>"hello"</code> into an <code>int</code> box is a compile error.</p>
   <p>Two famous traps you must internalise now:</p>
   <p><b>Trap 1 — integer division.</b> When both operands are int, Java throws away the remainder: <code>7 / 2</code> is <b>3</b>, not 3.5. To get the decimal answer, at least one side must be a double: <code>7 / 2.0</code> gives 3.5. The remainder itself has its own operator: <code>7 % 2</code> gives <b>1</b> (read "7 mod 2").</p>
   <p><b>Trap 2 — the + chameleon.</b> Between numbers, <code>+</code> adds. If either side is a String, <code>+</code> glues text. Evaluation runs left to right: <code>"x" + 5 + 1</code> → "x5" then "x51". But <code>5 + 1 + "x"</code> → 6 then "6x". Same pieces, different order, different answer.</p>`,
   cn:'整数除法砍掉小数部分（7/2=3）；% 取余数（7%2=1）；+ 遇到字符串就变成"拼接"，且从左到右依次计算——这两个坑是接下来 trace 题的核心。',

    {en:'concatenation',cn:'字符串拼接',d:'joining text with +'}],

  {t:'1.4 Input & Output — 和程序对话', tag:'V1 完整',
   read:`<p>Printing is half a conversation. To read what the user types, Java uses the <b>Scanner</b>:</p>`,
   code:`import java.util.Scanner;   <span class="cm">// line 1 of the FILE, above the class</span>

public class AgeBot {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);
        System.out.println("Your name?");
        String name = sc.nextLine();
        System.out.println("Birth year?");
        int year = sc.nextInt();
        int age = 2026 - year;
        System.out.println(name + ", you turn " + age + " in 2026.");
    }
}`,
   read2:`<p><code>sc.nextLine()</code> reads a whole line of text; <code>sc.nextInt()</code> reads one integer. The last line shows + doing double duty: gluing text and numbers into one sentence.</p>
   <p><b>IDE task（在编辑器里做，做完勾选周计划）:</b> type this program in yourself — no copy-paste; your fingers need the syntax — run it, then modify it to also ask which school subject the user likes most and include it in the final sentence.</p>`,
   cn:'Scanner 是读取用户输入的工具：nextLine() 读一行文字，nextInt() 读一个整数。注意 import 语句写在文件最顶端、class 外面。',
   terms:[
    {en:'Scanner',cn:'扫描器（输入工具）',d:'reads what the user types'},
    {en:'import',cn:'导入',d:'borrowing a tool from the Java library'}],
   traces:[

System.out.println(name + ", you turn " + (2026 - 2010) + " in 2026.");`, ask:'输出什么？（完整一行，注意逗号和空格）', exp:'Lin, you turn 16 in 2026.'}],
   quiz:[
    {q:'To read an integer the user types, you call:',

 {t:'Unit 2 · 选择与循环', sub:'4 课 · if/else → while → for → 三个上机挑战',
  lessons:[
  {t:'2.1 if / else — 程序学会分叉', tag:'V1 完整',
   read:`<p>Selection lets a program respond differently to different situations:</p>`,
   code:`int score = 74;
if (score >= 80) {
    System.out.println("Distinction");
} else if (score >= 60) {
    System.out.println("Pass");
} else {
    System.out.println("Retry");
}`,
   read2:`<p>Conditions use comparison operators: <code>==</code> equal, <code>!=</code> not equal, <code>&lt;</code> <code>&gt;</code> <code>&lt;=</code> <code>&gt;=</code>. Combine them with <code>&amp;&amp;</code> (AND), <code>||</code> (OR), <code>!</code> (NOT).</p>
   <p><b>The most expensive one-character bug in programming:</b> <code>=</code> assigns; <code>==</code> compares. Writing <code>if (x = 5)</code> when you meant <code>if (x == 5)</code> has crashed real systems.</p>
   <p><b>String trap:</b> comparing text with <code>==</code> checks whether two variables point at the same memory box, not whether the letters match. For letters, always use <code>name.equals("Simon")</code>.</p>`,
   cn:'三个必须刻进肌肉记忆的点：= 是赋值、== 是比较；字符串比较用 .equals() 而不是 ==；else if 链从上往下找到第一个为真的分支就停。',
   terms:[
    {en:'condition',cn:'条件',d:'an expression that is true or false'},
    {en:'comparison operator',cn:'比较运算符',d:'== != < > <= >='},
    {en:'logical operator',cn:'逻辑运算符',d:'&& (and), || (or), ! (not)'}],
   traces:[
    {id:'jv_u2l1_t1', code:`int t = 35;
if (t > 30 && t < 40) { System.out.println("warm"); }
else { System.out.println("other"); }`, ask:'输出什么？', exp:'warm'},
    {id:'jv_u2l1_t2', code:`int score = 60;
if (score > 60) { System.out.println("A"); }
else if (score >= 60) { System.out.println("B"); }
else { System.out.println("C"); }`, ask:'输出什么？', exp:'B'}],
   quiz:[
    {q:'To check whether the String answer equals "yes", correct Java is:',
     o:['if (answer == "yes")','if (answer = "yes")','if (answer.equals("yes"))','if (answer.same("yes"))'],a:2,
     e:'String letter-comparison needs .equals(). == on Strings compares memory locations and fails unpredictably.'},
    {q:'if (x = 5) instead of if (x == 5) is dangerous because:',

  {t:'2.2 while — 当条件成立就重复', tag:'V1 完整',
   read:`<p>A <b>while</b> loop repeats its body as long as its condition stays true:</p>`,
   code:`int n = 1;
while (n < 10) {
    n = n * 2;
}
System.out.println(n);`,
   read2:`<p>Trace it by hand with a <b>trace table</b> — the single most useful habit for beginners. Columns: each variable; rows: each pass through the loop. n: 1 → 2 → 4 → 8 → 16. At 16 the condition n &lt; 10 fails, the loop exits, 16 is printed. (Notice: the final value can <i>overshoot</i> the boundary — the check happens before each pass, not after.)</p>
   <p><b>The infinite loop:</b> if the body never moves the condition toward false — e.g. you forget <code>n = n * 2;</code> — the loop runs forever and the program hangs. Every while loop needs something inside that pushes it toward its exit.</p>`,
   cn:'手画 trace table（变量值逐圈记录）是初学者最重要的习惯——比盯着代码"想"准确十倍。循环体内必须有让条件趋向 false 的语句，否则死循环。',
   terms:[
    {en:'while loop',cn:'while 循环',d:'repeats while the condition is true'},
    {en:'trace table',cn:'追踪表',d:'hand-tracking variable values pass by pass'},
    {en:'infinite loop',cn:'死循环',d:'a loop whose condition never becomes false'}],
   traces:[
    {id:'jv_u2l2_t1', code:`int n = 1;
while (n < 10) { n = n * 2; }
System.out.println(n);`, ask:'输出什么？', exp:'16'},
    {id:'jv_u2l2_t2', code:`int c = 0;
int n = 40;
while (n > 5) { n = n / 2; c = c + 1; }
System.out.println(c);`, ask:'输出什么？（提示：整数除法，画 trace table）', exp:'3'}],
   quiz:[
    {q:'In the n=1, while(n<10){n=n*2;} loop, why does it print 16 and not 8?',
     o:['Java rounds up','The condition is checked BEFORE each pass: 8 < 10 is still true, so one more doubling happens','It is a bug in Java','Because 16 is even'],a:1,
     e:'8 passes the check, doubles to 16, and only then does 16 < 10 fail.'}]},

  {t:'2.3 for — 计数循环与累加器', tag:'V1 完整',
   read:`<p>When you know how many times to repeat, <b>for</b> packs the counter into one line:</p>`,
   code:`for (int i = 1; i <= 4; i++) {
    System.out.println(i);
}
<span class="cm">// start at i=1; keep going while i<=4; add 1 each pass</span>`,
   read2:`<p>The most useful loop pattern in all of programming is the <b>accumulator</b>: a variable that collects a running result.</p>`,
   code2:`int sum = 0;
for (int i = 1; i <= 4; i++) {
    sum = sum + i;
}
System.out.println(sum);   <span class="cm">// 0+1+2+3+4 = 10</span>`,
   read3:`<p><b>The off-by-one trap:</b> <code>i &lt; 5</code> runs i = 0,1,2,3,4 (five passes); <code>i &lt;= 5</code> from 1 runs 1..5. Beginners constantly run loops one time too many or too few. Cure: trace table, every time, until it is instinct.</p>`,
   cn:'累加器模式（sum += i）是以后一切统计、求和、计数代码的原型。差一错误（off-by-one）是初学者最高频 bug——i<5 和 i<=5 差一整圈。',
   terms:[
    {en:'for loop',cn:'for 循环',d:'counter-controlled repetition'},
    {en:'accumulator',cn:'累加器',d:'a variable collecting a running total'},
    {en:'off-by-one error',cn:'差一错误',d:'looping one time too many or too few'}],
   traces:[
    {id:'jv_u2l3_t1', code:`int s = 0;
for (int i = 1; i <= 10; i++) { s += i; }
System.out.println(s);`, ask:'输出什么？', exp:'55'},
    {id:'jv_u2l3_t2', code:`int c = 0;
for (int i = 0; i < 7; i++) {
    if (i % 2 == 0) { c++; }
}
System.out.println(c);`, ask:'输出什么？（0 到 6 里有几个偶数？）', exp:'4'}],
   quiz:[
    {q:'for (int i = 0; i < 5; i++) runs how many times?',
     o:['4','5','6','Forever'],a:1,e:'i = 0,1,2,3,4 — five passes. The boundary i<5 excludes 5 itself.'}]},

  {t:'2.4 三个上机挑战 + 期末项目预告', tag:'V1 完整',
   read:`<p>到 IDE 里独立完成。先自己写 20 分钟，卡死了再看提示，最后才看参考答案。每完成一个，到周计划里打勾。</p>

   <b>Challenge 3 · 求和到一千</b>：从 1 开始累加 1+2+3+…，问：加到哪个数时总和第一次超过 1000？（答案是一个数，让程序告诉你。）</p>`,
   sols:[

        System.out.println(i);
    }
}`},
    {t:'Challenge 2 提示与参考', c:`Scanner sc = new Scanner(System.in);
int n = sc.nextInt();
for (int i = 1; i <= 9; i++) {

    {t:'Challenge 3 提示与参考', c:`int sum = 0;

   read2:`<p><b>期末项目预告 · Reaction Time Tester（第 6 周起，v2 提供完整脚手架）：</b>用 Java 写一个心理学反应时测验——程序随机等待 2–5 秒后打印 "GO!"，用户立刻按回车，程序用 <code>System.currentTimeMillis()</code> 计算反应毫秒数，重复 5 轮后输出平均值。这个项目把 Unit 1–2 的全部技能 + 心理学研究方法（操作化定义、重复测量取均值）焊在一起——你将亲手造出一台心理学实验仪器。</p>`,
   cn:'三个挑战分别训练：循环+条件过滤、输入+格式化输出、while+累加器。这是 Unit 1-2 的综合验收。',
   quiz:[

     o:['while loops are faster','You do not know in advance how many passes are needed — the exit depends on a condition (sum > 1000)','for loops cannot add numbers','The teacher said so'],a:1,
     e:'Unknown repetition count + condition-based exit = the natural territory of while.'}]}
 ]},

 {t:'Part 2 · 可用计算器（Q11–Q30 · 65 分钟）', items:[
  {id:'m11', topic:'函数', q:'Given f(x) = 2x − 3 and g(x) = x<sup>2</sup>, find: (a) fg(2) (b) gf(2) (c) f<sup>−1</sup>(x)',
   sol:'(a) g(2)=4，f(4)=5 → <b>fg(2)=5</b>。(b) f(2)=1，g(1)=1 → <b>gf(2)=1</b>。(c) y=2x−3 → x=(y+3)/2 → <b>f<sup>−1</sup>(x)=(x+3)/2</b>。注意 fg(2)≠gf(2)——复合顺序重要。'},
  {id:'m12', topic:'数列', q:'U<sub>n</sub> = 3n<sup>2</sup> − 2n + 1. Find: (a) U<sub>10</sub> (b) the value of n when U<sub>n</sub> = 81',

   {t:'1.2 激励与边际思维 Incentives & the Margin', tag:'连接心理学 Unit 0',

   {t:'1.3 供需与价格机制 Demand, Supply & the Price Mechanism', tag:'0455 §2 核心',
    read:'Markets coordinate millions of strangers through one instrument: <b>price</b>. The <b>demand</b> curve slopes downward — at higher prices, buyers want less. The <b>supply</b> curve slopes upward — at higher prices, sellers offer more. Where they cross is <b>equilibrium</b>: no shortage, no surplus, the market clears. Two moves must never be confused. A change in the price of the good itself causes a <b>movement along</b> a curve. A change in anything else — incomes, tastes, weather, the price of substitutes, production costs — <b>shifts the whole curve</b>. A Guangzhou heatwave shifts the demand for iced tea to the right; a cheaper sugar harvest shifts supply to the right. The third tool is <b>price elasticity of demand (PED)</b>: how strongly quantity responds to price, measured as the percentage change in quantity divided by the percentage change in price. Goods with close substitutes are elastic; necessities and addictive goods are inelastic. Elasticity decides who really pays a tax and whether the tax changes behaviour at all — which is exactly the battlefield of Unit 2.',

   {t:'2.1 外部性与糖税案例 Externalities & the Sugar Tax', tag:'直连写作 W2',
    read:'A market is efficient only when the price captures <b>all</b> the costs of a product. Sugary drinks fail that test: heavy consumption raises public health spending and lowers productivity — costs paid by third parties, not by the drinker at the till. That gap is a <b>negative externality</b>: social cost exceeds private cost, so a free market produces and consumes too much. The textbook remedy is a corrective (<b>Pigouvian</b>) tax: make the price tell the truth by adding the external cost onto it. Evidence exists on both sides. Mexico taxed sugary drinks in 2014; purchases fell by roughly 6% in the first year, with larger falls among low-income households. The UK levy of 2018 was tiered by sugar content, so manufacturers reformulated — the average sugar in taxed drinks fell by more than 40%. There the incentive worked on producers, not only on consumers. The counter-case: such taxes are <b>regressive</b>, taking a larger share of income from the poor; and if demand is <b>inelastic</b>, consumption barely falls while the government simply collects revenue. Whether the policy is health protection or mere taxation depends on elasticity, on available substitutes, and on where the revenue goes.',

   {t:'2.2 四步案例分析框架 The Four-Step Case Framework', tag:'Paper 2 武器',

  prompt:'<p><b>案例材料：</b>广州市考虑在工作日早晚高峰，对进入核心区的机动车征收 \u00a515 拥堵费。已知：① 核心区高峰平均车速约 18 km/h；② 伦敦 2003 年开征类似费用后，首年进入收费区的车流下降约 15%；③ 网约车与出租车行业反对，称成本将转嫁给乘客；④ 地铁与公交已覆盖核心区约九成区域。</p><p><b>任务：</b>Step 1 先各用一句话定义 congestion 与 negative externality；Step 2 写出收费的完整因果链；Step 3 用材料 ①–④ 中至少一条做证据，给出最强反方意见并回应；Step 4 结论必须以 IF 条件句收束。自评量表按 4–9 当一般刻度用即可。</p>',
  checklist:[
   {id:'ec_ck1',t:'Step 1：一句话精确定义了 negative externality（社会成本 > 私人成本）'},
   {id:'ec_ck2',t:'Step 2：机制链条至少写满三环（收费 \u2192 出行成本\u2191 \u2192 \u2026 \u2192 车流/车速变化）'},
   {id:'ec_ck3',t:'Step 3：写出了最强反对意见（累退性 / 成本转嫁），并引用了材料 ①–④ 中至少一条'},
   {id:'ec_ck4',t:'Step 4：结论以 IF 条件句收束（如 IF 公共交通能承接转移需求\u2026）'},
   {id:'ec_ck5',t:'全文 150–200 词，全英文'}],
  rubric:[{k:'定义精确度',id:'ec_rb1'},{k:'机制链完整度',id:'ec_rb2'},{k:'双向权衡',id:'ec_rb3'},{k:'条件化结论',id:'ec_rb4'}]},
 outline:'<b>学习顺序：</b>Unit 1 三课（Week 2）\u2192 Unit 2 两课（Week 3，赶在糖税作文之前）\u2192 10 题限时自测 + 拥堵费案例（Week 4，与糖税作文同周互为弹药）。<b>v2 预告：</b>Unit 3 把 Why Nations Fail 的制度分析接进来——为什么有的国家富、有的国家穷，答案藏在激励结构里，正是 1.2 课的国家级放大版。'};

CONTENT.writing = {
 vt:'英语 · 学术写作 Academic Writing', eyebrow:'MODULE 06 · EAP 5.0 → 6.5 · 全暑假的最高优先级',
 lead:'你的 EAP 写作是 5.0，而阅读听力都在 6.5 —— 这意味着问题不在英语，在"议论文的工程结构"。本模块每周一课 + 一篇作文：W1 拆解论证的零件，W2 学会把零件焊接起来。写作题目全部用心理学和经济学议题——你刚学的内容直接变成弹药。',
 weeks:[
 {t:'Week 1 · 论证的解剖学 The Anatomy of an Argument', sub:'读懂零件 → 识别零件 → 自己组装（约 90 分钟 + 作文 40 分钟）',
  read:`<p>An academic essay is not "your thoughts written down". It is a machine with five standard parts, and examiners are paid to check whether each part exists:</p>
  <p>① <b>Thesis</b> — your position in one sentence, usually the last sentence of the introduction. A real thesis is <i>arguable</i> (someone could disagree) and <i>previews your reasons</i>.<br>
  ② <b>Claim / topic sentence</b> — the first sentence of each body paragraph. One paragraph, one claim. If a paragraph makes two points, it is two paragraphs wearing a coat.<br>
  ③ <b>Evidence</b> — a study, a statistic, an example, a historical case. Claims without evidence are just opinions with confidence.<br>
  ④ <b>Reasoning</b> — the sentence that explains <i>why</i> the evidence proves the claim. Beginners skip this and lose the most marks here.<br>
  ⑤ <b>Concession + response</b> — admit the strongest opposing point, then show why your position survives it. This is what separates Band 6.5 from Band 5.</p>`,
  cn:'五个零件：论点句（可争议+预告理由）、段首主张句（一段一主张）、证据、推理（解释证据为何证明主张——最容易丢分的一环）、让步与回应（先承认对方最强的点，再说明为何你的立场依然成立）。',
  terms:[
   {en:'thesis statement',cn:'中心论点句',d:'one arguable sentence stating your position'},
   {en:'topic sentence',cn:'段首主张句',d:'first sentence carrying the paragraph\u2019s single claim'},
   {en:'evidence',cn:'证据',d:'study, statistic, example or case supporting a claim'},
   {en:'reasoning',cn:'推理衔接',d:'explains why the evidence proves the claim'},
   {en:'concession',cn:'让步',d:'acknowledging the opposing view before answering it'}],
  model:{title:'范文拆解（约 260 词）· 题目：Some people believe that economic growth should be the main goal of governments, even if the environment suffers. To what extent do you agree?',
  html:`<p><span class="anno">背景</span>Governments everywhere promise their citizens a richer future, and for decades "growth first" has been the default answer. <span class="anno">Thesis</span>While growth matters enormously, I will argue that sacrificing the environment for growth is self-defeating, because environmental damage eventually destroys the very conditions on which growth depends.</p>
  <p><span class="anno">让步主张</span>Supporters of growth-first policies make a serious point. <span class="anno">证据</span>Industrialisation has lifted hundreds of millions of people out of poverty over the last four decades, funding the schools, hospitals and pensions that citizens demand. <span class="anno">推理</span>For a poor country, a factory that pollutes may still beat no factory at all, because income buys options that poverty denies.</p>
  <p><span class="anno">反驳主张</span>However, environmental costs are not separate from the economy; they are economic costs in disguise. <span class="anno">证据</span>Air pollution raises healthcare spending and cuts workers\u2019 productivity, while a changing climate damages the farms and coastal cities that economies depend on. <span class="anno">推理</span>A government that ignores these costs is not avoiding payment — it is mailing the bill to its own future taxpayers, with interest.</p>
  <p><span class="anno">评估</span>The real question is therefore not growth <i>or</i> environment, but what kind of growth. <span class="anno">证据</span>Tools such as carbon pricing use market incentives to make polluters pay the true cost of their actions, steering investment toward cleaner technology. <span class="anno">结论</span>In the long run, the only growth worth having is growth the environment can survive.</p>`},
  fnq:[
   {q:'"While growth matters enormously, I will argue that sacrificing the environment for growth is self-defeating, because..." — this sentence functions as the:',
    o:['Evidence','Thesis statement','Concession','Conclusion'],a:1,
    e:'立场（反对牺牲环境）+ 可争议 + 预告理由（because...）——标准 thesis，落在引言段末句。'},
   {q:'"Industrialisation has lifted hundreds of millions of people out of poverty..." functions as:',
    o:['The writer\u2019s thesis','Evidence supporting the opposing view','A linking device','Reasoning'],a:1,
    e:'这是给"对方"的证据——让步段先把反方最强的弹药亮出来，文章才有可信度。'},
   {q:'"Supporters of growth-first policies make a serious point." is a:',
    o:['Concession (topic sentence of the concession paragraph)','Statistic','Thesis','Counter-example'],a:0,
    e:'承认对方观点的段首主张句。注意它不削弱作者立场——它为后面的 However 蓄力。'},
   {q:'"A government that ignores these costs is not avoiding payment — it is mailing the bill to its own future taxpayers." functions as:',
    o:['New evidence','Reasoning that explains why the evidence matters','A concession','Background information'],a:1,

function quizList(mod,prefix,items,head){

/* ---------- 错题本 / 进度 ---------- */
function isDone(r){
 if(r.kind==='q')return !!S.answers[r.id];
 if(r.kind==='trace')return !!S.traces[r.id];
 if(r.kind==='cls')return !!S.clsf[r.id];
 if(r.kind==='ord')return !!(S.ords[r.id]&&S.ords[r.id].ok);
 if(r.kind==='essay')return words(S.essays[r.id])>=(r.min||1);
 if(r.kind==='dict')return !!(S.dict[r.id]&&S.dict[r.id].best>=80);
 if(r.kind==='ck')return !!S.checks[r.id];
 return false;
}
function progOf(mod){let done=0,total=0;for(const r of REG){if(mod&&r.mod!==mod)continue;total++;if(isDone(r))done++;}return {done:done,total:total,pct:total?Math.round(done/total*100):0};}
function mistakes(){
 const out=[];
 for(const r of REG){
  let bad=false;
  if(r.kind==='q'){const a=S.answers[r.id];bad=!!(a&&!a.ok);}
  else if(r.kind==='trace'){const t=S.traces[r.id];bad=!!(t&&!t.ok);}
  else if(r.kind==='cls'){const c=S.clsf[r.id];bad=(c==='C'||c==='D');}
  else if(r.kind==='ord'){const o=S.ords[r.id];bad=!!(o&&!o.ok);}
  else if(r.kind==='dict'){const d=S.dict[r.id];bad=!!(d&&d.n>=1&&d.best<80);}
  if(!bad)continue;
  const rv=S.reviews[r.id];let due,info;
  if(!rv){due=true;info='待复习';}
  else if(rv.n>=3){continue;}
  else{const gap=[3,7,14][Math.min(rv.n-1,2)];const left=gap-daysSince(rv.d);due=left<=0;info=due?('第 '+(rv.n+1)+' 轮到期'):('已复习 ×'+rv.n+' · '+left+' 天后再现');}
  out.push({id:r.id,mod:r.mod,brief:r.brief,due:due,info:info});
 }
 out.sort(function(a,b){return (b.due?1:0)-(a.due?1:0);});
 return out;
}

 if(t.matches('input[data-ck]')){S.checks[t.getAttribute('data-ck')]=t.checked;const row=t.closest('.ckrow');if(row)row.classList.toggle('done',t.checked);save();return;}
 if(t.matches('select[data-rate]')){S.meta.rate=t.value;save();return;}
 if(t.matches('input[data-importfile]')){if(t.files&&t.files[0])importState(t.files[0]);t.value='';return;}
}
function onKey(e){
 if(e.key!=='Enter')return;
 if(e.target.matches('input[data-dict]')){checkDict(e.target.getAttribute('data-dict'));e.preventDefault();}
 else if(e.target.matches('input[data-trace]')){const id=e.target.getAttribute('data-trace');const btn=$('[data-tracecheck="'+id+'"]');if(btn)btn.click();e.preventDefault();}
}

/* ---------- 视图与启动 ---------- */
function showView(k){
 $$('.view').forEach(function(v){v.classList.remove('on');});
 const tgt=$('#v-'+k);if(tgt)tgt.classList.add('on');
 $$('.nav-btn').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-nav')===k);});
 S.meta.view=k;
 if(k==='dash')renderDash();
 if(k==='vocab')renderVocab();
 save();
 try{const mn=$('#main');if(mn)mn.scrollTop=0;window.scrollTo(0,0);}catch(e){}
}
function rerender(){
 renderGuide();renderPsy();renderJava();renderMath();renderWriting();renderVocab();renderListen();renderEcon();renderSci();renderPlan();
 applyState();updateProgress();
 showView(S.meta.view&&$('#v-'+S.meta.view)?S.meta.view:'dash');
}
function boot(){
 try{
  S.meta.opened=(S.meta.opened||0)+1;
  rerender();
  document.addEventListener('click',onClick);
  document.addEventListener('input',onInput);
  document.addEventListener('change',onChange);
  document.addEventListener('keydown',onKey);
  save();
 }catch(err){
  document.body.innerHTML='<div style="max-width:620px;margin:80px auto;font-family:sans-serif"><h2>课件初始化出错</h2><p>请把下面这段错误信息截图发回给 Claude，下一版会修复：</p><pre style="white-space:pre-wrap;background:#f4f4f4;padding:14px;border-radius:6px">'+esc(err&&err.stack?err.stack:String(err))+'</pre></div>';
 }
}
boot();
</script>
<script>
'use strict';
/* ===== 云同步 v2 · 漫游版：云为主档案，本机为缓存 ===== */
(function(){
var REPO='lilisun536-sudo/simon-study',PATH='data/progress.json';
var MODE={name:'study',math:false,summer:true}; /* {name, math:bool, summer:bool} */
var K1='simon_summer_v1',K2='simon_school_math_v1',K3='simon_chinese_v1';
var REMOTE={mathSummary:null,summerSummary:null,sha:null};
var lastSig='',timer=null,dirty=false;
function tk(){try{return localStorage.getItem('simon_sync_token')||''}catch(e){return ''}}
function b64e(s){return btoa(unescape(encodeURIComponent(s)))}
function b64d(s){return decodeURIComponent(escape(atob(String(s).replace(/\n/g,''))))}
function lsGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}}
function lsSet(k,o){try{localStorage.setItem(k,JSON.stringify(o))}catch(e){}}
function rich(k,o){if(!o)return 0;var n=0;
 if(k===K2){if(o.it)for(var i in o.it){n+=(o.it[i].a||0)+(o.it[i].ok?1:0)}if(o.qv)for(var q in o.qv)n+=(o.qv[q]||0)*2;return n}
 if(k===K3){var m3=(o.meta||{});return (m3.pct||0)*1000+(m3.doneLevels||0)*10+(m3.opened||0)}
 ['answers','clsf','traces','ords','essays','rubrics','checks','dict','vocab','reviews'].forEach(function(s){if(o[s])n+=Object.keys(o[s]).length});return n}
function mergeMath(a,b){if(!a)return b;if(!b)return a;
 var out={meta:{},it:{},qv:{}},k;
 var ids={};[a.it||{},b.it||{}].forEach(function(o){for(k in o)ids[k]=1});
 for(k in ids){var x=(a.it||{})[k],y=(b.it||{})[k];
   if(!x){out.it[k]=y}else if(!y){out.it[k]=x}
   else{out.it[k]={a:Math.max(x.a||0,y.a||0),w:(x.w||y.w)?1:0,ok:(((x.a||0)>=(y.a||0))?x.ok:y.ok)?1:0}}}
 var qs={};[a.qv||{},b.qv||{}].forEach(function(o){for(k in o)qs[k]=1});
 for(k in qs)out.qv[k]=Math.max((a.qv||{})[k]||0,(b.qv||{})[k]||0);
 var ma=a.meta||{},mb=b.meta||{};
 out.meta={created:ma.created||mb.created,opened:Math.max(ma.opened||0,mb.opened||0),tab:(ma.tab!=null?ma.tab:mb.tab)};
 return out}
function summerSummary(){var S=lsGet(K1);if(!S)return null;var n=0;
 ['answers','clsf','traces','ords','essays','rubrics','checks','dict','vocab','reviews'].forEach(function(s){if(S[s])n+=Object.keys(S[s]).length});
 var last='';if(S.activity){var d=Object.keys(S.activity).sort();last=d[d.length-1]||''}
 return{covered:Math.min(n,202),total:202,last:last}}
function chineseSummary3(){var S=lsGet(K3);if(!S||!S.meta)return null;return{pct:S.meta.pct||0,done:S.meta.doneLevels||0,last:S.meta.lastLevel||''}}
function mathSummary(){try{return PAPERS.map(function(P){var a=0,r=0,m=0,rev=0;
 P.qs.forEach(function(q){q.parts.forEach(function(p){var t=IT(p.id);if(t.a)a++;if(t.ok)r++});
   var c=stChip(q);if(c[1]==='已掌握')m++;if(c[1]==='需复习')rev++});
 return{key:P.key,name:P.name,code:P.code,answered:a,of:P.items,right:r,mastered:m,ofQ:P.qs.length,review:rev}})}catch(e){return null}}
function fetchRemote(){var api='https://api.github.com/repos/'+REPO+'/contents/'+PATH+'?ref=main';
 var H={'Accept':'application/vnd.github+json'};var t=tk();if(t)H['Authorization']='Bearer '+t;
 return window.fetch(api,{headers:H,cache:'no-store'}).then(function(r){
   if(r.status===404)return null;if(!r.ok)throw 'HTTP '+r.status;return r.json()})
 .then(function(j){if(!j)return null;REMOTE.sha=j.sha||null;
   var p=null;try{p=JSON.parse(b64d(j.content))}catch(e){}
   if(p){REMOTE.mathSummary=p.mathSummary||REMOTE.mathSummary;REMOTE.summerSummary=p.summerSummary||REMOTE.summerSummary}
   return p})
 .catch(function(e){
   return window.fetch('https://raw.githubusercontent.com/'+REPO+'/main/'+PATH+'?_='+Date.now(),{cache:'no-store'})
   .then(function(r){if(!r.ok)return null;return r.text()})
   .then(function(t2){if(!t2)return null;var p=null;try{p=JSON.parse(t2)}catch(e2){}
     if(p){REMOTE.mathSummary=p.mathSummary||null;REMOTE.summerSummary=p.summerSummary||null}
     return p}).catch(function(){return null})})}
function pull(done){
 if(!window.fetch){done&&done(false);return}
 fetchRemote().then(function(p){
   if(!p||!p.keys){done&&done(false);return}
   var changed=false;
   /* 数学：逐题合并 */
   var lm=lsGet(K2),cm=p.keys[K2];
   if(cm){var mm=mergeMath(lm,cm);
     if(JSON.stringify(mm)!==JSON.stringify(lm)){lsSet(K2,mm);changed=true}
     if(lm&&JSON.stringify(mm)!==JSON.stringify(cm))dirty=true}
   /* 暑期：择富采用 */
   var ls=lsGet(K1),cs=p.keys[K1];
   if(cs&&rich(K1,cs)>rich(K1,ls)){lsSet(K1,cs);changed=true}
   else if(ls&&rich(K1,ls)>rich(K1,cs||null))dirty=true;
   var lc3=lsGet(K3),cc3=p.keys[K3];
   if(cc3&&rich(K3,cc3)>rich(K3,lc3)){lsSet(K3,cc3);changed=true}
   else if(lc3&&rich(K3,lc3)>rich(K3,cc3||null))dirty=true;
   if(changed){
     var g='sy2r_'+MODE.name;
     try{if(!sessionStorage.getItem(g)){sessionStorage.setItem(g,'1');location.reload();return}}catch(e){}
   }
   done&&done(changed);
 }).catch(function(){done&&done(false)})}
function collect(){var keys={};var v1=lsGet(K1),v2=lsGet(K2),v3=lsGet(K3);if(v1)keys[K1]=v1;if(v2)keys[K2]=v2;if(v3)keys[K3]=v3;
 return{v:2,ts:new Date().toISOString(),from:MODE.name,keys:keys,
   mathSummary:MODE.math?mathSummary():(REMOTE.mathSummary||null),
   summerSummary:MODE.summer?summerSummary():(REMOTE.summerSummary||null),chineseSummary:chineseSummary3()}}
function sig(s){return s.replace(/"ts":\s*"[^"]*"/,'')}
function paint(st,t0){var e=document.getElementById('syncPill');if(!e)return;
 var m={off:'',busy:'同步中…',ok:'已同步 '+(t0?t0.toTimeString().slice(0,5):''),err:'同步失败·稍后自动重试'}[st]||'';
 e.textContent=m;e.style.display=m?'inline-block':'none'}
function push(done,keepalive){
 var t=tk();if(!t){paint('off');done&&done(false,'未配置令牌');return}
 if(!window.fetch){done&&done(false,'环境不支持');return}
 var body=JSON.stringify(collect(),null,1);
 if(sig(body)===lastSig){dirty=false;paint('ok',push._t0);done&&done(true,'无变化');return}
 paint('busy');
 var api='https://api.github.com/repos/'+REPO+'/contents/'+PATH;
 var H={'Authorization':'Bearer '+t,'Accept':'application/vnd.github+json'};
 fetchRemote().then(function(){
   /* 拉最新 sha 与对端摘要后再写，最大限度保全 */
   var body2=JSON.stringify(collect(),null,1);
   var payload={message:'sync('+MODE.name+') '+new Date().toISOString().slice(0,16),content:b64e(body2)};
   if(REMOTE.sha)payload.sha=REMOTE.sha;
   var opt={method:'PUT',headers:H,body:JSON.stringify(payload)};
   if(keepalive&&opt.body.length<58000)opt.keepalive=true;
   return window.fetch(api,opt).then(function(r){
     if(r&&r.ok){lastSig=sig(body2);dirty=false;push._t0=new Date();paint('ok',push._t0);done&&done(true,'ok')}
     else{paint('err');done&&done(false,'HTTP '+(r&&r.status))}})
 }).catch(function(e){paint('err');done&&done(false,String(e))})}
function schedule(){dirty=true;if(!tk())return;clearTimeout(timer);timer=setTimeout(function(){push()},90000)}
function flush(){if(dirty&&tk())push(null,true)}
window.addEventListener('pagehide',flush);
document.addEventListener('visibilitychange',function(){if(document.visibilityState==='hidden')flush()});
window.__SY2={pull:pull,push:push,schedule:schedule,collect:collect,mergeMath:mergeMath,rich:rich,REMOTE:REMOTE,flush:flush};
pull(function(){});
setInterval(function(){if(tk())push()},180000);
window.addEventListener('load',function(){if(tk())setTimeout(function(){push()},4000)});
})();
</script>\n</body>
