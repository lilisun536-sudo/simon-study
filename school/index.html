<script>
'use strict';
/* ================= 工具 ================= */
function $(s,r){return (r||document).querySelector(s)}
function el(t,c,h){var e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e}
function toast(m){var t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('show')},2200)}
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){var t=a%b;a=b;b=t}return a}
function ri(a,b){return a+Math.floor(Math.random()*(b-a+1))}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function fmtN(x){var r=Math.round(x*1e6)/1e6;return String(r)}
/* 数字解析：容忍 $ 逗号 空格 ×10^ e记法 分数 */
function parseNum(s){
  if(s==null)return NaN;
  s=String(s).toLowerCase().replace(/[,$\s]/g,'').replace(/×/g,'x').replace(/−/g,'-');
  s=s.replace(/(x|\*)10\^(-?\d+)/g,'e$2').replace(/10\^(-?\d+)/g,'1e$1');
  if(/^-?\d+\/\d+$/.test(s)){var p=s.split('/');return parseInt(p[0],10)/parseInt(p[1],10)}
  var v=Number(s);return isFinite(v)?v:NaN;
}
function numEq(user,ans,tol){var u=parseNum(user);if(!isFinite(u))return false;return Math.abs(u-ans)<=(tol!=null?tol:Math.max(1e-9,Math.abs(ans)*1e-9))}
/* 分数：要求最简 */
function fracEq(user,n,d,needSimplest){
  var s=String(user).replace(/[\s]/g,'').replace(/−/g,'-');
  var m=s.match(/^(-?\d+)\/(\d+)$/);
  if(!m){ if(!needSimplest&&isFinite(parseNum(s)))return Math.abs(parseNum(s)-n/d)<1e-9; return false}
  var a=parseInt(m[1],10),b=parseInt(m[2],10);
  if(b===0)return false;
  if(a*d!==b*n)return false;
  return needSimplest?gcd(a,b)===1:true;
}
/* 表达式数值等价判定：白名单 + 隐式乘法 + 抽样比较 */
function evalExpr(s,vars,vals){
  s=String(s).toLowerCase().replace(/\s+/g,'').replace(/−/g,'-').replace(/×/g,'*').replace(/÷/g,'/').replace(/π/g,'pi');
  if(!/^[0-9a-z+\-*/^().]*$/.test(s))return NaN;
  if(!s)return NaN;
  s=s.replace(/(\d)([a-z(])/g,'$1*$2').replace(/([a-z)])(\()/g,'$1*$2').replace(/(\))([a-z0-9])/g,'$1*$2');
  s=s.replace(/([a-z])([a-z])/g,'$1*$2').replace(/([a-z])(\d)/g,'$1*$2');
  s=s.replace(/p\*i/g,'pi');
  s=s.replace(/\^/g,'**');
  try{
    var f=new Function(vars.concat('pi').join(','),'return ('+s+')');
    var out=f.apply(null,vals.concat(Math.PI));
    return (typeof out==='number'&&isFinite(out))?out:NaN;
  }catch(e){return NaN}
}
function exprEq(user,target,vars){
  for(var k=0;k<3;k++){
    var vals=vars.map(function(){return 1.3+Math.random()*2.4});
    var u=evalExpr(user,vars,vals), t=evalExpr(target,vars,vals);
    if(!isFinite(u)||!isFinite(t))return false;
    if(Math.abs(u-t)>1e-6*Math.max(1,Math.abs(t)))return false;
  }
  return true;
}
function parseSet(s){
  s=String(s).replace(/[{}\s]/g,'');
  if(s==='')return [];
  var a=s.split(/[,，、]/).map(function(x){return x.trim()}).filter(function(x){return x!==''});
  return a.map(Number).sort(function(x,y){return x-y});
}
function setEq(user,arr){var u=parseSet(user);if(u.some(isNaN))return false;var t=arr.slice().sort(function(x,y){return x-y});return u.length===t.length&&u.every(function(v,i){return v===t[i]})}
</script>

vg:function(){var N=ri(102,9899)*10;return{stem:'Write <b>'+N+'</b> in standard form.',part:{t:'sf',val:N,ph:'a×10^n 形式'},sol:'小数点左移 '+(String(N).length-1)+' 位 → '+(N/Math.pow(10,String(N).length-1))+'×10^'+(String(N).length-1)}}},

{n:5,marks:2,topic:'合并同类项',stem:'Simplify&nbsp;&nbsp;5<i>c</i> − <i>d</i> − 3<i>d</i> − 2<i>c</i>.',gloss:'simplify 化简 · like terms 同类项',
parts:[{id:'5',t:'expr',vars:['c','d'],target:'3*c-4*d',ph:'如 3c-4d',oneEach:['c','d']}],
steps:['<b>同类项</b> = 字母部分完全相同的项。把 c 归一堆、d 归一堆，符号跟着项一起搬家。','c 项：5c − 2c = 3c。','d 项：−d − 3d = −4d（注意 −d 的隐形系数是 −1，不是 0）。合并得 3c − 4d。'],
finalTxt:'答案：3c − 4d',
card:{m:'合并同类项只动系数、不动字母；每一项的符号是它自己的一部分，移动时必须带着走。',mo:['含括号：先展开（注意负号分配）再合并','系数是分数：先通分','三个字母混排的长式子：逐字母清点']},
vg:function(){var a=ri(4,9),b=ri(2,5),e=ri(1,3),f=ri(2,6);var c1=a-e,c2=-1-b;if(c1===0)c1=1,a=e+1;return{stem:'Simplify&nbsp;&nbsp;'+a+'<i>m</i> − <i>n</i> − '+b+'<i>n</i> − '+e+'<i>m</i> + '+f+'.',part:{t:'expr',vars:['m','n'],target:c1+'*m+('+c2+')*n+'+f,ph:'如 2m-3n+5',oneEach:['m','n']},sol:'m 项：'+a+'−'+e+'='+c1+'；n 项：−1−'+b+'='+c2+'；常数 '+f}}},

{n:6,marks:2,topic:'一元一次方程',stem:'Solve.&nbsp;&nbsp;'+FR('<i>x</i> − 2','3')+' = 3',gloss:'solve 解方程 · both sides 等式两边',
parts:[{id:'6',t:'num',ans:11,tol:1e-9,ph:'x =',unit:''}],
steps:['分母最碍事，先消它：两边同乘 3 → x − 2 = 9。','移项：x = 9 + 2 = 11。','代回检验：(11 − 2) ÷ 3 = 3 ✓。'],
finalTxt:'答案：x = 11',
card:{m:'解方程的纪律：每一步都对"两边"做同一件事；先消分母、再展括号、再归拢 x。',mo:['x 在分母：交叉相乘','两边都有 x：先把 x 项归到一边','分数系数方程：两边乘最小公分母']},
vg:function(){var a=ri(1,9),b=ri(2,6),c=ri(2,7);return{stem:'Solve.&nbsp;&nbsp;'+FR('<i>x</i> − '+a,b)+' = '+c,part:{t:'num',ans:a+b*c,tol:1e-9,ph:'x ='},sol:'两边×'+b+'：x−'+a+'='+(b*c)+' → x='+(a+b*c)}}},

{n:7,marks:2,topic:'指数运算',stem:'Simplify&nbsp;&nbsp;2<i>x</i><sup>3</sup> × 3<i>x</i><sup>2</sup>.',gloss:'indices 指数 · add the indices 指数相加',
parts:[{id:'7',t:'mcq',opts:[['6x<sup>5</sup>',1,''],['6x<sup>6</sup>',0,'指数<b>相乘</b>是"幂的幂"(xᵐ)ⁿ 的规则；同底数相乘应当指数<b>相加</b>。'],['5x<sup>5</sup>',0,'系数 2 和 3 是相乘（2×3=6），不是相加。'],['5x<sup>6</sup>',0,'系数与指数两处都错了：系数相乘、指数相加。']]}],
steps:['系数与字母分开处理：2 × 3 = 6。','同底数幂相乘，<b>指数相加</b>：x³ × x² = x³⁺² = x⁵。','合成：6x⁵。'],
finalTxt:'答案：6x⁵',
card:{m:'指数三律：乘 → 加；除 → 减；幂的幂 → 乘。系数永远按普通数字运算，与指数律无关。',mo:['(axᵐ)ⁿ：系数也要乘方','除法 axᵐ ÷ bxⁿ','负指数、分数指数（本卷 Q10 正是它）']},
vg:function(){var a=ri(2,6),b=ri(2,6),m=ri(2,6),k=ri(2,5);return{stem:'Simplify&nbsp;&nbsp;'+a+'<i>x</i><sup>'+m+'</sup> × '+b+'<i>x</i><sup>'+k+'</sup>.',part:{t:'expr',vars:['x'],target:(a*b)+'*x^'+(m+k),ph:'如 '+(a*b)+'x^'+(m+k),oneEach:['x']},sol:'系数 '+a+'×'+b+'='+(a*b)+'；指数 '+m+'+'+k+'='+(m+k)}}},

{n:8,marks:2,topic:'分数运算',stem:'Without using a calculator, work out&nbsp;&nbsp;'+FR('5','16')+' × 1'+FR('1','7')+'.<br>You must show all your working and give your answer as a fraction in its <b>simplest form</b>.',gloss:'mixed number 带分数 · improper fraction 假分数 · simplest form 最简形式',
parts:[{id:'8',t:'frac',fn:5,fd:14,ph:'如 a/b（最简分数）'}],
steps:['带分数必须先化假分数：1'+FR('1','7')+' = '+FR('8','7')+'。','<b>先约分再相乘</b>：'+FR('5','16')+' × '+FR('8','7')+'，斜对角的 8 与 16 约成 1 与 2——比乘完再约省一半力气。','剩下 '+FR('5','2×7')+' = '+FR('5','14')+'。5 与 14 互质，已是最简。'],
finalTxt:'答案：5/14',
card:{m:'分数乘法先斜着约分再乘；带分数一律先化假分数——这两个习惯能消灭这类题 90% 的错误。',mo:['除以分数 = 乘它的倒数','三个分数连乘连约','分数四则混合（注意运算顺序）']},
vg:function(){var d=pick([5,7,9,11]),c=ri(1,d-1);while(gcd(c,d)!==1)c=ri(1,d-1);var m=d+c,k=pick([2,3,4]),b=m*k,a=ri(2,9);while(gcd(a,b)===b||a===b)a=ri(2,9);var n0=a*m,d0=b*d,g=gcd(n0,d0);return{stem:'Without a calculator, work out&nbsp;'+FR(a,b)+' × 1'+FR(c,d)+'.&nbsp;Give your answer as a fraction in its simplest form.',part:{t:'frac',fn:n0/g,fd:d0/g,ph:'a/b 最简'},sol:'1'+c+'/'+d+'='+m+'/'+d+'；'+a+'/'+b+'×'+m+'/'+d+' 约分 → '+(n0/g)+'/'+(d0/g)}}},

{n:9,marks:2,topic:'单利 Simple Interest',stem:'Paula invests $600 at a rate of <i>r</i>% per year <b>simple interest</b>.<br>At the end of 10 years, the total interest earned is $90.<br>Find the value of <i>r</i>.',gloss:'invest 投资 · rate 利率 · simple interest 单利（每年利息固定）',
parts:[{id:'9',t:'mcq',opts:[['r = 1.5',1,''],['r = 0.015',0,'公式里已经写了 r/100，解出的 r 本身就是百分数的数值，不用再除 100。'],['r = 15',0,'漏掉了年数 10：90 = 600 × r/100 × <b>10</b>。'],['r = 6.67',0,'这是 600÷90——把公式记反了。利息 = 本金 × 利率 × 年数。']]}],
steps:['单利公式：I = P × '+FR('r','100')+' × t（每年利息固定，不滚存）。','代入：90 = 600 × '+FR('r','100')+' × 10 = 60r。','r = 90 ÷ 60 = 1.5。'],
finalTxt:'答案：r = 1.5',
card:{m:'单利：利息 = 本金×年利率×年数，线性增长；复利才是指数滚雪球。看到 simple 先写公式再代数。',mo:['换未知量：求本金 P 或年数 t','复利 compound：A = P(1 + r/100)ⁿ','单利与复利同题对比（0580 常考）']},
vg:function(){var P=pick([400,500,800,1200,2000]),t=pick([4,5,8,10]),r=pick([1.5,2,2.5,3,4]);var I=P*r/100*t;return{stem:'A sum of $'+P+' is invested at <i>r</i>% per year simple interest. After '+t+' years the total interest is $'+fmtN(I)+'. Find <i>r</i>.',part:{t:'num',ans:r,tol:1e-9,ph:'r ='},sol:I+' = '+P+'×r/100×'+t+' → r = '+r}}},

{n:10,marks:2,topic:'分数指数幂',stem:'Simplify.&nbsp;&nbsp;<span style="font-size:19px">(</span>'+FR('<i>x</i><sup>3</sup>','8')+'<span style="font-size:19px">)</span><sup>−'+ '4⁄3'+'</sup>',gloss:'index/indices 指数 · reciprocal 倒数 · cube root 立方根',
parts:[{id:'10',t:'expr',vars:['x'],target:'16/x^4',ph:'如 16/x^4',maxLen:10,oneSlash:true}],
steps:['<b>负指数先翻倒数</b>：(x³/8)<sup>−4/3</sup> = (8/x³)<sup>4/3</sup>。','<b>分数指数 = 先开方后乘方</b>：8<sup>4/3</sup> = (³√8)⁴ = 2⁴ = 16。先开方数字小，心算不出错。','(x³)<sup>4/3</sup> = x⁴。合成：16/x⁴（写 16x⁻⁴ 也对）。'],
finalTxt:'答案：16/x⁴',
card:{m:'a^(m/n) = (ⁿ√a)^m，铁律是先开方再乘方；负号管倒数、分母管开方、分子管乘方，三件事分开处理。',mo:['纯数字：27^(−2/3)','带系数：(16x⁸)^(3/4)——系数也要开','解指数方程：8^x = 1/4（化同底）']},
vg:function(){var c=pick([8,27]),base=(c===8?2:3),m=pick([1,2,4,5]);var K=Math.pow(base,m);return{stem:'Simplify.&nbsp;&nbsp;<span style="font-size:19px">(</span>'+FR('<i>x</i><sup>3</sup>',c)+'<span style="font-size:19px">)</span><sup>−'+m+'⁄3</sup>',part:{t:'expr',vars:['x'],target:K+'/x^'+m,ph:'如 k/x^n',maxLen:10,oneSlash:true},sol:'翻倒数 → ('+c+'/x³)^('+m+'/3)；'+c+'^('+m+'/3)=(³√'+c+')^'+m+'='+K+' → '+K+'/x^'+m}}},

{n:11,marks:2,topic:'公式变形',stem:'<i>P</i> = 2<i>r</i> + π<i>r</i><br>Rearrange the formula to write <i>r</i> in terms of <i>P</i> and π.',gloss:'rearrange 变形/移项 · in terms of 用…表示 · subject 主项',
parts:[{id:'11',t:'expr',vars:['p'],target:'p/(2+pi)',ph:'r = ？（π 打成 pi）',needParen:true}],
steps:['目标字母 r 出现在两项里——<b>先提公因式</b>：P = r(2 + π)。','两边同除 (2 + π)：r = P/(2 + π)。','括号必须完整：P/2 + π 是另一个式子。检验：把 r 乘回 (2+π) 应还原成 P。'],
finalTxt:'答案：r = P/(2 + π)',
card:{m:'变形公式就是解方程，把目标字母当未知数；它出现多次且同次幂 → 提公因式后整体除。',mo:['目标字母在分母：先交叉乘','目标字母带平方：最后开方（如 A = πr²）','目标字母两侧都有：先归拢到一边']},
vg:function(){var a=ri(2,6);return{stem:'<i>P</i> = '+a+'<i>r</i> + π<i>r</i>.&nbsp;&nbsp;Write <i>r</i> in terms of <i>P</i> and π.',part:{t:'expr',vars:['p'],target:'p/('+a+'+pi)',ph:'r = ？（π 打成 pi）',needParen:true},sol:'P = r('+a+'+π) → r = P/('+a+'+π)'}}},

{n:12,marks:2,topic:'上下界 Bounds',stem:'The sides of a square are 15.1 cm, correct to 1 decimal place.<br>Find the <b>upper bound</b> of the area of the square.',gloss:'upper/lower bound 上界/下界 · correct to 1 d.p. 精确到一位小数',
parts:[{id:'12',t:'mcq',opts:[['229.5225 cm<sup>2</sup>',1,''],['228.01 cm<sup>2</sup>',0,'这是 15.1²——直接用了测量值。求上界必须先把边长推到最大可能：15.1 + 0.05。'],['231.04 cm<sup>2</sup>',0,'边界加多了：1 d.p. 的半单位是 0.05，不是 0.1。15.2 是不可能达到的值。'],['60.6 cm',0,'这是周长的上界（4 × 15.15），题目问的是面积。']]}],
steps:['精确到 1 d.p. → 误差半径 = 半个单位 = 0.05。真实边长范围：15.05 ≤ s < 15.15。','面积要最大 → 用最大的边：upper bound = 15.15 × 15.15。','= 229.5225 cm²。<b>bounds 题不四舍五入</b>，把小数写全，这正是采分点。'],
finalTxt:'答案：229.5225 cm²',
card:{m:'界 = 测量值 ± 半个精度单位。组合量取界的方向：乘法/加法同向取；除法/减法反向取（要最大商 → 分子最大、分母最小）。',mo:['下界面积/周长','速度 = 距离÷时间 的上界（上配下）','"能否肯定超过某值"判断题']},
vg:function(){var s=ri(82,199)/10;var ub=(s+0.05)*(s+0.05);return{stem:'The sides of a square are '+s.toFixed(1)+' cm, correct to 1 decimal place. Find the upper bound of the area.',part:{t:'num',ans:Math.round(ub*1e4)/1e4,tol:1e-3,ph:'cm²，不要四舍五入'},sol:'('+s.toFixed(1)+'+0.05)² = '+(s+0.05).toFixed(2)+'² = '+(Math.round(ub*1e4)/1e4)}}},

{n:13,marks:2,topic:'三角形面积公式',anim:'a13',
fig:'<svg viewBox="0 0 320 185" width="320"><text x="10" y="16" font-size="10" fill="#6E6E73">NOT TO SCALE</text><polygon points="280,32 38,72 118,168" fill="#F0F4F8" stroke="#1D1D1F" stroke-width="1.6"/><line id="f13h" x1="118" y1="168" x2="100.4" y2="61.7" stroke="#30D158" stroke-width="2" stroke-dasharray="4 4" opacity="0"/><rect id="f13ra" x="97" y="60" width="9" height="9" fill="none" stroke="#30D158" stroke-width="1.4" opacity="0" transform="rotate(9 100.4 61.7)"/><text id="f13hl" x="128" y="112" font-size="12" fill="#1D8A43" opacity="0">h = 11·sin 39°</text><text x="146" y="42" font-size="13" fill="#1D1D1F">11 cm</text><text x="206" y="112" font-size="13" fill="#1D1D1F">13 cm</text><path d="M 254,36.3 A 26,26 0 0 1 260.7,49.7" fill="none" stroke="#0071E3" stroke-width="1.5"/><text x="228" y="55" font-size="12" fill="#0071E3">39°</text></svg>',
stem:'Calculate the area of the triangle.',gloss:'included angle 夹角 · area of triangle 三角形面积',

steps:['已知<b>两边和它们的夹角</b>——不需要找高，公式自带：Area = ½·a·b·sin C。','为什么成立？高 h = 11·sin 39°（点"播放动画"看高从顶点落下），面积 = ½ × 底 13 × h。','½ × 11 × 13 × sin 39° = 71.5 × 0.6293 = 44.996… ≈ <b>45.0 cm²</b>。'],

card:{m:'选面积公式看条件：有底有高 → ½bh；两边夹角 → ½ab·sinC。角必须"夹"在两条已知边中间，不夹不能用。',mo:['已知面积反解夹角（sin C = …，注意两解）','钝角夹角照样代入（sin 钝角为正）','与正弦/余弦定理串联的多步题']},
vg:function(){var a=ri(5,14),b=ri(5,14),C=pick([28,35,42,55,64,73]);var ans=Math.round(0.5*a*b*Math.sin(C*Math.PI/180)*10)/10;return{stem:'A triangle has sides '+a+' cm and '+b+' cm with an included angle of '+C+'°. Calculate its area, correct to 1 d.p.',part:{t:'num',ans:ans,tol:0.06,ph:'cm²（1 d.p.）'},sol:'½×'+a+'×'+b+'×sin'+C+'° = '+ans+' cm²'}}},

{n:14,marks:3,topic:'比例尺与面积',stem:'The scale of a map is 1 : 10 000 000.<br>On the map, the area of Slovakia is 4.9 cm<sup>2</sup>.<br>Calculate the actual area of Slovakia. Give your answer in square kilometres.',gloss:'scale 比例尺 · actual 实际的 · square kilometres 平方千米',
parts:[{id:'14',t:'mcq',opts:[['49 000 km<sup>2</sup>',1,''],['490 km<sup>2</sup>',0,'线性比例只用了一次。<b>面积比 = 线性比的平方</b>：1 cm 对应 100 km，则 1 cm² 对应 100² = 10 000 km²。'],['4 900 000 km<sup>2</sup>',0,'面积平方的思路对了，但 cm → km 的换算断了链：10⁷ cm = 10⁵ m = 100 km，不是 1000 km。'],['49 km<sup>2</sup>',0,'只把 4.9 乘了 10——既没用比例尺平方，换算也不完整。']]}],
steps:['先做<b>线性</b>换算并换成顺手单位：1 cm ↔ 10 000 000 cm = 100 000 m = <b>100 km</b>。','面积是二维量：1 cm² ↔ (100 km)² = <b>10 000 km²</b>。','4.9 × 10 000 = <b>49 000 km²</b>。（真实斯洛伐克约 49 035 km²，可作合理性检验。）'],
finalTxt:'答案：49 000 km²',
card:{m:'比例尺三级跳：长度用一次比、面积用平方、体积用立方。先把"1 cm 对应多少 km"算干净，再平方，链条不断。',mo:['反向：已知实际面积求图上面积','两张不同比例尺地图互换','相似模型的体积比（0580 常与相似形结合）']},
vg:function(){var k=pick([5,6,7]),m=ri(20,90)/10;var lin=Math.pow(10,k-5);var ans=m*lin*lin;return{stem:'A map has scale 1 : '+Math.pow(10,k).toLocaleString('en')+'. A region has area '+m+' cm² on the map. Find its actual area in km².',part:{t:'num',ans:ans,tol:Math.max(0.01,ans*1e-6),ph:'km²'},sol:'1 cm = '+lin+' km → 1 cm² = '+(lin*lin)+' km² → '+m+'×'+(lin*lin)+' = '+fmtN(ans)}}},

{n:15,marks:3,topic:'反比例',stem:'<i>y</i> is <b>inversely proportional</b> to <i>x</i><sup>2</sup>.<br>When <i>x</i> = 4, <i>y</i> = 2.<br>Find <i>y</i> when <i>x</i> = '+FR('1','2')+' .',gloss:'inversely proportional 成反比 · constant of proportionality 比例常数 k',
parts:[{id:'15',t:'mcq',opts:[['y = 128',1,''],['y = 16',0,'用成了 y ∝ 1/x（一次反比）。题目是 1/x²——x 缩到 1/8 时，y 要放大 8² = 64 倍。'],['y = 1/32',0,'方向反了：这是<b>正比</b> y ∝ x² 的结果。inversely = 反比 = k 除以。'],['y = 8',0,'这是比例常数 k 的一半——k = 2×16 = 32，k 只是中间量，不是答案。']]}],
steps:['逐词翻译成公式：inversely → 除；x² → 平方：<b>y = k / x²</b>。','用已知点定 k：2 = k/4² → k = 32。','代新值：y = 32 ÷ (½)² = 32 ÷ ¼ = <b>128</b>。'],
finalTxt:'答案：y = 128',
card:{m:'比例题三步铁流程：写通式（带 k）→ 已知点求 k → 代新值。directly=乘、inversely=除、square/cube 照写，公式是从英文逐词翻译出来的。',mo:['y ∝ √x、y ∝ x³ 等其他幂次','给表格判断比例类型','联合比例：与 a 正比、与 b² 反比']},
vg:function(){var x0=pick([2,3,4,5]),mult=pick([1,2,3]);var k=mult*x0*x0;var y0=k/(x0*x0);var x1=pick([0.5,1,2,10].filter(function(v){return v!==x0}));var ans=k/(x1*x1);return{stem:'<i>y</i> is inversely proportional to <i>x</i>². When <i>x</i> = '+x0+', <i>y</i> = '+y0+'. Find <i>y</i> when <i>x</i> = '+x1+' .',part:{t:'num',ans:ans,tol:1e-6,ph:'y ='},sol:'k = '+y0+'×'+x0+'² = '+k+'；y = '+k+'/'+x1+'² = '+fmtN(ans)}}},

{n:16,marks:3,topic:'正弦定理 · 钝角',anim:'a16',
fig:'<svg viewBox="0 0 330 175" width="330"><text x="10" y="14" font-size="10" fill="#6E6E73">NOT TO SCALE</text><polygon points="38,150 115,32 300,118" fill="#F0F4F8" stroke="#1D1D1F" stroke-width="1.6"/><text x="46" y="84" font-size="13" fill="#1D1D1F">8 cm</text><text x="200" y="58" font-size="13" fill="#1D1D1F">12 cm</text><path d="M 273.5,113.5 A 28,28 0 0 0 272.6,129.6" fill="none" stroke="#0071E3" stroke-width="1.5"/><text x="246" y="120" font-size="12" fill="#0071E3">39°</text><path d="M 62,135 A 26,26 0 0 0 63.3,141.7" fill="none" stroke="#FF3B30" stroke-width="1.5"/><text x="66" y="138" font-size="14" font-style="italic" fill="#FF3B30">x</text></svg>',
stem:'Calculate the <b>obtuse</b> angle <i>x</i> in this triangle.',gloss:'obtuse 钝角 · sine rule 正弦定理 · ambiguous case 两解情形',
parts:[{id:'16',t:'mcq',opts:[['x = 109.3°',1,''],['x = 70.7°',0,'这是计算器 sin⁻¹ 直接吐出的锐角。但题目与图都说 x 是<b>钝角</b>——sin θ = sin(180° − θ)，一个正弦值对应两个角，看动画。'],['x = 24.8°',0,'边角配错了对：正弦定理里"角对边"必须成对——39° 对的是 8 cm，x 对的是 12 cm。'],['x = 141°',0,'180 − 39 = 141 不是正弦定理，只是把两个角凑了个和。']]}],
steps:['正弦定理配对（角对边）：x 对 12，39° 对 8 → '+FR('sin x','12')+' = '+FR('sin 39°','8')+'。','sin x = 12 sin 39° ÷ 8 = 0.9440 → 计算器给出 70.7°。','但计算器<b>只报锐角</b>。x 是钝角，且 sin(180°−θ)=sin θ → x = 180° − 70.7° = <b>109.3°</b>。检验内角和：109.3+39=148.3 < 180 ✓。'],
finalTxt:'答案：x = 109.3°（接受 109.2°–109.3°）',
card:{m:'sin⁻¹ 永远只给 0–90° 的解；题目说钝角、或图形明显是钝角时，用 180° 去减。最后必须用内角和 < 180° 验证解的合法性。',mo:['判断两解是否都成立（ambiguous case 完整版）','余弦定理求角——为什么它没有两解？','先正弦定理再内角和求第三角']},
vg:function(){var th,s2,s1,arg;do{th=pick([32,38,44]);s2=pick([7,8,9]);s1=s2+ri(1,5);arg=s1*Math.sin(th*Math.PI/180)/s2}while(arg>=0.985);var ans=Math.round((180-Math.asin(arg)*180/Math.PI)*10)/10;return{stem:'In a triangle, the side opposite the obtuse angle <i>x</i> is '+s1+' cm; a '+th+'° angle is opposite a side of '+s2+' cm. Find <i>x</i> (1 d.p.).',part:{t:'num',ans:ans,tol:0.15,ph:'钝角 x'},sol:'sin x = '+s1+'sin'+th+'°/'+s2+' → 锐解 '+(180-ans).toFixed(1)+'° → x = 180−'+(180-ans).toFixed(1)+' = '+ans+'°'}}},

{n:17,marks:3,topic:'扇形面积',anim:'a17',

stem:'The diagram shows two sectors of circles with the same centre.<br>Calculate the <b>shaded</b> area.',gloss:'sector 扇形 · same centre 同心 · shaded 阴影',

steps:['阴影 = <b>大扇形 − 小扇形</b>，两者共用同一个 45° 圆心角。','套扇形面积 = '+FR('θ','360')+'·πr²，一步并算：'+FR('45','360')+'·π·(5² − 3²) = ⅛ · π · 16。','= <b>2π ≈ 6.28 cm²</b>。并在一起算（R²−r²）比分别算再相减更快且免累积舍入。'],
finalTxt:'答案：2π ≈ 6.28 cm²',

vg:function(){var R=ri(6,9),r=R-ri(2,4),th=pick([30,45,60,72,90]);var ans=th/360*Math.PI*(R*R-r*r);return{stem:'Two sectors with the same centre have radii '+R+' cm and '+r+' cm and angle '+th+'°. Find the area between them (3 s.f.).',part:{t:'num',ans:ans,tol:Math.max(0.02,ans*0.006),ph:'cm²'},sol:'('+th+'/360)π('+R+'²−'+r+'²) = '+ans.toFixed(3)+' cm²'}}},

{n:18,marks:3,topic:'代数分式',stem:'Write&nbsp;&nbsp;'+FR('<i>x</i>','2')+' − '+FR('2<i>x</i> + 4','<i>x</i> + 1')+'&nbsp;&nbsp;as a single fraction, in its simplest form.',gloss:'single fraction 单一分式 · common denominator 公分母',
parts:[{id:'18',t:'expr',vars:['x'],target:'(x^2-3*x-8)/(2*(x+1))',ph:'如 (x^2-3x-8)/(2(x+1))',needParen:true,oneSlash:true}],
steps:['公分母 = 2(x+1)。第一项补乘 (x+1)，第二项补乘 2：'+FR('x(x+1)','2(x+1)')+' − '+FR('2(2x+4)','2(x+1)')+'。','合并分子——<b>减号后面整体带括号</b>：x(x+1) − 2(2x+4) = x² + x − 4x − 8 = x² − 3x − 8。','查约分：x² − 3x − 8 的判别式 = 9+32 = 41，非完全平方 → 分不动，已最简：'+FR('x² − 3x − 8','2(x + 1)')+'。'],
finalTxt:'答案：(x² − 3x − 8) / (2(x + 1))',
card:{m:'分式合并四步：定公分母 → 每项补乘 → 合并分子（减法必带括号！）→ 试约分。九成失分在第二个分子忘了整体乘负号。',mo:['分母为 x 与 x±a 的两项','三项通分','解分式方程：合并后令分子 = 0（并检验分母）']},
vg:function(){var a=pick([2,3]),b=ri(1,3),c=ri(2,6),d=ri(1,4);var mid=d-a*b;var tgt='(x^2+('+mid+')*x-'+(a*c)+')/('+a+'*(x+'+d+'))';return{stem:'Write&nbsp;'+FR('<i>x</i>',a)+' − '+FR(b+'<i>x</i> + '+c,'<i>x</i> + '+d)+'&nbsp;as a single fraction in its simplest form.',part:{t:'expr',vars:['x'],target:tgt,ph:'(…)/(…)',needParen:true,oneSlash:true},sol:'[x(x+'+d+')−'+a+'('+b+'x+'+c+')]/['+a+'(x+'+d+')] = (x²'+(mid>=0?'+':'')+mid+'x−'+(a*c)+')/('+a+'(x+'+d+'))'}}},

{n:19,marks:3,topic:'矩阵',old:true,stem:'M = <span style="font-size:20px">(</span><span style="display:inline-flex;flex-direction:column;line-height:1.2;text-align:center;padding:0 4px"><span>1&nbsp;&nbsp;2</span><span>3&nbsp;&nbsp;4</span></span><span style="font-size:20px">)</span>&nbsp;&nbsp;&nbsp;P = <span style="font-size:20px">(</span><span style="display:inline-flex;flex-direction:column;line-height:1.2;text-align:center;padding:0 4px"><span>5&nbsp;&nbsp;6</span><span>7&nbsp;&nbsp;8</span></span><span style="font-size:20px">)</span>',gloss:'matrix 矩阵 · determinant 行列式 |M| · 本题属旧大纲（现行 0580 已移除矩阵），按学校作业保留',

 {id:'21a',label:'(a) Describe fully the single transformation that maps shape T onto shape A.',t:'mcq',opts:[['Translation by vector '+VEC('−1','−5'),1,''],['Translation by vector '+VEC('1','5'),0,'方向反了。向量 = 终点 − 起点：从 T 的 (5,7) 到 A 的 (4,2)，是向左 1、向下 5。'],['Rotation, 180°, centre (5.5, 4.5)',0,'旋转 180° 会让三角形"倒个头"（直角顶点跑到右下方）。A 与 T 的朝向完全一致——朝向不变的等大移动只能是平移。'],['Reflection in the line y = 4',0,'反射会翻转图形的朝向（变成镜像手性）；A 与 T 是同手性的，排除反射。']]},
 {id:'21b',label:'(b) On the grid, reflect shape T in the line y = x —— 在下方交互网格上点出反射后三角形的三个顶点',t:'grid',target:[[6,5],[7,5],[7,7]]}],
steps:['先认对应点：T 的直角顶点 (5,7) ↔ A 的直角顶点 (4,2)。位移 = (4−5, 2−7) = <b>(−1, −5)</b>。','逐点验证：(5,6)→(4,1) ✓，(7,7)→(6,2) ✓。三点同向量 → 平移。答题必须写全两个采分点：<b>Translation</b> + <b>列向量</b>。','(b) 沿 y = x 反射的规则：<b>坐标互换</b> (x, y) → (y, x)。(5,6)→(6,5)；(5,7)→(7,5)；(7,7)→(7,7)——落在镜线上的点纹丝不动。点"播放动画"看镜线。'],

vg:function(){var u=ri(-4,4)||2,v=ri(-5,5)||-3;var a=ri(1,3),b=ri(1,3);var P1=[a,b],P2=[a,b+1],P3=[a+2,b+1];function tr(P){return '('+(P[0]+u)+', '+(P[1]+v)+')'}var right=VEC(u,v),o=[[right,1,''],[VEC(-u,-v),0,'方向反了：向量 = 终点 − 起点。'],[VEC(v,u),0,'横纵分量写反了：上面是 x 方向，下面是 y 方向。'],[VEC(u,-v),0,'y 分量符号错了。']];return{stem:'Triangle P has vertices ('+P1+'), ('+P2+'), ('+P3+'). It is translated to ('+tr(P1)+', '+tr(P2)+', '+tr(P3)+'). Which vector describes the translation?',part:{t:'mcq',opts:shuffle(o)},sol:'向量 = 终点−起点 = ('+u+', '+v+')'}}},

{n:22,marks:4,topic:'流量与单位换算',stem:'A pipe is completely full of water.<br>Water flows through the pipe at a speed of 1.2 m/s into a tank.<br>The cross-section of the pipe has an area of 6 cm<sup>2</sup>.<br>Calculate the number of <b>litres</b> of water flowing into the tank in 1 hour.',gloss:'cross-section 横截面 · flow 流动 · litre 升（1 L = 1000 cm³）',

finalTxt:'答案：2592 litres',
card:{m:'流量 = 截面积 × 速度，本质是"每秒推出一根水柱"。这类题的分全在单位链上：先统一到同一长度单位，最后一步才换升。',mo:['已知流量反求速度或管径','注满水箱需要多长时间','两管同时注水（相加流量）']},

<script>
'use strict';
/* ================= 状态 ================= */
var SKEY='simon_school_math_v1';
var ST={meta:{created:new Date().toISOString().slice(0,10),opened:0},it:{},qv:{}};
try{var _s=JSON.parse(localStorage.getItem(SKEY));if(_s&&_s.it)ST=_s}catch(e){}
ST.meta.opened=(ST.meta.opened||0)+1;
function save(){try{localStorage.setItem(SKEY,JSON.stringify(ST))}catch(e){}}
function IT(id){if(!ST.it[id])ST.it[id]={a:0,w:0,ok:0};return ST.it[id]}

/* ================= 判定 ================= */
function checkSpec(sp,val){
  if(sp.t==='num'){
    var s=String(val);var u;
    if(/pi|π/i.test(s)){u=evalExpr(s,[],[])}else{u=parseNum(s)}
    if(!isFinite(u))return{ok:0,msg:'没读懂这个数——检查格式（可用小数、分数 a/b，或 2pi 这样的 π 式）'};
    return{ok:Math.abs(u-sp.ans)<=(sp.tol!=null?sp.tol:1e-9)?1:0,msg:''};
  }
  if(sp.t==='sf'){
    var z=String(val).toLowerCase().replace(/\s|,/g,'').replace(/×/g,'x').replace(/−/g,'-').replace(/\*/g,'x');
    var m=z.match(/^(-?\d*\.?\d+)x10\^(-?\d+)$/)||z.match(/^(-?\d*\.?\d+)e(-?\d+)$/);
    if(!m){if(isFinite(parseNum(val))&&Math.abs(parseNum(val)-sp.val)<1e-6)return{ok:0,msg:'数值对了，但必须写成 a×10ⁿ 的标准形式（如 1.5×10^3）'};return{ok:0,msg:'格式：a×10^n，例如 1.506×10^4'}}
    var a=parseFloat(m[1]),e=parseInt(m[2],10);
    if(Math.abs(a)<1||Math.abs(a)>=10)return{ok:0,msg:'标准形式要求 1 ≤ a < 10——你的 a = '+a};
    return{ok:Math.abs(a*Math.pow(10,e)-sp.val)<=Math.abs(sp.val)*1e-9?1:0,msg:''};
  }
  if(sp.t==='frac'){
    var s2=String(val).replace(/\s/g,'');
    if(!/\//.test(s2)){return{ok:0,msg:'请写成分数 a/b'}}
    if(fracEq(s2,sp.fn,sp.fd,true))return{ok:1,msg:''};
    if(fracEq(s2,sp.fn,sp.fd,false))return{ok:0,msg:'数值对了，但还能约分——题目要求最简形式'};
    return{ok:0,msg:''};
  }
  if(sp.t==='expr'){
    var s3=String(val);
    if(sp.needParen&&s3.indexOf('(')<0)return{ok:0,msg:'这个答案需要括号来保住结构'};
    if(sp.oneSlash&&(s3.match(/\//g)||[]).length>1)return{ok:0,msg:'请合并为单一分式——只保留一条分数线'};
    if(sp.maxLen&&s3.replace(/\s/g,'').length>sp.maxLen)return{ok:0,msg:'数值上等价，但还不是最简形式——继续化简'};
    if(sp.oneEach){for(var i=0;i<sp.oneEach.length;i++){var L=sp.oneEach[i];var cnt=(s3.toLowerCase().match(new RegExp(L,'g'))||[]).length;if(cnt!==1)return{ok:0,msg:'最简结果里字母 '+L+' 应恰好出现一次——先合并同类项'}}}
    return{ok:exprEq(s3,sp.target,sp.vars)?1:0,msg:''};
  }
  if(sp.t==='set'){return{ok:setEq(val,sp.arr)?1:0,msg:''}}
  return{ok:0,msg:''};
}

/* ================= 渲染 ================= */
var qwrap=$('#qwrap');
function stChip(n){
  var q=QS[n-1];var allOk=q.parts.every(function(p){return IT(p.id).ok});var anyA=q.parts.some(function(p){return IT(p.id).a>0});
  var anyW=q.parts.some(function(p){return IT(p.id).w});var v=ST.qv[n]||0;
  if(allOk&&v>=2)return['st3','已掌握'];
  if(anyW&&!(allOk&&v>=2))return['st1','需复习'];
  if(allOk)return['st2','已答对 · 待变式'];
  if(anyA)return['st2','进行中'];
  return['st0','未做'];
}
function refreshChip(n){var c=stChip(n);var e=$('#st-'+n);e.className='st '+c[0];e.textContent=c[1]}
function dash(){
  var a=0,r=0,rev=0,m=0;
  QS.forEach(function(q){
    q.parts.forEach(function(p){var t=IT(p.id);if(t.a>0)a++;if(t.ok)r++});
    var c=stChip(q.n);if(c[1]==='已掌握')m++;if(c[1]==='需复习')rev++;
  });
  $('#dAns').firstChild.nodeValue=a;$('#dRight').textContent=r;$('#dMast').firstChild.nodeValue=m;$('#dRev').textContent=rev;
  $('#dBar').style.width=Math.round(a/31*100)+'%';
  var box=$('#rvBox'),ch=$('#rvChips');ch.innerHTML='';
  var list=QS.filter(function(q){return stChip(q.n)[1]==='需复习'});
  if(list.length){box.style.display='block';list.forEach(function(q){var c=el('span','rv-chip','Q'+q.n+' · '+q.topic);c.onclick=function(){var t=$('#q-'+q.n);t.scrollIntoView({behavior:'smooth',block:'start'})};ch.appendChild(c)})}
  else box.style.display='none';
  save();
}
function fb(node,ok,msg,why){
  node.className='fb '+(ok?'ok':'no');
  node.innerHTML=(ok?'✓ 正确':'✗ 还不对')+(msg?'<span class="why">'+msg+'</span>':'')+(why?'<span class="why">'+why+'</span>':'');
}
function afterAttempt(q,part,ok){
  var t=IT(part.id);t.a++;if(ok)t.ok=1;else{t.w=1;t.ok=0}
  refreshChip(q.n);unlockExtras(q);dash();
}
function unlockExtras(q){
  var anyA=q.parts.some(function(p){return IT(p.id).a>0});
  var allA=q.parts.every(function(p){return IT(p.id).a>0});
  $('#expbtn-'+q.n).disabled=!anyA;
  $('#vtbtn-'+q.n).disabled=!allA;
  $('#vtlock-'+q.n).textContent=allA?'':'（先把上面的原题各试一次）';
}
function renderMCQ(q,part,host){
  var grid=el('div','opts');var fbn=el('div','fb');
  var order=shuffle(part.opts.map(function(o,i){return i}));
  order.forEach(function(oi,k){
    var o=part.opts[oi];
    var b=el('button','opt','<b>'+String.fromCharCode(65+k)+'</b>'+o[0]);
    b.onclick=function(){
      if(o[1]){b.className='opt sel-ok';grid.querySelectorAll('.opt').forEach(function(x){if(x!==b)x.className='opt dim'});fb(fbn,1,'');afterAttempt(q,part,1)}
      else{b.className='opt sel-no dim';fb(fbn,0,'',o[2]);afterAttempt(q,part,0)}
    };
    grid.appendChild(b);
  });
  host.appendChild(grid);host.appendChild(fbn);
  if(IT(part.id).ok){fb(fbn,1,'此前已答对（选项已重新洗牌，可再练）')}
}
function renderInput(q,part,host){
  var row=el('div','inrow');var inp=el('input','inp');inp.placeholder=part.ph||'';inp.setAttribute('aria-label','答案输入');
  var btn=el('button','btn btn-blue btn-mini','检查');var u=part.unit?el('span','unit',part.unit):null;
  var fbn=el('div','fb');
  function go(){var r=checkSpec(part,inp.value);fb(fbn,r.ok,r.msg);afterAttempt(q,part,r.ok)}
  btn.onclick=go;inp.addEventListener('keydown',function(e){if(e.key==='Enter')go()});
  row.appendChild(inp);if(u)row.appendChild(u);row.appendChild(btn);
  host.appendChild(row);host.appendChild(fbn);
  if(IT(part.id).ok)fb(fbn,1,'此前已答对，可再练');
}
function renderMat2(q,part,host){
  var box=el('div','inrow');box.innerHTML='<span style="font-size:26px;font-weight:300">(</span>';
  var col=el('span','', '');col.style.cssText='display:inline-flex;flex-direction:column;gap:6px';
  var ins=[];

function renderQ23(q,part,host){

  s1.value='A';s2.value='A';
  var symWrap=el('span');var chosen='';
  ['⊂','⊆','⊄','∈','='].forEach(function(sym){
    var b=el('button','btn btn-ghost btn-mini',sym);b.style.marginRight='6px';
    b.onclick=function(){chosen=sym;symWrap.querySelectorAll('button').forEach(function(x){x.style.background=''});b.style.background='#CFE5FF'};
    symWrap.appendChild(b);
  });
  function row(html,node){var r=el('div','inrow');r.innerHTML='<span style="min-width:120px">'+html+'</span>';r.appendChild(node);var mk=el('span','unit');mk.style.minWidth='22px';r.appendChild(mk);wrap.appendChild(r);return mk}
  var m1=row('A ∩ B =',i1),m2=row('n(B) =',i2);
  var pairBox=el('span');pairBox.appendChild(s1);pairBox.appendChild(el('span','unit',' ∩ '));pairBox.appendChild(s2);
  var m3=row('{0, 4, 6} =',pairBox);
  var m4=row('{2, 4} ___ A：',symWrap);
  var btn=el('button','btn btn-blue btn-mini','检查全部');var fbn=el('div','fb');
  btn.onclick=function(){
    var r1=setEq(i1.value,[2,5]);m1.textContent=r1?'✓':'✗';
    var r2=numEq(i2.value,3,0);m2.textContent=r2?'✓':'✗';
    var pr=[s1.value,s2.value].sort().join('');var r3=(pr==='AB′');m3.textContent=r3?'✓':'✗';

function renderGrid(q,part,host){
  var box=el('div');box.innerHTML=mkGridSVG();
  var picked=[];var dots=box.querySelector('#gDots'),poly=box.querySelector('#gUser');
  function paint(){
    dots.innerHTML=picked.map(function(p){return '<circle cx="'+(36+28*p[0])+'" cy="'+(252-28*p[1])+'" r="4.5" fill="#30D158"/>'}).join('');
    poly.setAttribute('points',picked.length===3?picked.map(function(p){return (36+28*p[0])+','+(252-28*p[1])}).join(' '):'');
  }
  box.querySelector('#gHits').addEventListener('click',function(e){
    var t=e.target;if(!t.getAttribute||t.getAttribute('data-x')==null)return;
    var x=+t.getAttribute('data-x'),y=+t.getAttribute('data-y');
    var idx=picked.findIndex(function(p){return p[0]===x&&p[1]===y});
    if(idx>=0)picked.splice(idx,1);else{if(picked.length>=3){toast('最多 3 个顶点——先点掉一个再换');return}picked.push([x,y])}
    paint();
  });
  var row=el('div','inrow');var btn=el('button','btn btn-blue btn-mini','检查作图');var clr=el('button','btn btn-ghost btn-mini','清空');
  var fbn=el('div','fb');
  btn.onclick=function(){
    if(picked.length!==3){toast('先点出 3 个顶点');return}
    var key=function(a){return a.map(function(p){return p[0]+','+p[1]}).sort().join(';')};
    var ok=key(picked)===key(part.target);
    fb(fbn,ok,ok?'三个顶点全部正确':'对照规则 (x,y)→(y,x) 逐点检查；提示：镜线上的点反射后不动');
    afterAttempt(q,part,ok?1:0);
  };
  clr.onclick=function(){picked=[];paint()};
  row.appendChild(btn);row.appendChild(clr);
  host.appendChild(box);host.appendChild(row);host.appendChild(fbn);
  if(IT(part.id).ok)fb(fbn,1,'此前已作对');
}
function renderPart(q,part,host){
  if(part.label)host.appendChild(el('div','part-label',part.label));
  if(part.t==='mcq')renderMCQ(q,part,host);
  else if(part.t==='mat2')renderMat2(q,part,host);
  else if(part.t==='q23')renderQ23(q,part,host);
  else if(part.t==='grid')renderGrid(q,part,host);
  else renderInput(q,part,host);
}

function renderVariant(q,body,counter){
  body.innerHTML='';var v=q.vg();q._v=v;
  body.appendChild(el('div','vt-stem',v.stem));
  var host=el('div');body.appendChild(host);
  var fbn=el('div','fb');var solEl=el('div','step');solEl.style.display='none';
  function done(ok){
    if(ok){ST.qv[q.n]=(ST.qv[q.n]||0)+1}else{ST.qv[q.n]=0}
    counter.textContent='已连对 '+(ST.qv[q.n]||0)+' / 2';
    solEl.innerHTML='<b>解</b>：'+v.sol;solEl.style.display='block';
    refreshChip(q.n);dash();
    if((ST.qv[q.n]||0)>=2)toast('Q'+q.n+' 已掌握 ✓ 变式连对两次');
  }
  if(v.part.t==='mcq'){
    var grid=el('div','opts');
    var order=shuffle(v.part.opts.map(function(o,i){return i}));
    order.forEach(function(oi,k){var o=v.part.opts[oi];var b=el('button','opt','<b>'+String.fromCharCode(65+k)+'</b>'+o[0]);
      b.onclick=function(){grid.querySelectorAll('.opt').forEach(function(x){x.classList.add('dim')});b.className='opt '+(o[1]?'sel-ok':'sel-no');fb(fbn,o[1]?1:0,'',o[2]||'');done(o[1]?1:0)};
      grid.appendChild(b)});
    host.appendChild(grid);
  }else{
    var row=el('div','inrow');var inp=el('input','inp');inp.placeholder=v.part.ph||'';
    var btn=el('button','btn btn-blue btn-mini','检查');
    var locked=false;
    function go(){if(locked)return;locked=true;inp.disabled=true;btn.disabled=true;var r=checkSpec(v.part,inp.value);fb(fbn,r.ok,r.msg);done(r.ok)}
    btn.onclick=go;inp.addEventListener('keydown',function(e){if(e.key==='Enter')go()});
    row.appendChild(inp);row.appendChild(btn);host.appendChild(row);
  }
  body.appendChild(fbn);body.appendChild(solEl);
}

<script>
'use strict';
function buildQ(q){
  var card=el('div','q');card.id='q-'+q.n;
  var head=el('div','q-head');
  head.appendChild(el('span','q-num','Q'+q.n));
  head.appendChild(el('span','chip',q.topic));
  if(q.old)head.appendChild(el('span','chip old','旧大纲'));
  var st=el('span','st st0','未做');st.id='st-'+q.n;head.appendChild(st);
  head.appendChild(el('span','marks','['+q.marks+' 分]'));
  card.appendChild(head);
  if(q.stem)card.appendChild(el('div','stem',q.stem));
  if(q.gloss)card.appendChild(el('div','gloss',q.gloss));
  var figEl=null;
  if(q.fig){figEl=el('div','fig',q.fig);card.appendChild(figEl)}
  var ansBox=el('div','ans');card.appendChild(ansBox);
  q.parts.forEach(function(p){renderPart(q,p,ansBox)});
  var ctr=el('div','inrow');ctr.style.marginTop='14px';
  var eb=el('button','btn btn-ghost btn-mini','看分步讲解');eb.id='expbtn-'+q.n;eb.disabled=true;
  ctr.appendChild(eb);card.appendChild(ctr);
  var exp=el('div','exp');
  exp.appendChild(el('h4','','分步讲解 · 先想再看'));
  var stepEls=q.steps.map(function(s,i){var d=el('div','step','<b>第 '+(i+1)+' 步</b>　'+s);exp.appendChild(d);return d});
  var fin=el('div','final',q.finalTxt);exp.appendChild(fin);
  var nxt=el('button','btn btn-blue btn-mini','下一步 ▸');exp.appendChild(nxt);
  var cm=el('div','card-m','<b>思路卡 · '+q.topic+'</b>'+q.card.m+'<div class="mo" style="margin-top:6px">常见变形：'+q.card.mo.join('；')+'。</div>');
  exp.appendChild(cm);
